  renderBanques();
  renderMouvements();
}

function renderBanques() {
  if(!DB.egliseBanques) DB.egliseBanques=[];
  var comptes = DB.egliseBanques;
  var mvts    = DB.egliseMouvements||[];
  var now     = new Date();
  var m=now.getMonth()+1, a=now.getFullYear();

  var soldeTotal = comptes.reduce(function(s,bq){
    var entrees = mvts.filter(function(v){return v.compteId===bq.id&&v.type==='entree';}).reduce(function(s2,v){return s2+Number(v.montant||0);},0);
    var sorties = mvts.filter(function(v){return v.compteId===bq.id&&v.type==='sortie';}).reduce(function(s2,v){return s2+Number(v.montant||0);},0);
    return s + Number(bq.soldeInit||0) + entrees - sorties;
  },0);

  var entMois = mvts.filter(function(v){var d=new Date(v.date||'');return v.type==='entree'&&d.getMonth()+1===m&&d.getFullYear()===a;}).reduce(function(s,v){return s+Number(v.montant||0);},0);
  var sorMois = mvts.filter(function(v){var d=new Date(v.date||'');return v.type==='sortie'&&d.getMonth()+1===m&&d.getFullYear()===a;}).reduce(function(s,v){return s+Number(v.montant||0);},0);

  document.getElementById('bq-total-solde')  &&(document.getElementById('bq-total-solde').textContent  =fmtNum(soldeTotal)+' F');
  document.getElementById('bq-total-entrees')&&(document.getElementById('bq-total-entrees').textContent=fmtNum(entMois)+' F');
  document.getElementById('bq-total-sorties')&&(document.getElementById('bq-total-sorties').textContent=fmtNum(sorMois)+' F');
  document.getElementById('bq-nb-comptes')   &&(document.getElementById('bq-nb-comptes').textContent   =comptes.length);

  var elList = document.getElementById('eglise-banques-list');
  var selCpt = document.getElementById('bq-filter-compte');
  var selMvt = document.getElementById('mvt-compte');
  var opts   = '<option value="">Tous les comptes</option>'+comptes.map(function(b){return '<option value="'+b.id+'">'+b.nom+' — '+b.banque+'</option>';}).join('');
  if(selCpt) selCpt.innerHTML = opts;
  if(selMvt) selMvt.innerHTML = opts.replace('Tous les comptes','-- Sélectionner --');

  if(!elList) return;
  if(!comptes.length){elList.innerHTML='<div style="padding:24px;text-align:center;color:var(--text3)">Aucun compte bancaire</div>';return;}

  elList.innerHTML = comptes.map(function(bq) {
    var ent = mvts.filter(function(v){return v.compteId===bq.id&&v.type==='entree';}).reduce(function(s,v){return s+Number(v.montant||0);},0);
    var sor = mvts.filter(function(v){return v.compteId===bq.id&&v.type==='sortie';}).reduce(function(s,v){return s+Number(v.montant||0);},0);
    var sol = Number(bq.soldeInit||0)+ent-sor;
    return '<div class="card" style="padding:16px;display:flex;justify-content:space-between;align-items:center">' +
      '<div><div style="font-weight:800;font-size:15px">'+bq.nom+'</div>' +
        '<div style="font-size:12px;color:var(--text3)">'+bq.banque+' | '+bq.numero+' | Resp: '+bq.responsable+'</div>' +
        '<div style="font-size:12px;margin-top:4px"><span style="color:#10b981">↑ Entrées: '+fmtNum(ent)+' F</span> &nbsp; <span style="color:#ef4444">↓ Sorties: '+fmtNum(sor)+' F</span></div>' +
      '</div>' +
      '<div style="text-align:right">' +
        '<div style="font-size:22px;font-weight:900;color:'+(sol>=0?'var(--accent)':'#ef4444')+'">'+fmtNum(sol)+' F</div>' +
        '<div style="font-size:11px;color:var(--text3)">Solde actuel</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function getEntrepriseContext() {
  var ent    = (DB.currentUser && DB.currentUser.entreprise) || '';
  var entObj = ENTREPRISES[ent] || {};
  var type   = entObj.type || 'commerce';
  var user   = DB.currentUser || {};
  var today  = new Date().toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  var moisCourant = new Date().toISOString().slice(0,7);

  // ── Données réelles selon le type ──
  var ctx = 'Tu es DpGestIA, assistant intelligent de ' + (entObj.nom||ent) + '.\n';
  ctx += 'Type entreprise: ' + type + ' | Adresse: ' + (entObj.adresse||'Bénin') + '\n';
  ctx += 'Utilisateur: ' + (user.name||'') + ' (' + (user.role||'') + ')\n';
  ctx += 'Date: ' + today + '\n';
  ctx += 'Tu analyses les VRAIES données et réponds en français, de façon claire et structurée.\n\n';

  // ── COMMERCE / ONG ──
  if(type === 'commerce' || type === 'ong') {
    var sales    = DB.sales || [];
    var ventes   = DB.ventes || [];
    var allVentes= sales.concat(ventes);
    var products = DB.products || [];
    var clients  = DB.clients || [];
    var purchases= DB.purchases || [];

    // CA total et du mois
    var caTotal  = allVentes.reduce(function(s,v){ return s+Number(v.amount||v.total||v.montant||0); },0);
    var vMois    = allVentes.filter(function(v){ return (v.date||'').startsWith(moisCourant); });
    var caMois   = vMois.reduce(function(s,v){ return s+Number(v.amount||v.total||v.montant||0); },0);
    var stockTotal= products.reduce(function(s,p){ return s+Number(p.qty||p.stock||0); },0);
    var stockAlert= products.filter(function(p){ return Number(p.qty||p.stock||0) <= 5 && Number(p.qty||p.stock||0) >= 0; });
    var achatsTotal= purchases.reduce(function(s,p){ return s+Number(p.montant||p.amount||0); },0);

    ctx += '=== DONNÉES COMMERCE ===\n';
    ctx += 'Produits en catalogue: ' + products.length + ' | Stock total: ' + stockTotal + ' unités\n';
    ctx += 'Alertes stock faible (<=5): ' + stockAlert.length + ' produits\n';
    if(stockAlert.length) ctx += 'Produits en alerte: ' + stockAlert.slice(0,5).map(function(p){ return p.name+'('+p.qty+')'; }).join(', ') + '\n';
    ctx += 'Clients enregistrés: ' + clients.length + '\n';
    ctx += 'Ventes totales: ' + allVentes.length + ' | CA total: ' + fmtNum(caTotal) + ' F CFA\n';
    ctx += 'Ventes ce mois (' + moisCourant + '): ' + vMois.length + ' | CA mois: ' + fmtNum(caMois) + ' F CFA\n';
    ctx += 'Achats/approvisionnements: ' + purchases.length + ' | Total: ' + fmtNum(achatsTotal) + ' F\n';

    // Top produits vendus
    var prodVentes = {};
    sales.forEach(function(s){ (s.items||[]).forEach(function(it){ prodVentes[it.name]=(prodVentes[it.name]||0)+(it.qty||1); }); });
    var topProds = Object.entries(prodVentes).sort(function(a,b){return b[1]-a[1];}).slice(0,3);
    if(topProds.length) ctx += 'Top produits vendus: ' + topProds.map(function(p){ return p[0]+'('+p[1]+'x)'; }).join(', ') + '\n';

    // Panier moyen
    if(allVentes.length) ctx += 'Panier moyen: ' + fmtNum(Math.round(caTotal/allVentes.length)) + ' F\n';
  }

  // ── HÔPITAL ──
  if(type === 'hopital') {
    var patients = DB.patients || [];
    var cons     = DB.consultations || [];
    var urgences = DB.urgences || [];
    var consMois = cons.filter(function(c){ return (c.date||'').startsWith(moisCourant); });
    var patMois  = cons.filter(function(c){ return (c.date||'').startsWith(moisCourant); });
    var parMedecin = {};
    cons.forEach(function(c){ var m=c.medecin||'Inconnu'; parMedecin[m]=(parMedecin[m]||0)+1; });
    var topMed = Object.entries(parMedecin).sort(function(a,b){return b[1]-a[1];}).slice(0,3);

    ctx += '=== DONNÉES HÔPITAL ===\n';
    ctx += 'Patients enregistrés: ' + patients.length + '\n';
    ctx += 'Consultations totales: ' + cons.length + ' | Ce mois: ' + consMois.length + '\n';
    ctx += 'Urgences: ' + urgences.length + '\n';
    if(topMed.length) ctx += 'Top médecins: ' + topMed.map(function(m){return m[0]+'('+m[1]+' cons.)';}).join(', ') + '\n';
    // Pathologies fréquentes
    var motifs = {};
    cons.forEach(function(c){ if(c.motif){ var m=c.motif.slice(0,30); motifs[m]=(motifs[m]||0)+1; }});
    var topMot = Object.entries(motifs).sort(function(a,b){return b[1]-a[1];}).slice(0,3);
    if(topMot.length) ctx += 'Motifs fréquents: ' + topMot.map(function(m){return m[0]+'('+m[1]+'x)';}).join(', ') + '\n';
  }

  // ── ÉCOLE ──
  if(type === 'ecole') {
    var eleves  = DB.ecoleEleves || [];
    var notes   = DB.ecoleNotes  || [];
    var paiem   = DB.ecolePaiements || [];
    var parClasse = {};
    eleves.forEach(function(e){ var c=e.classe||'N/A'; parClasse[c]=(parClasse[c]||0)+1; });
    var fraisTotal = eleves.reduce(function(s,e){ return s+Number(e.frais||0); },0);
    var fraisPaye  = paiem.reduce(function(s,p){ return s+Number(p.montant||0); },0);
    var garcons = eleves.filter(function(e){ return e.sexe==='Masculin'; }).length;
    var filles  = eleves.filter(function(e){ return e.sexe==='Féminin'; }).length;
    var moy = notes.length ? (notes.reduce(function(s,n){return s+Number(n.note||0);},0)/notes.length).toFixed(1) : 0;

    ctx += '=== DONNÉES ÉCOLE ===\n';
    ctx += 'Effectif total: ' + eleves.length + ' (G:' + garcons + ' F:' + filles + ')\n';
    ctx += 'Répartition: ' + Object.entries(parClasse).map(function(e){return e[0]+':'+e[1];}).join(', ') + '\n';
    ctx += 'Moyenne générale: ' + moy + '/20\n';
    ctx += 'Frais à percevoir: ' + fmtNum(fraisTotal) + ' F | Perçus: ' + fmtNum(fraisPaye) + ' F | Impayés: ' + fmtNum(Math.max(0,fraisTotal-fraisPaye)) + ' F\n';
    ctx += 'Taux recouvrement: ' + (fraisTotal>0?Math.round(fraisPaye/fraisTotal*100):0) + '%\n';
  }

  // ── MICROFINANCE ──
  if(type === 'microfinance') {
    var mfiClients= DB.mfiClients || [];
    var mfiPrets  = DB.mfiPrets   || [];
    var mfiRemb   = DB.mfiRemboursements || [];
    var enCours   = mfiPrets.filter(function(p){ return p.statut==='En cours'; });
    var enRetard  = mfiPrets.filter(function(p){ return p.statut==='En retard'; });
    var termines  = mfiPrets.filter(function(p){ return p.statut==='Remboursé'||p.statut==='Terminé'; });
    var encours$  = enCours.reduce(function(s,p){ return s+Number(p.montant||0); },0);
    var epargne$  = mfiClients.reduce(function(s,c){ return s+Number(c.soldeEpargne||0); },0);
    var rembMois  = mfiRemb.filter(function(r){ return (r.date||'').startsWith(moisCourant); });
    var rembMois$ = rembMois.reduce(function(s,r){ return s+Number(r.montant||0); },0);

    ctx += '=== DONNÉES MICROFINANCE ===\n';
    ctx += 'Membres/clients: ' + mfiClients.length + '\n';
    ctx += 'Prêts: total ' + mfiPrets.length + ' | En cours: ' + enCours.length + ' | En retard: ' + enRetard.length + ' | Terminés: ' + termines.length + '\n';
    ctx += 'Encours de crédit: ' + fmtNum(encours$) + ' F\n';
    ctx += 'Taux retard (PAR): ' + (mfiPrets.length>0?Math.round(enRetard.length/mfiPrets.length*100):0) + '%\n';
    ctx += 'Total épargne: ' + fmtNum(epargne$) + ' F\n';
    ctx += 'Remboursements ce mois: ' + rembMois.length + ' | Montant: ' + fmtNum(rembMois$) + ' F\n';
  }

  // ── ÉGLISE ──
  if(type === 'eglise') {
    var membres   = DB.membres || [];
    var cultes    = DB.cultes  || [];
    var collectes = DB.collectes || [];
    var culteMois = cultes.filter(function(c){ return (c.date||'').startsWith(moisCourant); });
    var partTotal = cultes.reduce(function(s,c){ return s+Number(c.total||c.participants||0); },0);
    var partMois  = culteMois.reduce(function(s,c){ return s+Number(c.total||c.participants||0); },0);
    var offrTotal = collectes.reduce(function(s,c){ return s+Number(c.montant||0); },0);
    var hommes    = membres.filter(function(m){ return m.sexe==='Masculin'; }).length;
    var femmes    = membres.filter(function(m){ return m.sexe==='Féminin'; }).length;
    var jeunes    = membres.filter(function(m){ var a=Number(m.age||0); return a>=13&&a<=35; }).length;

    ctx += '=== DONNÉES ÉGLISE ===\n';
    ctx += 'Membres: ' + membres.length + ' (H:' + hommes + ' F:' + femmes + ' Jeunes:' + jeunes + ')\n';
    ctx += 'Cultes: ' + cultes.length + ' total | ' + culteMois.length + ' ce mois\n';
    ctx += 'Participation totale: ' + partTotal + ' | Ce mois: ' + partMois + '\n';
    ctx += 'Moyenne participation/culte: ' + (cultes.length>0?Math.round(partTotal/cultes.length):0) + '\n';
    ctx += 'Total offrandes/collectes: ' + fmtNum(offrTotal) + ' F\n';
    if(DB.coffreRegional) ctx += 'Rapports au coffre régional: ' + (DB.coffreRegional||[]).length + '\n';
  }

  // ── FOOTBALL ──
  if(type === 'football') {
    var joueurs  = DB.footJoueurs || [];
    var matchs   = DB.footMatchs  || [];
    var actifs   = joueurs.filter(function(j){ return j.statut==='Actif'; }).length;
    var victoires= matchs.filter(function(m){ return m.resultat==='Victoire'||m.resultat==='Gagné'; }).length;
    var nuls     = matchs.filter(function(m){ return m.resultat==='Nul'; }).length;
    var defaites = matchs.filter(function(m){ return m.resultat==='Défaite'||m.resultat==='Perdu'; }).length;
    var buts     = matchs.reduce(function(s,m){ return s+Number(m.scoreNous||0); },0);

    ctx += '=== DONNÉES FOOTBALL ===\n';
    ctx += 'Joueurs: ' + joueurs.length + ' (Actifs: ' + actifs + ')\n';
    ctx += 'Matchs: ' + matchs.length + ' | V:' + victoires + ' N:' + nuls + ' D:' + defaites + '\n';
    ctx += 'Buts marqués: ' + buts + '\n';
    if(matchs.length) ctx += 'Taux de victoire: ' + Math.round(victoires/matchs.length*100) + '%\n';
  }

  ctx += '\nRéponds à la question de manière précise, utilise les chiffres réels ci-dessus. ';
  ctx += 'Si tu fais des recommandations, base-les sur ces données. ';
  ctx += 'Formate bien ta réponse avec des emojis et des tirets pour la clarté.';
  return ctx;
}

async function sendAIMessage() {
  const input = document.getElementById('ai-input');
  const msg   = (input?.value || '').trim();
  if(!msg) return;
  input.value = '';
  addAIMessage(msg, 'user');

  const typingId = 'typing-' + Date.now();
  const msgsEl   = document.getElementById('ai-messages');
  const typing   = document.createElement('div');
  typing.id = typingId;
  typing.className = 'ai-msg-bot';
  typing.innerHTML = '<div class="ai-typing"><span></span><span></span><span></span></div>';
  msgsEl && msgsEl.appendChild(typing);
  msgsEl && msgsEl.scrollTo(0, msgsEl.scrollHeight);

  var GEMINI_KEY = document.getElementById('ai-panel').dataset.key || '';
  if(!GEMINI_KEY) {
    document.getElementById(typingId) && document.getElementById(typingId).remove();
    addAIMessage('Cle API non configuree. Contactez l administrateur.', 'bot');
    return;
  }

  var systemCtx = getEntrepriseContext();
  var prompt    = systemCtx + '\n\nQuestion: ' + msg;

  try {
    var url = 'https://generativelanguage.googleapis.com/v1/models/gemini-2.0-flash:generateContent?key=' + GEMINI_KEY;
    var res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { maxOutputTokens: 600, temperature: 0.7 }
      })
    });
    var data = await res.json();
    document.getElementById(typingId) && document.getElementById(typingId).remove();
    if(data.error) {
      addAIMessage('Erreur API: ' + data.error.message, 'bot');
      return;
    }
    var reply = (data.candidates && data.candidates[0] && data.candidates[0].content && 
                 data.candidates[0].content.parts && data.candidates[0].content.parts[0] && 
                 data.candidates[0].content.parts[0].text) || 'Pas de reponse.';
    addAIMessage(reply, 'bot');
  } catch(err) {
    document.getElementById(typingId) && document.getElementById(typingId).remove();
    addAIMessage('Erreur reseau: ' + err.message, 'bot');
  }
}


function addAIMessage(text, type) {
  const msgsEl = document.getElementById('ai-messages');
  if(!msgsEl) return;
  const div = document.createElement('div');
  div.className = type === 'user' ? 'ai-msg-user' : 'ai-msg-bot';
  // Convertir markdown basique
  div.innerHTML = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br>');
  msgsEl.appendChild(div);
  msgsEl.scrollTo(0, msgsEl.scrollHeight);
}

  _aiHistory = [];

var DISTRICTS_COUFFO = [
  'TOVIKLIN','LOKOGBA','LAGBAVE','DJAKOTOMEY','KLOUEKANMEY',
  'HLASSAME','DOGBO','BETOUMEY','ATOMEY','HOUEGAMEY','AZOVE'
]; // 11 Districts — Région du Couffo — MVCP BÉNIN

function initRegions() {
  // ══ MVCP BÉNIN — Structure nationale complète ══
  // Siège National → 12 Régions → Districts-Annexes

  // Charger la hiérarchie depuis la config entreprise
  var ent      = ENTREPRISES['mvcp_benin'];
  var REGIONS  = (ent && ent.hierarchie && ent.hierarchie.regions) || {
    'couffo': {
      nom     : 'Région du Couffo',
      couleur : '#f5a623',
      districts: DISTRICTS_COUFFO
    }
  };
  window.MVCP_REGIONS = REGIONS;

  // Initialiser les données de chaque district
  if(!DB.egliseAnnexes) DB.egliseAnnexes = {};
  Object.entries(REGIONS).forEach(function(re) {
    var regId = re[0], reg = re[1];
    (reg.districts||[]).forEach(function(nom) {
      var key = regId + '_' + nom;
      if(!DB.egliseAnnexes[key]) {
        DB.egliseAnnexes[key] = {
          nom        : nom,
          region     : reg.nom,
          regionId   : regId,
          membres    : [],
          cultes     : [],
          caisse     : { entrees:[], sorties:[] },
          responsable: '',
          tel        : '',
          ville      : nom
        };
      }
    });
  });

  // Afficher la grille des régions
  renderAnnexesGrid();

  // Coffre BÉNIN (siège national)
  renderCoffreBenin();

  // Stats globales
  var totalDistricts = Object.values(REGIONS).reduce(function(s,r){return s+(r.districts||[]).length;},0);
  var totalRegions   = Object.keys(REGIONS).length;
  var totalMembres   = Object.values(DB.egliseAnnexes||{}).reduce(function(s,d){return s+(d.membres||[]).length;},0);
  var totalRecettes  = Object.values(DB.egliseAnnexes||{}).reduce(function(s,d){
    return s + ((d.caisse?.entrees||[]).reduce(function(ss,e){return ss+Number(e.montant||0);},0));
  },0);

  // Stats dans la page
  var el1 = document.getElementById('reg-nb-districts');
  var el2 = document.getElementById('reg-nb-regions');
  var el3 = document.getElementById('reg-nb-membres');
  var el4 = document.getElementById('reg-total-membres');
  var el5 = document.getElementById('reg-total-recettes');
  if(el1) el1.textContent = totalDistricts;
  if(el2) el2.textContent = totalRegions;
  if(el3) el3.textContent = totalMembres;
  if(el4) el4.textContent = totalMembres;
  if(el5) el5.textContent = totalRecettes.toLocaleString('fr-FR') + ' F';
}

  var depenses  = Number(document.getElementById('rapport-depenses-dist')?.value||0);
  var solde     = recettes - depenses;
  var rapport = {
    id: Date.now(), district, periode, recettes, depenses, solde,
    hommes  : Number(document.getElementById('rapport-hommes')?.value||0),
    femmes  : Number(document.getElementById('rapport-femmes')?.value||0),
    jeunes  : Number(document.getElementById('rapport-jeunes')?.value||0),
    enfants : Number(document.getElementById('rapport-enfants-dist')?.value||0),
    creeLe  : new Date().toLocaleDateString('fr-FR'),
    // Transfert automatique après 6 jours
    transfertDate: new Date(Date.now() + 6*24*60*60*1000).toLocaleDateString('fr-FR'),
    transfertStatut: 'En attente'
  };
  rapport.totalParticipants = rapport.hommes+rapport.femmes+rapport.jeunes+rapport.enfants;
  DB.egliseRapports.push(rapport);
  saveToFirestore('egliseRapports', rapport);
  closeModal('modal-rapport-district');
  renderRapportsDistricts();
  toast('✅ Rapport enregistré — District: '+district+' | Période: '+periode);
}

function renderRapportsDistricts() {
  if(!DB.egliseRapports) DB.egliseRapports = [];
  var rapports = DB.egliseRapports;
  var today    = new Date();

  // Marquer les rapports à transférer (après 6 jours)
  rapports.forEach(function(r) {
    if(r.transfertStatut === 'En attente') {
      var dateCreation = new Date(r.creeLe.split('/').reverse().join('-'));
      var diffJours = (today - dateCreation) / (1000*60*60*24);
      if(diffJours >= 6) r.transfertStatut = 'Transféré vers MVCP BÉNIN';
    }
  });

  // Rapport compilé (tous districts)
  var el1 = document.getElementById('rapport-compile-list');
  if(el1) {
    if(!rapports.length) {
      el1.innerHTML = '<div style="color:var(--text3);font-size:12px">Aucun rapport</div>';
    } else {
      // Grouper par période
      var byPeriode = {};
      rapports.forEach(function(r) {
        if(!byPeriode[r.periode]) byPeriode[r.periode] = [];
        byPeriode[r.periode].push(r);
      });
      el1.innerHTML = Object.entries(byPeriode).slice(-3).reverse().map(function(e) {
        var p = e[0], raps = e[1];
        var totRec = raps.reduce(function(s,r){return s+Number(r.recettes||0);},0);
        var totDep = raps.reduce(function(s,r){return s+Number(r.depenses||0);},0);
        var totPart= raps.reduce(function(s,r){return s+Number(r.totalParticipants||0);},0);
        return '<div style="padding:10px;background:var(--surface);border-radius:8px;margin-bottom:8px;border:1px solid var(--border)">' +
          '<div style="font-weight:700;font-size:12px;color:var(--accent)">📅 '+p+' ('+raps.length+' districts)</div>' +
          '<div style="font-size:11px;color:#10b981">Recettes: '+fmtNum(totRec)+' F</div>' +
          '<div style="font-size:11px;color:#ef4444">Dépenses: '+fmtNum(totDep)+' F</div>' +
          '<div style="font-size:11px;font-weight:700">Solde: '+fmtNum(totRec-totDep)+' F</div>' +
          '<div style="font-size:11px;color:var(--text3)">👥 Total: '+totPart+' participants</div>' +
        '</div>';
      }).join('');
    }
  }

  // Rapports par district
  var el2 = document.getElementById('rapport-district-list');
  if(el2) {
    if(!rapports.length) {
      el2.innerHTML = '<div style="color:var(--text3);font-size:12px">Aucun rapport</div>';
    } else {
      el2.innerHTML = rapports.slice(-5).reverse().map(function(r) {
        var statColor = r.transfertStatut === 'Transféré vers MVCP BÉNIN' ? '#10b981' : '#f59e0b';

function updateStatsRegion() {
  if(!DB.egliseAnnexes) return;
  var annexes = Object.values(DB.egliseAnnexes);
  var totalMb = annexes.reduce(function(s,a){return s+(a.membres?a.membres.length:0);},0);
  var now = new Date(); var m=now.getMonth()+1; var y=now.getFullYear();
  var totalRec = 0;
  annexes.forEach(function(a) {
    (a.caisse||[]).forEach(function(op) {
      var d=new Date(op.date||'');
      if(op.type==='entree' && d.getMonth()+1===m && d.getFullYear()===y)
        totalRec += Number(op.montant||0);
    });
  });
  var rapportsAttente = annexes.filter(function(a){
    return (a.rapports||[]).some(function(r){return r.statut==='En attente';});
  }).length;
  document.getElementById('reg-nb-districts')      && (document.getElementById('reg-nb-districts').textContent = annexes.length);
  document.getElementById('reg-total-membres')      && (document.getElementById('reg-total-membres').textContent = totalMb);
  document.getElementById('reg-total-recettes')     && (document.getElementById('reg-total-recettes').textContent = fmtNum(totalRec)+' F');
  document.getElementById('reg-rapports-en-attente')&& (document.getElementById('reg-rapports-en-attente').textContent = rapportsAttente);
}

    var nbMembres = districts.reduce(function(s, nom) {
      var key = regId + '_' + nom;
      return s + ((DB.egliseAnnexes||{})[key]?.membres?.length || 0);
    }, 0);

    // En-tete region
    html += '<div style="margin-bottom:24px">';

      'background:linear-gradient(135deg,' + reg.couleur + '22,transparent);' +
      'border-left:4px solid ' + reg.couleur + ';border-radius:0 10px 10px 0">';

    html += '<div>';
    html += '<div style="font-family:Syne,sans-serif;font-weight:800;font-size:15px;color:' + reg.couleur + '">' + reg.nom + '</div>';
    html += '<div style="font-size:12px;color:var(--text3)">' + districts.length + ' districts &middot; ' + nbMembres + ' membres</div>';
    html += '</div>';

      'style="margin-left:auto;background:none;border:1px solid ' + reg.couleur + ';color:' + reg.couleur + ';' +
      'padding:4px 10px;border-radius:8px;cursor:pointer;font-size:11px">+ District</button>';
    html += '</div>';

    // Grille districts
    html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;padding:0 4px">';
    districts.forEach(function(nom) {
      var key      = regId + '_' + nom;
      var data     = (DB.egliseAnnexes||{})[key] || {};
      var nbMem    = (data.membres||[]).length;
      var nbCultes = (data.cultes||[]).length;
      var entrees  = (data.caisse?.entrees||[]).reduce(function(s,e){return s+Number(e.montant||0);},0);
      var sorties  = (data.caisse?.sorties||[]).reduce(function(s,e){return s+Number(e.montant||0);},0);
      var solde    = entrees - sorties;

      html += '<div data-key="' + key + '" onclick="showDistrictDetail(this.dataset.key)" ' +
        'style="background:var(--surface);border:1px solid var(--border);border-radius:12px;' +
        'padding:14px;cursor:pointer;transition:all .2s;border-top:3px solid ' + reg.couleur + '">';

      html += '<div style="font-weight:700;font-size:12px;color:var(--text);margin-bottom:4px">' + nom + '</div>';
      html += '<div style="font-size:11px;color:var(--text3)">' + nbMem + ' membres &middot; ' + nbCultes + ' cultes</div>';
      if(solde) {
        html += '<div style="font-size:10px;color:' + (solde >= 0 ? '#10b981' : '#ef4444') + ';font-weight:700;margin-top:4px">' +
          (solde >= 0 ? '+' : '') + solde.toLocaleString('fr-FR') + ' F</div>';

function ajouterDistrictRegion(regId) {
  var reg = (window.MVCP_REGIONS||{})[regId];
  if(!reg) return;
  var nom = prompt('Nom du nouveau district dans '+reg.nom+' :');
  if(!nom) return;
  nom = nom.toUpperCase().trim();
  if(!reg.districts) reg.districts = [];
  if(reg.districts.includes(nom)) { toast('District déjà existant'); return; }
  reg.districts.push(nom);
  var key = regId+'_'+nom;
  if(!DB.egliseAnnexes) DB.egliseAnnexes = {};
  DB.egliseAnnexes[key] = { nom:nom, region:reg.nom, regionId:regId, membres:[], cultes:[], caisse:{entrees:[],sorties:[]}, responsable:'', tel:'', ville:nom };
  renderAnnexesGrid();
  // Sauvegarder en Firestore
  if(window.FB) {
    var {db,doc,setDoc} = window.FB;
    setDoc(doc(db,'entreprises','mvcp_benin','egliseAnnexes',key), DB.egliseAnnexes[key], {merge:true});
  }
  toast('✅ District '+nom+' ajouté à '+reg.nom);
}


// ── Charger les cultes d'un district spécifique ──
function chargerCultesDistrict(districtNom) {
  if(!districtNom) return;
  var entId = (DB.currentUser && DB.currentUser.entreprise) || 'mvcp_benin';

  // Initialiser le district en mémoire si absent
  if(!DB.egliseAnnexes) DB.egliseAnnexes = {};
  if(!DB.egliseAnnexes[districtNom]) DB.egliseAnnexes[districtNom] = {cultes:[], caisse:[], membres:[]};
  if(!DB.egliseAnnexes[districtNom].cultes) DB.egliseAnnexes[districtNom].cultes = [];

  // 1. Charger depuis IDB local immédiatement
  idbLoad('cultes_'+districtNom).then(function(local) {
    if(local && local.length > 0) {
      DB.egliseAnnexes[districtNom].cultes = local;
      renderCultesDistrict();
      console.log('[MVCP] IDB district '+districtNom+': '+local.length+' cultes');
    }
  }).catch(function(){});

  // 2. Recharger depuis Firestore (source de vérité)
  if(window.FB && window.FB.db) {
    var FB = window.FB;
    var colRef = FB.collection(FB.db,
      'entreprises', entId,
      'egliseAnnexes', districtNom,
      'cultes'
    );
    FB.getDocs(colRef).then(function(snap) {
      if(snap.empty) {
        console.log('[MVCP] Firebase district '+districtNom+': 0 cultes');
        return;
      }
      var cultes = [];
      snap.forEach(function(d) {
        cultes.push(Object.assign({id:d.id}, d.data()));
      });
      // Trier par date
      cultes.sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });
      // Stocker UNIQUEMENT pour ce district (pas de partage)
      DB.egliseAnnexes[districtNom].cultes = cultes;
      // Sauvegarder en IDB avec clé district
      idbSave('cultes_'+districtNom, cultes).catch(function(){});
      renderCultesDistrict();
      console.log('[MVCP] Firebase district '+districtNom+': '+cultes.length+' cultes chargés');
    }).catch(function(e) {
      console.warn('[MVCP] Erreur chargement district '+districtNom+':', e);
    });
  }
}

// ══ MVCP Districts — Sauvegarde Firestore + IDB ══
async function saveDistrictToFirestore(districtNom) {
  if(!window.FB || !districtNom) return;
  var entId = DB.currentUser ? DB.currentUser.entreprise||'mvcp_benin' : 'mvcp_benin';
  var data  = DB.egliseAnnexes ? DB.egliseAnnexes[districtNom] : null;
  if(!data) return;

  try {
    var { db, doc, setDoc } = window.FB;
    // Sauvegarder dans Firestore
    await setDoc(doc(db,'entreprises',entId,'egliseAnnexes',districtNom),
      Object.assign({}, data, {nom:districtNom, maj:new Date().toISOString()}),
      {merge:true}
    );
    // Sauvegarder dans IDB aussi
    var allAnnexes = Object.entries(DB.egliseAnnexes||{}).map(function(e){
      return Object.assign({id:e[0]}, e[1]);
    });
    await idbSave('egliseAnnexes', allAnnexes);
    showSyncStatus('saved');
  } catch(e) {
    // Hors ligne: sauvegarder en IDB uniquement
    var allAnnexes2 = Object.entries(DB.egliseAnnexes||{}).map(function(e){
      return Object.assign({id:e[0]}, e[1]);
    });
    idbSave('egliseAnnexes', allAnnexes2);
    showSyncStatus('saved');
    console.warn('saveDistrictToFirestore offline:', e.message);
  }
}

function saveCaisseDistrict(type) {

function saveCulteDistrict(isDraft) {
  if(!_currentDistrict) { toast('❌ Aucun district sélectionné'); return; }
  var date = document.getElementById('culte-dist-date') && document.getElementById('culte-dist-date').value;
  if(!date){ toast('❌ Date obligatoire'); return; }
  isDraft = isDraft || false;

  var eg = Number((document.getElementById('cd-enf-g')||{}).value||0);
  var ef = Number((document.getElementById('cd-enf-f')||{}).value||0);
  var jg = Number((document.getElementById('cd-jeu-g')||{}).value||0);
  var jf = Number((document.getElementById('cd-jeu-f')||{}).value||0);
  var ah = Number((document.getElementById('cd-adu-h')||{}).value||0);
  var af = Number((document.getElementById('cd-adu-f')||{}).value||0);
  var offr = Number((document.getElementById('cd-offr')||{}).value||0);
  var dime = Number((document.getElementById('cd-dime')||{}).value||0);
  var prog = (document.getElementById('culte-dist-prog')||{}).value || '';

  var culte = {
    id: Date.now(),
    date: date,
    programme: prog,
    statut: isDraft ? 'brouillon' : 'validé',
    enfGarcons: eg, enfFilles: ef,
    jeuGarcons: jg, jeuFilles: jf,
    aduHommes: ah, aduFemmes: af,
    totEnfants: eg+ef, totJeunes: jg+jf, totAdultes: ah+af,
    total: eg+ef+jg+jf+ah+af,
    offr: offr, dime: dime
  };

  // 1. Sauvegarder en mémoire
  if(!DB.egliseAnnexes) DB.egliseAnnexes = {};
  if(!DB.egliseAnnexes[_currentDistrict]) DB.egliseAnnexes[_currentDistrict] = {cultes:[]};
  if(!DB.egliseAnnexes[_currentDistrict].cultes) DB.egliseAnnexes[_currentDistrict].cultes = [];
  DB.egliseAnnexes[_currentDistrict].cultes.push(culte);

  // 2. Sauvegarder en IDB
  idbSave('cultes_'+_currentDistrict, DB.egliseAnnexes[_currentDistrict].cultes).catch(function(){});

  // 3. Sauvegarder dans Firestore — collection plate simple
  var entId = (DB.currentUser && DB.currentUser.entreprise) || 'mvcp_benin';
  if(window.FB) {
    var FB = window.FB;
    var docRef = FB.doc(FB.db,
      'entreprises', entId,
      'egliseAnnexes', _currentDistrict,
      'cultes', String(culte.id)
    );
    FB.setDoc(docRef, culte).then(function(){
      toast('✅ Culte enregistré dans Firebase');
    }).catch(function(e){
      toast('✅ Culte enregistré localement');
      console.warn('Firestore saveCulteDistrict:', e);
    });
  } else {
    toast('✅ Culte enregistré (hors ligne)');
  }

  // 4. Fermer modal et rafraîchir
  closeModal('modal-culte-district');
  renderCultesDistrict();

  // Vider les champs
  ['cd-enf-g','cd-enf-f','cd-jeu-g','cd-jeu-f','cd-adu-h','cd-adu-f','cd-offr','cd-dime'].forEach(function(id){
    var el = document.getElementById(id); if(el) el.value = 0;
  });

  if(isDraft) {
    toast('📝 Culte sauvegardé en brouillon — vous pouvez continuer à enregistrer');
  } else {
    toast('✅ Culte validé et enregistré');
  }
}

function validerCulteDistrict(culteId) {
  if(!DB.egliseAnnexes || !DB.egliseAnnexes[_currentDistrict]) return;
  var cultes = DB.egliseAnnexes[_currentDistrict].cultes || [];
  var idx = cultes.findIndex(function(c){ return c.id === culteId; });
  if(idx >= 0) {
    cultes[idx].statut = 'validé';
    DB.egliseAnnexes[_currentDistrict].cultes = cultes;
    var entId = (DB.currentUser && DB.currentUser.entreprise) || 'mvcp_benin';
    if(window.FB) {
      window.FB.setDoc(
        window.FB.doc(window.FB.db, 'entreprises', entId, 'egliseAnnexes', _currentDistrict, 'cultes', String(culteId)),
        {statut: 'validé'}, {merge:true}
      ).catch(function(){});

    idbSave('cultes_'+_currentDistrict, cultes).catch(function(){});
    renderCultesDistrict();
    toast('✅ Culte validé');

}

// ── Rapport Mensuel → Coffre ──
function genererRapportDistrict() {
  if(!_currentDistrict||!DB.egliseAnnexes) return;
  var a=DB.egliseAnnexes[_currentDistrict];
  var periode=document.getElementById('rapport-mois-district')?.value;
  if(!periode){toast('Sélectionnez la période');return;}
  
  // Calculer automatiquement depuis les données
  var [annee,mois]=periode.split('-').map(Number);
  // Rapport: seulement les cultes VALIDÉS du mois
  var cultesMois=(a.cultes||[]).filter(function(c){
    var d=new Date(c.date||'');
    return d.getMonth()+1===mois && d.getFullYear()===annee && c.statut!=='brouillon';
  });
  var caisseMois=(a.caisse||[]).filter(function(o){var d=new Date(o.date||'');return d.getMonth()+1===mois&&d.getFullYear()===annee;});
  
  var recettes=caisseMois.filter(function(o){return o.type==='entree';}).reduce(function(s,o){return s+Number(o.montant||0);},0);
  var depenses=caisseMois.filter(function(o){return o.type==='sortie';}).reduce(function(s,o){return s+Number(o.montant||0);},0);
  
  var hommes=0,femmes=0,jeunes=0,enfants=0;
  cultesMois.forEach(function(c){hommes+=c.aduHommes||0;femmes+=c.aduFemmes||0;jeunes+=(c.totJeunes||0);enfants+=(c.totEnfants||0);});
  var moyPart=cultesMois.length>0?Math.round((hommes+femmes+jeunes+enfants)/cultesMois.length):0;

  var rapport={
    id:Date.now(), district:_currentDistrict, periode, recettes, depenses,
    solde:recettes-depenses, hommes, femmes, jeunes, enfants,
    totalParticipants:hommes+femmes+jeunes+enfants,
    nbCultes:cultesMois.length, moyParticipation:moyPart,
    statut:'En attente',
    dateCreation:new Date().toLocaleDateString('fr-FR'),
    dateTransfert: new Date(Date.now()+30*24*60*60*1000).toLocaleDateString('fr-FR') // fin du mois
  };
  
  if(!a.rapports) a.rapports=[];
  // Supprimer l'ancien rapport du même mois s'il existe
  a.rapports=a.rapports.filter(function(r){return r.periode!==periode;});
  a.rapports.push(rapport);
  
  // Aussi stocker dans le coffre régional
  if(!DB.coffreRegional) DB.coffreRegional=[];
  DB.coffreRegional=DB.coffreRegional.filter(function(r){return !(r.district===_currentDistrict&&r.periode===periode);});
  DB.coffreRegional.push(rapport);
  
  saveToFirestore('egliseAnnexes_'+_currentDistrict,a);
  saveToFirestore('coffreRegional',rapport);
  
  renderRapportsDistrictList();
  renderCoffreRegional();
  toast('✅ Rapport '+periode+' envoyé au Coffre Régional MVCP BÉNIN');
}

function renderCoffreBenin() {
  if(!DB.coffreRegional) DB.coffreRegional = [];
  var today = new Date();

  // Vérifier quels rapports compilés doivent être transférés vers BÉNIN
  // Règle: après 6 jours d'arrivée dans le coffre régional
  if(!DB.coffreBenin) DB.coffreBenin = [];

  // Grouper rapports régionaux par période
  var byPeriode = {};
  DB.coffreRegional.forEach(function(r) {
    if(!byPeriode[r.periode]) byPeriode[r.periode] = [];
    byPeriode[r.periode].push(r);
  });

  // Pour chaque période avec au moins 1 rapport, vérifier si 6 jours passés
  Object.entries(byPeriode).forEach(function(entry) {
    var periode = entry[0], rapports = entry[1];
    // Prendre la date la plus récente d'arrivée
    var dateArrivee = rapports.reduce(function(latest, r) {
      var d = new Date(r.creeLe ? r.creeLe.split('/').reverse().join('-') : today);
      return d > latest ? d : latest;
    }, new Date(0));

    var joursEcoules = (today - dateArrivee) / (1000*60*60*24);
    var dejaTransfere = DB.coffreBenin.some(function(b) { return b.periode === periode && b.region === 'Couffo'; });

    if(joursEcoules >= 6 && !dejaTransfere) {
      // Créer rapport compilé pour BÉNIN
      var totRec  = rapports.reduce(function(s,r){return s+Number(r.recettes||0);},0);
      var totDep  = rapports.reduce(function(s,r){return s+Number(r.depenses||0);},0);
      var totH    = rapports.reduce(function(s,r){return s+Number(r.hommes||0);},0);
      var totF    = rapports.reduce(function(s,r){return s+Number(r.femmes||0);},0);
      var totJ    = rapports.reduce(function(s,r){return s+Number(r.jeunes||0);},0);
      var totE    = rapports.reduce(function(s,r){return s+Number(r.enfants||0);},0);
      DB.coffreBenin.push({
        id: Date.now(), region: 'Couffo', periode: periode,
        nbDistricts: rapports.length, recettes: totRec, depenses: totDep,
        solde: totRec-totDep, hommes: totH, femmes: totF, jeunes: totJ, enfants: totE,
        totalParticipants: totH+totF+totJ+totE,
        dateTransfert: today.toLocaleDateString('fr-FR'),
        statut: 'Reçu au Siège'
      });
      saveToFirestore('coffreBenin', DB.coffreBenin[DB.coffreBenin.length-1]);
    }
  });

  // Afficher
  var totalRec  = DB.coffreBenin.reduce(function(s,b){return s+Number(b.recettes||0);},0);
  var totalPart = DB.coffreBenin.reduce(function(s,b){return s+Number(b.totalParticipants||0);},0);
  document.getElementById('benin-nb-rapports')      && (document.getElementById('benin-nb-rapports').textContent      = DB.coffreBenin.length);
  document.getElementById('benin-total-recettes')   && (document.getElementById('benin-total-recettes').textContent   = fmtNum(totalRec)+' F');
  document.getElementById('benin-total-participants')&& (document.getElementById('benin-total-participants').textContent = totalPart);

  var el = document.getElementById('coffre-benin-list');
  if(!el) return;

  if(!DB.coffreBenin.length) {

function forcerTransfertBenin() {
  if(!DB.coffreRegional || !DB.coffreRegional.length) {
    toast('Aucun rapport dans le Coffre Régional');
    return;
  }
  // Forcer le transfert immédiat
  if(!DB.coffreBenin) DB.coffreBenin = [];
  var byPeriode = {};
  DB.coffreRegional.forEach(function(r) {
    if(!byPeriode[r.periode]) byPeriode[r.periode] = [];
    byPeriode[r.periode].push(r);
  });

  var nb = 0;
  Object.entries(byPeriode).forEach(function(entry) {
    var periode = entry[0], rapports = entry[1];
    var dejaTransfere = DB.coffreBenin.some(function(b){return b.periode===periode&&b.region==='Couffo';});
    if(!dejaTransfere) {
      var totRec=rapports.reduce(function(s,r){return s+Number(r.recettes||0);},0);
      var totDep=rapports.reduce(function(s,r){return s+Number(r.depenses||0);},0);
      var totH=rapports.reduce(function(s,r){return s+Number(r.hommes||0);},0);
      var totF=rapports.reduce(function(s,r){return s+Number(r.femmes||0);},0);
      var totJ=rapports.reduce(function(s,r){return s+Number(r.jeunes||0);},0);
      var totE=rapports.reduce(function(s,r){return s+Number(r.enfants||0);},0);
      var b = {
        id:Date.now()+nb, region:'Couffo', periode,
        nbDistricts:rapports.length, recettes:totRec, depenses:totDep,
        solde:totRec-totDep, hommes:totH, femmes:totF, jeunes:totJ, enfants:totE,
        totalParticipants:totH+totF+totJ+totE,
        dateTransfert:new Date().toLocaleDateString('fr-FR'),
        statut:'Reçu au Siège'
      };
      DB.coffreBenin.push(b);
      saveToFirestore('coffreBenin', b);
      nb++;
    }
  });
  if(nb>0) {
    renderCoffreBenin();
    toast('✅ '+nb+' rapport(s) transféré(s) vers le Coffre MVCP BÉNIN');
  } else {
    toast('Tous les rapports sont déjà transférés');
  }
}

function preAddUser(entId) {

}

function updateRolesForEnt() {
  var entId = document.getElementById('new-user-ent')?.value;
  var ent   = ENTREPRISES[entId];
  var roleEl= document.getElementById('new-user-role');
  if(!roleEl || !ent) return;

  var rolesParType = {
    commerce    : ['directeur','gestionnaire','caissier'],
    ong         : ['directeur','gestionnaire','caissier'],
    hopital     : ['directeur','medecin','infirmier','caissier','gestionnaire'],
    ecole       : ['directeur','censeur','enseignant','professeur','secretaire','caissier'],
    microfinance: ['directeur','gestionnaire','caissier'],
    football    : ['president','entraineur','staff','caissier'],
    eglise      : ['directeur','gestionnaire','caissier']
  };

  var roles = rolesParType[ent.type] || ['directeur','gestionnaire','caissier'];
  roleEl.innerHTML = roles.map(function(r){
    return '<option value="'+r+'">'+r.charAt(0).toUpperCase()+r.slice(1)+'</option>';
  }).join('');

function saveNewUser() {
  var uid   = document.getElementById('new-user-uid')?.value?.trim();
  var nom   = document.getElementById('new-user-nom')?.value?.trim();
  var email = document.getElementById('new-user-email')?.value?.trim();
  var entId = document.getElementById('new-user-ent')?.value;
  var role  = document.getElementById('new-user-role')?.value;
  var admin = document.getElementById('new-user-admin')?.checked;

  if(!uid || !nom || !entId || !role) {
    toast('UID, nom, entreprise et rôle sont obligatoires');
    return;
  }

  // Ajouter dans ENTREPRISES en mémoire
  if(!ENTREPRISES[entId].users) ENTREPRISES[entId].users = {};
  ENTREPRISES[entId].users[uid] = {
    role : role,
    name : nom,
    email: email || '',
    pin  : null,
    admin: admin || false
  };

  // Sauvegarder dans Firestore
  if(window.FB) {
    var { db, doc, setDoc } = window.FB;
    setDoc(doc(db, 'entreprises', entId, 'config', 'users'), 
      ENTREPRISES[entId].users, {merge:true})
      .then(function(){ console.log('Utilisateur sauvegardé Firestore'); })
      .catch(function(e){ console.error(e); });
  }

  closeModal('modal-add-user');
  renderUsersAdmin();
  toast('✅ Utilisateur '+nom+' ajouté à '+ENTREPRISES[entId].nom);

  // Réinitialiser le formulaire
  ['new-user-uid','new-user-nom','new-user-email'].forEach(function(id){
    var el=document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('new-user-admin').checked = false;
}

function removeUser(entId, uid) {
  if(!confirm('Retirer cet utilisateur de '+ENTREPRISES[entId]?.nom+' ?')) return;
  if(ENTREPRISES[entId]?.users?.[uid]) {
    delete ENTREPRISES[entId].users[uid];
    renderUsersAdmin();
    toast('Utilisateur retiré');
  }
}

function copyUID(uid) {
  navigator.clipboard.writeText(uid).then(function(){
    toast('UID copié : '+uid.slice(0,12)+'...');
  }).catch(function(){
    // Fallback
    var el = document.createElement('textarea');
    el.value = uid;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    toast('UID copié !');
  });
}

async function loadDistrictsFromFirestore() {
  if(!window.FB) return;
  var { db, collection, getDocs } = window.FB;
  var entId = DB.currentUser ? DB.currentUser.entreprise : null;
  if(!entId) return;

  if(!DB.egliseAnnexes) DB.egliseAnnexes = {};

  try {
    // Charger tous les districts depuis Firestore
    var snap = await getDocs(collection(db, 'entreprises/'+entId+'/egliseAnnexes'));
    snap.docs.forEach(function(d) {
      var data = d.data();
      DB.egliseAnnexes[d.id] = Object.assign({
        nom:'', region:'', membres:[], cultes:[],
        caisse:{entrees:[],sorties:[]}, responsable:'', tel:'', ville:''
      }, data);
    });
    console.log('✅ Districts chargés:', Object.keys(DB.egliseAnnexes).length);
  } catch(e) {
    console.warn('loadDistrictsFromFirestore error:', e.message);
  }

  // Initialiser les districts manquants depuis MVCP_REGIONS
  var REGIONS = window.MVCP_REGIONS || {};
  Object.entries(REGIONS).forEach(function(re) {
    var regId = re[0], reg = re[1];
    (reg.districts||[]).forEach(function(nom) {
      var key = regId + '_' + nom;
      if(!DB.egliseAnnexes[key]) {
        DB.egliseAnnexes[key] = {
          nom:nom, region:reg.nom, regionId:regId,
          membres:[], cultes:[], caisse:{entrees:[],sorties:[]},
          responsable:'', tel:'', ville:nom
        };
      }
    });
  });

  renderAnnexesGrid();
  renderCoffreBenin();
}


async function chargerEntreprisesDynamiques() {
  if(!window.FB) return;
  try {
    var { db, collection, getDocs } = window.FB;
    var snap = await getDocs(collection(db, "config_entreprises"));
    var count = 0;
    snap.docs.forEach(function(d) {
      var data = d.data();
      var entId = data.entId || d.id;
      if(entId && !entId.startsWith("demo_")) {
        // Fusionner avec ENTREPRISES existant
        if(!ENTREPRISES[entId]) {
          ENTREPRISES[entId] = {
            nom     : data.nom     || entId,
            couleur : data.couleur || "#6c63ff",
            type    : data.type    || "commerce",
            users   : data.users   || {}
          };
          // Toujours ajouter l'admin
          if(!ENTREPRISES[entId].users["GU8y7JeJ7VYCPQf0vGyRKj38hLn1"]) {
            ENTREPRISES[entId].users["GU8y7JeJ7VYCPQf0vGyRKj38hLn1"] = {
              role:"directeur", name:"Jean Paul BOGNON",
              email:"jeanpaulbognon3@gmail.com", pin:null, admin:true
            };
          }
          // Ajouter le client
          if(data.clientUID && data.clientUID !== "GU8y7JeJ7VYCPQf0vGyRKj38hLn1") {
            ENTREPRISES[entId].users[data.clientUID] = {
              role : data.clientRole || "directeur",
              name : data.clientNom  || data.nom,
              email: data.clientEmail|| "",
              pin  : null,
              admin: true
            };
          }
          // Mettre à jour _ALLOWED_UID
          if(window._ALLOWED_UID) {
            Object.assign(window._ALLOWED_UID, ENTREPRISES[entId].users);
          }
          count++;

      window.ENTREPRISES = ENTREPRISES;

function ajouterSite() {
  var entId    = document.getElementById("site-ent-parent")?.value;
  var nom      = (document.getElementById("site-nom")?.value||"").trim();
  var ville    = (document.getElementById("site-ville")?.value||"").trim();
  var resp     = (document.getElementById("site-resp")?.value||"").trim();
  var tel      = (document.getElementById("site-tel")?.value||"").trim();
  var dirEmail = (document.getElementById("site-dir-email")?.value||"").trim();
  var dirNom   = (document.getElementById("site-dir-nom")?.value||"").trim();

  if(!entId || !nom || !ville) { toast("Entreprise, nom et ville obligatoires"); return; }

  // Générer l'ID du site
  var siteId = nom.toLowerCase()
    .normalize("NFD").replace(/[̀-ͯ]/g,"")
    .replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"")
    .slice(0,20);

  // Générer UID pour le directeur du site si email fourni
  var dirUID = dirEmail ? genUID(dirEmail, dirNom||nom) : null;

  // Créer le site
  if(!ENTREPRISES[entId].sites) ENTREPRISES[entId].sites = {};
  ENTREPRISES[entId].sites[siteId] = {
    nom        : nom,
    ville      : ville,
    responsable: resp,
    tel        : tel,
    users      : {}
  };

  // Ajouter le directeur du site
  if(dirUID && dirNom) {
    ENTREPRISES[entId].sites[siteId].users[dirUID] = {
      role : "directeur_site",
      name : dirNom,
      email: dirEmail,
      site : siteId,
      pin  : null
    };
    // Aussi dans les users de l'entreprise (avec restriction site)
    ENTREPRISES[entId].users[dirUID] = {
      role : "directeur_site",
      name : dirNom,
      email: dirEmail,
      site : siteId,  // ← Restreint à ce site
      pin  : null,
      admin: false
    };
    if(window._ALLOWED_UID) window._ALLOWED_UID[dirUID] = ENTREPRISES[entId].users[dirUID];
  }

  // Sauvegarder en Firestore
  sauvegarderSiteFirestore(entId, siteId, ENTREPRISES[entId].sites[siteId], dirUID, dirNom, dirEmail);

  loadSitesEntreprise();
  toast("✅ Site créé: " + nom + " | " + ville);

  // Reset formulaire
  ["site-nom","site-ville","site-resp","site-tel","site-dir-email","site-dir-nom"].forEach(function(id){
    var el = document.getElementById(id); if(el) el.value = "";
  });

  // Afficher le lien
  if(dirUID) {
    var lien = "https://jeanpaul329.github.io/dpgestpro/?ent="+entId+"&site="+siteId;
    setTimeout(function(){
      alert("Site cree ! Lien: " + lien);
    },300);
  }
}

async function sauvegarderSiteFirestore(entId, siteId, siteData, dirUID, dirNom, dirEmail) {
  if(!window.FB) return;
  try {
    var { db, doc, setDoc } = window.FB;
    await setDoc(doc(db, "entreprises", entId, "sites", siteId), {
      ...siteData,
      entId   : entId,
      siteId  : siteId,
      dirUID  : dirUID||"",
      dirNom  : dirNom||"",
      dirEmail: dirEmail||"",
      creeLe  : new Date().toLocaleDateString("fr-FR")
    }, {merge:true});
    // Mettre à jour aussi les users de l'entreprise
    if(dirUID) {
      await setDoc(doc(db, "config_entreprises", entId), {
        users: ENTREPRISES[entId].users
      }, {merge:true});
    }
  } catch(e) { console.error("Erreur sauvegarde site:", e); }
}

async function chargerSitesFirestore(entId) {
  if(!window.FB || !entId) return;
  try {
    var { db, collection, getDocs } = window.FB;
    var snap = await getDocs(collection(db, "entreprises/"+entId+"/sites"));
    if(!ENTREPRISES[entId]) return;
    if(!ENTREPRISES[entId].sites) ENTREPRISES[entId].sites = {};
    snap.docs.forEach(function(d) {
      var data = d.data();
      var sid  = d.id;
      ENTREPRISES[entId].sites[sid] = data;
      // Ajouter le directeur dans les users
      if(data.dirUID && !ENTREPRISES[entId].users[data.dirUID]) {
        ENTREPRISES[entId].users[data.dirUID] = {
          role : "directeur_site",
          name : data.dirNom || "",
          email: data.dirEmail || "",
          site : sid,
          pin  : null
        };
        if(window._ALLOWED_UID) window._ALLOWED_UID[data.dirUID] = ENTREPRISES[entId].users[data.dirUID];
      }
    });
    console.log("Sites chargés pour " + entId + ": " + Object.keys(ENTREPRISES[entId].sites).length);
  } catch(e) { console.warn("Sites non chargés:", e.message); }
}

function renderLicencesAdmin() {
  // Peupler le select entreprises
  var sel = document.getElementById("lic-entid");

  }

  // Mettre date par défaut
  var debut = document.getElementById("lic-debut");
  if(debut && !debut.value) debut.value = new Date().toISOString().split("T")[0];

  getDocs(collection(db, "licences")).then(function(snap) {

      el.innerHTML = "<div style='text-align:center;padding:20px;color:var(--text3)'>Aucune licence. Créez la première ci-dessus.</div>";
      return;
    }
    var html = "<table class='table'><thead><tr><th>Entreprise</th><th>Forfait</th><th>Début</th><th>Fin</th><th>Montant</th><th>Statut</th><th></th></tr></thead><tbody>";
    snap.docs.forEach(function(d) {
      var lic = d.data();
      var entNom = ENTREPRISES[lic.entId]?.nom || lic.entId;
      var fin    = new Date(lic.fin || "");
      var now    = new Date();
      var jours  = Math.ceil((fin - now) / (1000*60*60*24));
      var statut = jours > 0
        ? "<span style='color:#10b981;font-weight:700'>✅ Active ("+jours+"j)</span>"
        : "<span style='color:var(--danger);font-weight:700'>❌ Expirée</span>";
      html += "<tr>" +
        "<td><b>"+entNom+"</b></td>" +
        "<td>"+lic.forfait+"</td>" +
        "<td>"+(lic.debut||"-")+"</td>" +
        "<td>"+(lic.fin||"-")+"</td>" +
        "<td style='color:var(--accent)'>"+(lic.montant||0)+" F</td>" +
        "<td>"+statut+"</td>" +
        "<td><button data-id='"+d.id+"' onclick='supprimerLicence(this.dataset.id)' style='background:none;border:none;cursor:pointer;font-size:14px;color:var(--danger)'>🗑</button></td>" +
      "</tr>";
    });

    el.innerHTML = html;
  }).catch(function(e) {
    el.innerHTML = "<div style='color:var(--danger)'>Erreur: "+e.message+"</div>";
  });
}

async function creerLicence() {
  var entId   = document.getElementById("lic-entid")?.value;
  var forfait = document.getElementById("lic-forfait")?.value;
  var debut   = document.getElementById("lic-debut")?.value;
  var montant = Number(document.getElementById("lic-montant")?.value||0);
  var mode    = document.getElementById("lic-mode")?.value;
  var ref     = document.getElementById("lic-ref")?.value?.trim();

  if(!entId || !forfait || !debut) { toast("Entreprise, forfait et date sont obligatoires"); return; }

  // Calculer la fin selon le forfait
  var durees = { mensuel:30, trimestriel:90, semestriel:180, annuel:365 };
  var jours  = durees[forfait] || 30;
  var finDate = new Date(debut);
  finDate.setDate(finDate.getDate() + jours);
  var fin = finDate.toISOString().split("T")[0];

  if(!window.FB) { toast("Firebase non disponible"); return; }
  try {
    var { db, doc, setDoc } = window.FB;
    var licId = entId + "_" + Date.now();
    await setDoc(doc(db, "licences", licId), {
      entId, forfait, debut, fin, montant, mode, ref: ref||"",
      creeLe: new Date().toLocaleDateString("fr-FR"),
      actif: true
    });
    // Mettre à jour LICENCES en mémoire
    if(window.LICENCES) LICENCES[entId] = { actif:true, fin, forfait };
    toast("✅ Licence créée pour "+ENTREPRISES[entId]?.nom+" — expire le "+fin);
    renderLicencesAdmin();
    // Reset
    document.getElementById("lic-montant").value = "0";
    document.getElementById("lic-ref").value = "";
  } catch(e) {
    toast("Erreur: "+e.message);
  }
}

async function supprimerLicence(licId) {
  if(!confirm("Supprimer cette licence ?")) return;
  if(!window.FB) return;
  try {
    var { db, doc, deleteDoc } = window.FB;
    await deleteDoc(doc(db, "licences", licId));
    toast("Licence supprimée");
    renderLicencesAdmin();
  } catch(e) { toast("Erreur: "+e.message); }
}

    var html = "<table class='table'><thead><tr><th>Entreprise</th><th>Forfait</th><th>Montant</th><th>Mode</th><th>Date</th><th>Statut</th><th>Action</th></tr></thead><tbody>";
    snap.docs.forEach(function(d) {
      var dem = d.data();
      var statBadge = dem.statut === "validee"
        ? "<span style='color:#10b981'>✅ Validée</span>"
        : dem.statut === "rejetee"
          ? "<span style='color:var(--danger)'>❌ Rejetée</span>"
          : "<span style='color:#f59e0b'>⏳ En attente</span>";
      var actions = dem.statut === "en_attente"
        ? "<button data-id='"+d.id+"' data-ent='"+dem.entId+"' data-forfait='"+dem.forfait+"' onclick='validerDemande(this.dataset.id,this.dataset.ent,this.dataset.forfait)' class='btn-sm btn-add' style='font-size:11px'>✅ Valider</button> " +
          "<button data-id='"+d.id+"' onclick='rejeterDemande(this.dataset.id)' class='btn-sm btn-outline' style='font-size:11px;color:var(--danger)'>❌ Rejeter</button>"
        : "";
      html += "<tr>" +
        "<td><b>"+(dem.entNom||dem.entId||"-")+"</b></td>" +
        "<td>"+(dem.forfait||"-")+"</td>" +
        "<td style='color:var(--accent)'>"+(dem.montant||0)+" F</td>" +
        "<td>"+(dem.mode||"-")+"</td>" +
        "<td>"+(dem.date||dem.creeLe||"-")+"</td>" +
        "<td>"+statBadge+"</td>" +
        "<td>"+actions+"</td>" +
      "</tr>";
    });
    html += "</tbody></table>";
    el.innerHTML = html;
  }).catch(function(e) {
    el.innerHTML = "<div style='color:var(--danger)'>Erreur: "+e.message+"</div>";
  });
}

async function validerDemande(demId, entId, forfait) {
  if(!confirm("Valider et créer la licence pour "+ENTREPRISES[entId]?.nom+" ?")) return;

  document.getElementById("lic-entid") && (document.getElementById("lic-entid").value = entId);
  document.getElementById("lic-forfait") && (document.getElementById("lic-forfait").value = forfait||"mensuel");
  document.getElementById("lic-debut") && (document.getElementById("lic-debut").value = new Date().toISOString().split("T")[0]);
  await creerLicence();
  // Marquer demande comme validée
  if(window.FB) {

}

async function boostEntreprisesFirestore() {
  if(!window.FB) { toast('Firebase non disponible'); return; }
  if(!isGlobalAdmin()) { toast('Action réservée à l\'administrateur'); return; }
  var { db, doc, setDoc, getDoc } = window.FB;
  
  try {
    // Vérifier si déjà fait aujourd'hui
    var metaSnap = await getDoc(doc(db, 'config_admin', 'boost_meta'));
    var today    = new Date().toISOString().split('T')[0];
    if(metaSnap.exists() && metaSnap.data().lastBoost === today) {
      console.log('Boost déjà fait aujourd\'hui');
      return;
    }
    
    var count = 0;
    for(var entId in ENTREPRISES) {
      if(entId.startsWith('demo_')) continue;
      var ent = ENTREPRISES[entId];
      // Sauvegarder la config de base dans Firestore
      await setDoc(doc(db, 'config_entreprises', entId), {
        entId   : entId,
        nom     : ent.nom,
        couleur : ent.couleur,
        type    : ent.type,
        actif   : true,
        maj     : today
      }, {merge: true});
      count++;
    }
    
    // Marquer le boost comme fait
    await setDoc(doc(db, 'config_admin', 'boost_meta'), {
      lastBoost : today,
      nbEnts    : count,
      par       : DB.currentUser?.email || 'admin'
    });
    
    console.log('✅ Boost Firestore: ' + count + ' entreprises sauvegardées');
    toast('✅ ' + count + ' entreprises synchronisées Firestore');
  } catch(e) {
    console.warn('Boost Firestore error:', e.message);
  }
}

async function clearIDBData() {
  if(!confirm('Vider les données locales IndexedDB de cette entreprise ?\nLes données Firestore cloud restent intactes.')) return;
  var stores = ['products','clients','ventes','purchases','projects','expenses','employees','salaires','journees'];
  for(var i=0; i<stores.length; i++) {
    try { await openIDB().then(function(db){
      var tx=db.transaction(stores[i],'readwrite'); tx.objectStore(stores[i]).clear();
    }); } catch(e) {}
  }
  toast('🗑 Données locales vidées — rechargement...');
  setTimeout(function(){ location.reload(); }, 1500);
}

function exportLocalData() {
  var entId = DB.currentUser ? DB.currentUser.entreprise||'default' : 'default';

    entreprise : entId,
    products   : DB.products  ||[],

    purchases  : DB.purchases ||[],
    projects   : DB.projects  ||[],
    employees  : DB.employees ||[],
  };
  var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});

  toast('✅ Données exportées en JSON');
}

          '</div>' +
          '<div style="font-size:13px;font-weight:700;color:#2ed573">+'+fmtNum(r.montant)+' F</div>' +
        '</div>';
      }).join('') :
      '<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">Aucun remboursement</div>') +
      '<div style="margin-top:10px;font-size:13px;font-weight:700;color:#2ed573">Total: '+fmtNum(totalRembourse)+' F</div>' +
    '</div>' +

    // Card 3: Épargne membres
    '<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px">' +

function mkMfiBarre(label, val, total, color) {
  var pct = total > 0 ? Math.round(val/total*100) : 0;
  return '<div>' +
    '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">' +
      '<span style="color:var(--text2)">'+label+'</span>' +
      '<span style="font-weight:700;color:'+color+'">'+val+' ('+pct+'%)</span>' +
    '</div>' +
    '<div style="height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden">' +
      '<div style="height:100%;width:'+pct+'%;background:'+color+';border-radius:3px;transition:width .5s"></div>' +
    '</div>' +
  '</div>';
}

// CS TOHOU — Recherche patient dans consultation
// ══════════════════════════════════════════════════
function rechercherPatientCons(q) {
  var box = document.getElementById('cons-pat-suggestions');
  if(!box) return;
  if(!q || q.length < 2) { box.style.display='none'; return; }

  var pts = DB.patients || [];
  var ql  = q.toLowerCase();
  var found = pts.filter(function(p) {
    return (p.nom||'').toLowerCase().includes(ql) ||
           (p.prenom||'').toLowerCase().includes(ql) ||
           (p.dossier||'').toLowerCase().includes(ql) ||
           (p.telephone||'').includes(q);
  }).slice(0, 8);

  if(!found.length) {
    box.innerHTML = '<div style="padding:14px;text-align:center;color:var(--text3);font-size:12px">Aucun patient trouvé<br><small>Vérifiez le nom ou inscrivez un nouveau patient</small></div>';
    box.style.display = 'block';
    return;
  }

  box.innerHTML = '';
  box.style.display = 'block';

  found.forEach(function(p) {
    // Calculer âge
    var age = p.dateNaissance ? calcAge(p.dateNaissance) + ' ans' : (p.age ? p.age+' ans' : '');
    // Dernière consultation
    var cons = (DB.consultations||[]).filter(function(c){ return String(c.patientId)===String(p.id); });
    var dernier = cons.length ? cons.slice(-1)[0].date : null;

    var div = document.createElement('div');
    div.style.cssText = 'padding:10px 14px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.05);transition:background .15s';
    div.onmouseenter = function(){ this.style.background='rgba(0,180,216,.1)'; };
    div.onmouseleave = function(){ this.style.background=''; };
    div.onclick = function(){ selectionnerPatientCons(p.id); };

    var html = '<div style="display:flex;align-items:center;gap:10px">'
      + '<div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#00b4d8,#0077b6);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">🧑‍⚕️</div>'
      + '<div style="flex:1;min-width:0">'
        + '<div style="font-weight:700;font-size:13px">' + (p.nom||'') + ' ' + (p.prenom||'') + '</div>'
        + '<div style="font-size:11px;color:var(--text2)">'
          + 'N°' + (p.dossier||p.id) + (age?' · '+age:'') + (p.sexe?' · '+p.sexe:'')
        + '</div>'
        + (dernier ? '<div style="font-size:10px;color:var(--accent)">Dernière visite: '+dernier+'</div>' : '')
      + '</div>'
      + '<div style="font-size:11px;color:var(--text3)">' + cons.length + ' visite(s)</div>'
    + '</div>';

    div.innerHTML = html;
    box.appendChild(div);
  });
}

function selectionnerPatientCons(patId) {
  var p = (DB.patients||[]).find(function(x){ return String(x.id)===String(patId); });
  if(!p) return;

  // Remplir le champ caché
  document.getElementById('cons-patient').value = patId;
  var inp = document.getElementById('cons-pat-search');
  if(inp) inp.value = p.nom + ' ' + (p.prenom||'') + '  (N°' + (p.dossier||patId) + ')';

  // Fermer suggestions
  var box = document.getElementById('cons-pat-suggestions');
  if(box) box.style.display = 'none';

  // Afficher la fiche
  afficherFichePatient(p);
}

function afficherFichePatient(p) {
  var fiche = document.getElementById('cons-pat-fiche');
  if(!fiche) return;
  fiche.style.display = 'block';

  var age = p.dateNaissance ? calcAge(p.dateNaissance) + ' ans' : (p.age ? p.age+' ans' : '?');
  document.getElementById('fiche-nom').textContent = (p.nom||'') + ' ' + (p.prenom||'');

  document.getElementById('fiche-infos').textContent =
    'N° ' + (p.dossier||p.id) +
    ' · ' + (p.sexe||'') +
    ' · ' + age +
    (p.telephone ? ' · 📞 '+p.telephone : '') +
    (p.groupeSanguin ? ' · 🩸 '+p.groupeSanguin : '');

  // Historique des consultations
  var cons = (DB.consultations||[])
    .filter(function(c){ return String(c.patientId)===String(p.id); })
    .sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); })
    .slice(0, 3);

  var hist = document.getElementById('fiche-historique');
  var dern = document.getElementById('fiche-derniere');

  if(cons.length) {
    dern.textContent = '📅 Dernière visite: ' + cons[0].date + (cons[0].motif ? ' — '+cons[0].motif : '');
    hist.innerHTML = '<div style="font-size:11px;font-weight:700;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px">Historique récent</div>'
      + cons.map(function(c) {
          return '<div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px">'
            + '<span style="color:var(--text3);min-width:75px">'+c.date+'</span>'
            + '<span style="flex:1;color:var(--text2)">'+(c.motif||c.diagnostic||'Consultation')+'</span>'
            + (c.medecin?'<span style="color:var(--text3);font-size:10px">Dr '+c.medecin+'</span>':'')
          + '</div>';
        }).join('');
  } else {
    dern.textContent = '🆕 Première consultation';
    hist.innerHTML = '<div style="font-size:11px;color:var(--text3);text-align:center;padding:6px">Aucun antécédent enregistré</div>';
  }
}

function deselectionnerPatient() {
  document.getElementById('cons-patient').value = '';
  var inp = document.getElementById('cons-pat-search');
  if(inp) { inp.value = ''; inp.focus(); }
  var fiche = document.getElementById('cons-pat-fiche');
  if(fiche) fiche.style.display = 'none';
  var dern = document.getElementById('fiche-derniere');
  if(dern) dern.textContent = '';
}

// ── Service Worker Registration ──────────────────
if('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    // Créer le SW inline (blob) pour éviter un fichier séparé
    var swCode = [
      'const CACHE = "dpgestpro-v3";',
      'const ASSETS = ["/"];',
      'self.addEventListener("install", function(e) {',
      '  e.waitUntil(caches.open(CACHE).then(function(c){ return c.addAll(ASSETS); }));',
      '  self.skipWaiting();',
      '});',
      'self.addEventListener("activate", function(e) {',
      '  e.waitUntil(caches.keys().then(function(keys){',
      '    return Promise.all(keys.filter(function(k){return k!==CACHE;}).map(function(k){return caches.delete(k);}));',
      '  }));',
      '  self.clients.claim();',
      '});',
      'self.addEventListener("fetch", function(e) {',
      '  if(e.request.method !== "GET") return;',
      '  e.respondWith(',
      '    caches.match(e.request).then(function(cached) {',
      '      var fresh = fetch(e.request).then(function(resp) {',
      '        if(resp && resp.status === 200) {',
      '          var clone = resp.clone();',
      '          caches.open(CACHE).then(function(c){ c.put(e.request, clone); });',
      '        }',
      '        return resp;',
      '      }).catch(function(){ return cached; });',
      '      return cached || fresh;',
      '    })',
      '  );',
      '});',
    ].join("\n");
    var blob = new Blob([swCode], {type: 'application/javascript'});
    var swUrl = URL.createObjectURL(blob);
    navigator.serviceWorker.register(swUrl).then(function(reg) {
      console.log('[SW] Enregistré — mode hors ligne actif');
    }).catch(function(e) {
      console.warn('[SW] Non disponible:', e.message);
    });
  });
}


function initArchives() {
  var anneeEl = document.getElementById('arch-annee');
  if(anneeEl && !anneeEl.options.length) {
    var now = new Date().getFullYear();
    for(var a=now; a>=now-5; a--) {
      var o=document.createElement('option'); o.value=a; o.textContent=a;
      if(a===now) o.selected=true;
      anneeEl.appendChild(o);
    }
  }
  var ent  = ENTREPRISES[DB.currentUser && DB.currentUser.entreprise];
  var type = ent ? ent.type : 'commerce';
  var tabs = getArchivesTabs(type);
  var tabsEl = document.getElementById('arch-tabs');
  if(tabsEl) {
    tabsEl.innerHTML = '';
    tabs.forEach(function(tab, i) {
      var btn = document.createElement('button');
      btn.className = 'btn-sm '+(i===0?'btn-add':'btn-outline');
      btn.innerHTML = tab.icon+' '+tab.label;
      btn.dataset.tab = tab.key;
      btn.style.cssText = 'padding:7px 14px;font-size:12px;font-weight:700;border-radius:8px;cursor:pointer;margin-right:4px;margin-bottom:4px';
      btn.onclick = function(){
        tabsEl.querySelectorAll('button').forEach(function(b){b.className='btn-sm btn-outline';});
        btn.className='btn-sm btn-add';
        window._archTab = tab.key;
        renderArchives();
      };
      tabsEl.appendChild(btn);
    });
    window._archTab = tabs[0]?tabs[0].key:'ventes';
  }
  renderArchives();
}

    ong         :[{key:'ventes',icon:'&#128176;',label:'Recettes'},{key:'depenses',icon:'&#128184;',label:'D&#233;penses'},{key:'projets',icon:'&#128203;',label:'Projets'}],
    hopital     :[{key:'consultations',icon:'&#129338;',label:'Consultations'},{key:'patients',icon:'&#129657;',label:'Patients'},{key:'factures',icon:'&#129534;',label:'Factures'},{key:'depenses',icon:'&#128184;',label:'D&#233;penses'}],
    ecole       :[{key:'eleves',icon:'&#127891;',label:'El&#232;ves'},{key:'notes',icon:'&#128221;',label:'Notes'},{key:'paiements',icon:'&#128176;',label:'Paiements'},{key:'presences',icon:'&#128197;',label:'Pr&#233;sences'},{key:'examens',icon:'&#127942;',label:'Examens'}],
    eglise      :[{key:'cultes',icon:'&#128591;',label:'Cultes'},{key:'collectes',icon:'&#128176;',label:'Collectes'},{key:'membres',icon:'&#128101;',label:'Membres'},{key:'rapports',icon:'&#128202;',label:'Rapports mensuels'},{key:'coffre',icon:'&#128452;',label:'Coffre'}],
    microfinance:[{key:'prets',icon:'&#128179;',label:'Pr&#234;ts'},{key:'remboursements',icon:'&#8617;&#65039;',label:'Remboursements'},{key:'epargne',icon:'&#127974;',label:'Epargne'},{key:'caisse',icon:'&#128176;',label:'Caisse'}],
    football    :[{key:'matchs',icon:'&#9917;',label:'Matchs'},{key:'joueurs',icon:'&#128100;',label:'Joueurs'},{key:'entrainements',icon:'&#127939;',label:'Entra&#238;nements'},{key:'finances',icon:'&#128176;',label:'Finances'}],
  };
  return map[type]||map.commerce;
}

function renderArchives() {
  var annee = (document.getElementById('arch-annee')||{}).value || String(new Date().getFullYear());
  var mois  = (document.getElementById('arch-mois') ||{}).value || '';
  var tab   = window._archTab || 'ventes';
  var el    = document.getElementById('arch-content');
  if(!el) return;
  var ent  = ENTREPRISES[DB.currentUser && DB.currentUser.entreprise];
  var type = ent ? ent.type : 'commerce';
  var data = getArchivesData(type, tab, annee, mois);
  el.innerHTML = buildArchivesHTML(type, tab, data, annee, mois);
}

function getArchivesData(type, tab, annee, mois) {
  var fil = function(arr, f) {
    return (arr||[]).filter(function(x){
      var d = x[f]||x.date||x.createdAt||x.dateEnreg||'';
      var s = typeof d==='string'?d:(d&&d.toDate?d.toDate().toISOString():'');
      if(!s) return false;
      if(annee && !s.startsWith(String(annee))) return false;
      if(mois && s.slice(5,7)!==mois) return false;
      return true;
    });
  };
  var m = {
    ventes:fil((DB.sales||[]).concat(DB.ventes||[]),'date'),
    depenses:fil(DB.expenses||[],'date'),
    clients:fil(DB.clients||[],'dateEnreg'),
    achats:fil(DB.purchases||[],'date'),
    projets:fil(DB.projects||[],'date'),
    consultations:fil(DB.consultations||[],'date'),
    patients:fil(DB.patients||[],'dateEnreg'),
    factures:fil(DB.factures||[],'date'),
    eleves:fil(DB.ecoleEleves||[],'dateEnreg'),
    notes:fil(DB.ecoleNotes||[],'date'),
    paiements:fil(DB.ecolePaiements||[],'date'),
    presences:fil(DB.ecolePresences||[],'date'),
    examens:fil(DB.ecoleExamens||[],'date'),
    cultes:fil(DB.cultes||[],'date'),
    collectes:fil(DB.collectes||[],'date'),
    membres:DB.membres||[],
    rapports:(DB.coffreRegional||[]).filter(function(r){ return (!annee||r.periode.startsWith(String(annee)))&&(!mois||r.periode.slice(5,7)===mois); }),
    coffre:DB.coffreBenin||[],
    prets:fil(DB.mfiPrets||[],'dateDebut'),
    remboursements:fil(DB.mfiRemboursements||[],'date'),
    epargne:fil(DB.mfiEpargne||[],'date'),
    caisse:fil(DB.mfiCaisse||[],'date'),
    matchs:fil(DB.footMatchs||[],'date'),
    joueurs:DB.footJoueurs||[],
    entrainements:fil(DB.footEntrainements||[],'date'),
    finances:fil(DB.footFinances||[],'date'),
  };
  return m[tab]||[];
}

function buildArchivesHTML(type, tab, data, annee, mois) {
  var periode = annee+(mois?'-'+mois:'');
  if(!data.length) return '<div style="text-align:center;padding:60px;color:var(--text3)"><div style="font-size:48px;margin-bottom:12px">&#128205;</div><div style="font-weight:700">Aucune donn&#233;e pour '+periode+'</div></div>';
  return '<div>'+buildArchivesStats(tab,data)+buildArchivesTable(tab,data)+'<div style="font-size:11px;color:var(--text3);margin-top:8px;text-align:right">'+data.length+' enregistrement(s) — P&#233;riode: '+periode+'</div></div>';
}

function exportArchivesPDF() {
  var annee=(document.getElementById('arch-annee')||{}).value||new Date().getFullYear();
  var mois=(document.getElementById('arch-mois')||{}).value||'';
  var tab=window._archTab||'ventes';
  var ent=ENTREPRISES[DB.currentUser&&DB.currentUser.entreprise];
  var data=getArchivesData(ent?ent.type:'commerce',tab,annee,mois);
  var today=new Date().toLocaleDateString('fr-FR');
  if(!data.length){toast('Aucune donn&#233;e');return;}
  var rows=buildArchivesTable(tab,data)
    .replace(/var\(--success\)/g,'#10b981').replace(/var\(--danger\)/g,'#ef4444')
    .replace(/var\(--surface\)/g,'#fff').replace(/var\(--border\)/g,'#e5e7eb')
    .replace(/var\(--text3\)/g,'#666').replace(/var\(--accent\)/g,'#6c63ff');
  var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Archives</title>'
    +'<style>body{font-family:Arial;padding:20px;font-size:12px}h1{color:#6c63ff}'
    +'table{width:100%;border-collapse:collapse}th{background:#6c63ff;color:#fff;padding:7px 10px}'
    +'td{padding:6px 10px;border-bottom:1px solid #f0f0f0}tr:nth-child(even) td{background:#f9fafb}</style>'
    +'</head><body><h1>Archives — '+(ent?ent.nom:'')+'</h1>'
    +'<p>P&#233;riode: '+annee+(mois?'-'+mois:'')+' | Module: '+tab+' | '+today+'</p>'
    +rows
    +'<\u003cscript>window.onload=function(){window.print();}<\/script><\/body><\/html>';
  var w=window.open('','_blank');
  if(w){w.document.write(html);w.document.close();}
}

// ════════════════════════════════════════════════
function loginAvecEmail() {
  var email = (document.getElementById('login-email-input')||{}).value||'';
  var pw    = (document.getElementById('login-pw-input')||{}).value||'';
  email = email.trim(); pw = pw.trim();
  var errEl = document.getElementById('login-error');
  if(!email||!pw) {
    if(errEl){errEl.style.display='block';errEl.textContent='Entrez votre email et mot de passe';}
    return;
  }
  if(errEl) errEl.style.display='none';
  var btn = document.querySelector('#login-email-form button');
  if(btn) {btn.disabled=true; btn.textContent='Connexion...';}

  fetch('https://identitytoolkit.googleapis.com/v1/accounts:signInWithPassword?key=AIzaSyDCqoYZLBK0ipbotTejMCAvYGxrkomGIGk',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({email:email,password:pw,returnSecureToken:true})
  })
  .then(function(r){return r.json();})
  .then(function(d){
    if(btn){btn.disabled=false;btn.textContent='🔐 Se connecter';}
    if(d.error){
      var m=d.error.message||'Erreur';
      if(m.includes('EMAIL_NOT_FOUND')||m.includes('INVALID_EMAIL'))m='Email introuvable';
      else if(m.includes('INVALID_PASSWORD')||m.includes('WRONG_PASSWORD')||m.includes('INVALID_LOGIN'))m='Mot de passe incorrect';
      else if(m.includes('TOO_MANY'))m='Trop de tentatives. Réessayez plus tard.';
      if(errEl){errEl.style.display='block';errEl.textContent='❌ '+m;}
      return;
    }
    localStorage.setItem('dp_last_email', d.email||email);
    var fbUser={uid:d.localId,email:d.email,displayName:d.displayName||(d.email||'').split('@')[0],
      photoURL:null,getIdToken:function(){return Promise.resolve(d.idToken);}};
    window._fbUser=fbUser;
    if(typeof window.fbLoginSuccess==='function'){window.fbLoginSuccess(fbUser);return;}
    var t=0,w=setInterval(function(){
      t++;
      if(typeof window.fbLoginSuccess==='function'){clearInterval(w);window.fbLoginSuccess(window._fbUser);}
      else if(t>150){clearInterval(w);
        if(errEl){errEl.style.display='block';errEl.textContent='Connecté! Attendez le chargement...';}
      }
    },100);
  })
  .catch(function(){
    if(btn){btn.disabled=false;btn.textContent='🔐 Se connecter';}
    if(errEl){errEl.style.display='block';errEl.textContent='❌ Erreur réseau. Vérifiez votre connexion.';}
  });
}
