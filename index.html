<head>

<script>
// Config Firebase
var FB_CONFIG = {
  apiKey:            "AIzaSyDCqoYZLBK0ipbotTejMCAvYGxrkomGIGk",
  authDomain:        "dpgestpro.firebaseapp.com",
  projectId:         "dpgestpro",
  storageBucket:     "dpgestpro.firebasestorage.app",
  messagingSenderId: "795000345158",
  appId:             "1:795000345158:web:b33a6f77ce9e98bff87047"
};
var ADMIN_UID   = "GU8y7JeJ7VYCPQf0vGyRKj38hLn1";
var ADMIN_EMAIL = "jeanpaulbognon3@gmail.com";

// État global
window.fbAuth  = null;
window.fbDb    = null;
window._fbReady = false;
window._fbUser  = null;
window.selectedEntrepriseId = 'dpgestpro';
window._forcedEntreprise    = 'dpgestpro';

// ── initFirebase — appelé via onload sur le 3ème script Firebase ──
function initFirebase() {
  if(window._fbReady) return;
  setStatus('Initialisation Firebase...');
  try {
    if(!firebase.apps || !firebase.apps.length) {
      firebase.initializeApp(FB_CONFIG);
    }
    window.fbAuth = firebase.auth();
    window.fbDb   = firebase.firestore();
    window._fbReady = true;

    // Mettre à jour window.FB aussi
    window.FB.auth = window.fbAuth;
    window.FB.db   = window.fbDb;
    window.FB.GoogleAuthProvider = firebase.auth.GoogleAuthProvider;
    window.FB.googleProvider     = new firebase.auth.GoogleAuthProvider();

    setStatus('Firebase prêt ✓');

    // Écouter l'état utilisateur
    firebase.auth().onAuthStateChanged(function(user) {
      if(user) {
        window._fbUser = user;
        onUserConnected(user);
      } else {
        window._fbUser = null;
        showLoginScreen();
      }
    });

  } catch(e) {
    console.error('[DpGestPro] Firebase init:', e.message);
    setStatus('Erreur init');
    showLoginError('Erreur Firebase: ' + e.message);
    showLoginScreen();
  }
}

// ── Fallback CDN si gstatic.com échoue ──
var _fbCdnErrors = {};
function fbCdnError(mod) {
  _fbCdnErrors[mod] = true;
  console.warn('[DpGestPro] CDN échoué:', mod);
  if(Object.keys(_fbCdnErrors).length >= 1) {
    setStatus('CDN principal indisponible, chargement alternatif...');
    var fallbacks = [
      'https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-app-compat.js',
      'https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-auth-compat.js',
      'https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-firestore-compat.js'
    ];
    if(typeof firebase !== 'undefined') { initFirebase(); return; }
    var i = 0;
    function next() {
      if(i >= fallbacks.length) { initFirebase(); return; }
      var s = document.createElement('script');
      s.src = fallbacks[i++];
      s.onload = next;
      s.onerror = function() {
        showLoginError('Impossible de charger Firebase.<br>Vérifiez votre connexion et rechargez (Ctrl+F5).');
        showLoginScreen();
      };
      document.head.appendChild(s);
    }
    next();
  }
}

// ── Timeout 12s ──
setTimeout(function() {
  if(!window._fbReady) {
    setStatus('Délai dépassé');
    showLoginError('Firebase tarde à répondre.<br>Vérifiez votre connexion internet et rechargez (Ctrl+F5).');
    showLoginScreen();
  }
}, 12000);

// ── CONNEXION EMAIL ──
function doLogin() {
  var email = ((document.getElementById('login-email')||{}).value||'').trim();
  var pw    = ((document.getElementById('login-pw')||{}).value||'').trim();
  clearLoginError();
  if(!email||!pw) { showLoginError('Entrez votre email et mot de passe'); return; }
  if(!window._fbReady) { showLoginError('Firebase en cours de chargement... Réessayez dans 5s'); return; }

  var btn = document.getElementById('btn-login');
  var txt = document.getElementById('btn-login-txt');
  if(btn) btn.disabled = true;
  if(txt) txt.textContent = '⏳ Connexion...';

  firebase.auth().signInWithEmailAndPassword(email, pw)
    .then(function() {
      if(txt) txt.textContent = '✅ Connecté!';
    })
    .catch(function(e) {
      if(btn) btn.disabled = false;
      if(txt) txt.textContent = '🔐 Se connecter';
      var m = e.code;
      if(m==='auth/user-not-found'||m==='auth/invalid-email') m='Email introuvable dans Firebase';
      else if(m==='auth/wrong-password'||m==='auth/invalid-credential') m='Mot de passe incorrect';
      else if(m==='auth/too-many-requests') m='Trop de tentatives. Attendez quelques minutes.';
      else m = e.message||e.code;
      showLoginError(m);
    });
}

// ── CONNEXION GOOGLE ──
function doGoogleLogin() {
  clearLoginError();
  if(!window._fbReady) { showLoginError('Firebase en cours de chargement...'); return; }
  var btn = document.getElementById('btn-google');
  var txt = document.getElementById('btn-google-txt');
  if(btn) btn.disabled = true;
  if(txt) txt.textContent = '⏳ Google...';

  var provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider)
    .then(function(){ if(txt) txt.textContent='✅ Connecté!'; })
    .catch(function(e) {
      if(btn) btn.disabled = false;
      if(txt) txt.textContent = 'Se connecter avec Google';
      if(e.code!=='auth/popup-closed-by-user') showLoginError(e.message||e.code);
    });
}

// Alias pour compatibilité avec app.js
function loginAvecEmail() { doLogin(); }
function doLogout() { firebase.auth && firebase.auth().signOut(); }

// ── APRÈS CONNEXION RÉUSSIE ──
function onUserConnected(user) {
  hideLoginScreen();
  setStatus('Chargement de l\'application...');
  // Attendre que app.js définisse fbLoginSuccess
  var t = 0;
  var w = setInterval(function() {
    t++;
    if(typeof window.fbLoginSuccess === 'function') {
      clearInterval(w);
      hideLoader();
      window.fbLoginSuccess(user);
    } else if(t > 150) { // 15 secondes max
      clearInterval(w);
      hideLoader();
      showLoginError('app.js n\'a pas pu être chargé.<br>Vérifiez votre connexion et rechargez.');
      showLoginScreen();
    }
  }, 100);
}

// ── UI helpers ──
function setStatus(m){ var e=document.getElementById('l-status'); if(e)e.textContent=m; }
function showLoginScreen(){ document.getElementById('loader').classList.add('hide'); document.getElementById('login-screen').classList.add('show'); }
function hideLoginScreen(){ document.getElementById('login-screen').classList.remove('show'); }
function hideLoader(){ document.getElementById('loader').classList.add('hide'); }
function showLoginError(m){ var e=document.getElementById('login-err'); if(e){e.innerHTML='❌ '+m; e.classList.add('show');} }
function clearLoginError(){ var e=document.getElementById('login-err'); if(e){e.innerHTML='';e.classList.remove('show');} }
var _tT;
function toast(msg,type){
  var e=document.getElementById('toast');if(!e)return;
  clearTimeout(_tT);
  e.innerHTML=msg;
  e.style.background=type==='err'?'rgba(239,68,68,.1)':type==='ok'?'rgba(16,185,129,.1)':'var(--surf)';
  e.style.borderColor=type==='err'?'rgba(239,68,68,.3)':type==='ok'?'rgba(16,185,129,.3)':'var(--bdr)';
  e.style.transform='translateY(0)'; e.style.opacity='1';
  _tT=setTimeout(function(){ e.style.transform='translateY(80px)'; e.style.opacity='0'; },3500);
}

// ── window.FB — rétro-compatibilité avec l'ancien app.js ──
window.FB = {
  auth:null, db:null, GoogleAuthProvider:null, googleProvider:null,
  signInWithEmailAndPassword: function(a,e,p){ return firebase.auth().signInWithEmailAndPassword(e,p); },
  signOut:      function(){ return firebase.auth().signOut(); },
  onAuthStateChanged: function(a,cb){ return firebase.auth().onAuthStateChanged(cb); },
  signInWithPopup:    function(a,p){ return firebase.auth().signInWithPopup(p); },
  getRedirectResult:  function(){ return firebase.auth().getRedirectResult(); },
  // Firestore wrappers — pas de variables indéfinies
  doc:        function(db,col,id){ var d=window.fbDb||db; return d&&d.collection?d.collection(col).doc(id):null; },
  collection: function(db,col){ var d=window.fbDb||db; return d&&d.collection?d.collection(col):null; },
  getDoc:     function(r){ return r&&r.get?r.get():Promise.resolve({exists:false,data:function(){return null;}}); },
  getDocs:    function(r){ return r&&r.get?r.get():Promise.resolve({docs:[],forEach:function(){}}); },
  setDoc:     function(r,d,o){ return r&&r.set?r.set(d,o||{}):Promise.resolve(); },
  addDoc:     function(c,d){ return c&&c.add?c.add(d):Promise.resolve({id:'local_'+Date.now()}); },
  updateDoc:  function(r,d){ return r&&r.update?r.update(d):Promise.resolve(); },
  deleteDoc:  function(r){ return r&&r.delete?r.delete():Promise.resolve(); },
  onSnapshot: function(r,cb){ return r&&r.onSnapshot?r.onSnapshot(cb):function(){}; },
  serverTimestamp: function(){ return(firebase.firestore&&firebase.firestore.FieldValue)?firebase.firestore.FieldValue.serverTimestamp():new Date(); },
  query:   function(r){ var a=Array.prototype.slice.call(arguments,1); return a.reduce(function(x,f){return f&&typeof f==='function'?f(x):x;},r); },
  orderBy: function(f,d){ return function(r){ return r&&r.orderBy?r.orderBy(f,d||'asc'):r; }; }
};

// Fonctions helpers directs (pour app.js)
function fbDoc(col,id){ return window.fbDb?window.fbDb.collection(col).doc(id):null; }
function fbCol(col){ return window.fbDb?window.fbDb.collection(col):null; }
function fbGet(r){ return r&&r.get?r.get():Promise.resolve({exists:false,data:function(){return null;}}); }
function fbSet(r,d,o){ return r&&r.set?r.set(d,o||{}):Promise.resolve(); }
function fbAdd(c,d){ return c&&c.add?c.add(d):Promise.resolve({id:'local_'+Date.now()}); }
function fbUpdate(r,d){ return r&&r.update?r.update(d):Promise.resolve(); }
function fbDelete(r){ return r&&r.delete?r.delete():Promise.resolve(); }
function fbWatch(r,cb){ return r&&r.onSnapshot?r.onSnapshot(cb):function(){}; }
function fbTS(){ return(firebase.firestore&&firebase.firestore.FieldValue)?firebase.firestore.FieldValue.serverTimestamp():new Date(); }
</script>

<!-- FIREBASE COMPAT CDN — 3 scripts en séquence -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"
  onerror="fbCdnError('app')"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"
  onload="initFirebase()"
  onerror="fbCdnError('firestore')"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080f;--surf:#0f1118;--surf2:#161922;
  --acc:#6c63ff;--acc2:#8b83ff;
  --green:#10b981;--red:#ef4444;
  --bdr:rgba(108,99,255,.2);--bdr2:rgba(108,99,255,.08);
  --txt:#eeeef8;--txt2:#9090b8;--txt3:#505078;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif}

/* LOADER */
#loader{position:fixed;inset:0;z-index:9999;
  background:radial-gradient(ellipse at 30% 40%,#0e0a2e,#05060f);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .4s ease}
#loader.hide{opacity:0;pointer-events:none}
.l-logo{font-family:'Syne',sans-serif;font-size:40px;font-weight:800;margin-bottom:6px}
.l-logo span{color:var(--acc)}
.l-sub{font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:3px;margin-bottom:36px}
.l-bar{width:180px;height:3px;background:rgba(108,99,255,.12);border-radius:2px;overflow:hidden}
.l-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:2px;
  animation:lf 1.8s ease-in-out infinite}
@keyframes lf{0%{width:0;margin-left:0}50%{width:100%}100%{width:0;margin-left:100%}}
.l-status{font-size:12px;color:var(--txt3);margin-top:14px;text-align:center}

/* LOGIN */
#login-screen{position:fixed;inset:0;z-index:9500;display:none;
  align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(ellipse at 30% 40%,#0e0a2e,#05060f)}
#login-screen.show{display:flex}
.lw{width:420px;max-width:100%}
.ll-icon{width:64px;height:64px;border-radius:18px;margin:0 auto 14px;
  background:linear-gradient(135deg,var(--acc),#8b5cf6);
  display:flex;align-items:center;justify-content:center;font-size:28px;
  box-shadow:0 0 40px rgba(108,99,255,.3)}
.ll-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;text-align:center;
  background:linear-gradient(135deg,#fff,var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ll-sub{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:2px;text-align:center;margin:4px 0 28px}
.lcard{background:var(--surf);border:1px solid var(--bdr);border-radius:20px;padding:28px;
  box-shadow:0 0 60px rgba(108,99,255,.1)}
.lbl{font-size:10px;font-weight:700;color:var(--txt2);text-transform:uppercase;
  letter-spacing:.8px;display:block;margin-bottom:5px}
.linp{width:100%;background:var(--surf2);border:1.5px solid var(--bdr);border-radius:9px;
  padding:11px 14px;color:var(--txt);font-size:14px;font-family:'DM Sans',sans-serif;
  transition:border-color .2s;outline:none;margin-bottom:12px}
.linp:focus{border-color:var(--acc)}
.linp::placeholder{color:var(--txt3)}
.lsel{width:100%;background:var(--surf2);border:1.5px solid var(--bdr);border-radius:9px;
  padding:11px 14px;color:var(--txt);font-size:14px;font-family:'DM Sans',sans-serif;
  outline:none;margin-bottom:12px;cursor:pointer}
.lsel option{background:var(--surf2)}
.lbtn-main{width:100%;padding:13px;background:linear-gradient(135deg,var(--acc),#8b5cf6);
  border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;
  font-family:'Syne',sans-serif;cursor:pointer;transition:all .2s;margin-bottom:12px;
  display:flex;align-items:center;justify-content:center;gap:8px}
.lbtn-main:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,99,255,.35)}
.lbtn-main:disabled{opacity:.5;cursor:not-allowed;transform:none}
.ldiv{display:flex;align-items:center;gap:10px;margin:4px 0 12px;color:var(--txt3);font-size:11px}
.ldiv::before,.ldiv::after{content:'';flex:1;height:1px;background:var(--bdr)}
.lbtn-g{width:100%;padding:12px;background:#fff;border:1.5px solid #ddd;border-radius:10px;
  color:#333;font-size:13px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s}
.lbtn-g:hover{background:#f7f7f7;box-shadow:0 3px 12px rgba(0,0,0,.1)}
.lbtn-g:disabled{opacity:.5;cursor:not-allowed}
.lerr{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);
  border-radius:8px;padding:10px 14px;color:#f87171;font-size:12px;
  margin-top:12px;display:none;line-height:1.5}
.lerr.show{display:block}
.lfooter{text-align:center;font-size:10px;color:var(--txt3);margin-top:16px;line-height:1.7}
.lfooter a{color:var(--acc2);text-decoration:none}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;padding:12px 18px;border-radius:11px;
  background:var(--surf);border:1px solid var(--bdr);color:var(--txt);font-size:13px;
  font-weight:500;z-index:99999;transform:translateY(80px);opacity:0;
  transition:all .3s;box-shadow:0 4px 20px rgba(0,0,0,.4);max-width:320px;
  font-family:'DM Sans',sans-serif;pointer-events:none}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="l-logo">DpGest<span>Pro</span></div>
  <div class="l-sub">Système de Gestion Multi-Entreprises</div>
  <div class="l-bar"><div class="l-fill"></div></div>
  <div class="l-status" id="l-status">Connexion à Firebase...</div>
</div>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="lw">
    <div class="ll-icon">⚡</div>
    <div class="ll-title">DpGestPro</div>
    <div class="ll-sub">Système de Gestion Multi-Entreprises</div>

      <div class="ldiv">ou</div>

      <button class="lbtn-g" id="btn-google" onclick="doGoogleLogin()">
        <svg width="17" height="17" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.96 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        <span id="btn-google-txt">Se connecter avec Google</span>
      </button>

      <div class="lerr" id="login-err"></div>
      <div class="lfooter">
        DpGestPro · Jean Paul BOGNON<br>
        <a href="/cdn-cgi/l/email-protection#d0bab5b1bea0b1a5bcb2bfb7bebfbee390b7bdb1b9bcfeb3bfbd"><span class="__cf_email__" data-cfemail="28424d494658495d444a474f4647461b684f45494144064b4745">[email&#160;protected]</span></a>
      </div>
    </div>
  </div>
</div>

<!-- APP (rempli par app.js) -->
<div id="app" style="display:none;height:100vh;overflow:hidden"></div>

<!-- TOAST -->
<div id="toast"></div>
