const METHODES_PAIEMENT = {
  'Especes'    : { label:'Espèces',          icon:'💵', color:'#43e97b', desc:'Paiement cash direct' },
  'MTN MoMo'  : { label:'MTN Mobile Money',  icon:'🟡', color:'#FFCC00', desc:'*880# ou appli MTN' },
  'Moov Money' : { label:'Moov Money',        icon:'🔵', color:'#0066CC', desc:'*555# ou appli Moov' },
  'Celtis Cash': { label:'Celtis Cash',       icon:'🟠', color:'#FF6600', desc:'Réseau Celtis' },
  'Wave'       : { label:'Wave',              icon:'🌊', color:'#1AC8ED', desc:'Appli Wave' },
  'Virement'   : { label:'Virement bancaire', icon:'🏦', color:'#6c63ff', desc:'UBA, BOA, Ecobank...' },
  'Cheque'     : { label:'Chèque',            icon:'📄', color:'#a0a0b0', desc:'Chèque bancaire' },
  'Carte'      : { label:'Carte bancaire',    icon:'💳', color:'#f5a623', desc:'Visa / Mastercard' }
};

function getSPMoisKey() {
  var m = document.getElementById('sp-mois')?.value  || String(new Date().getMonth()+1).padStart(2,'0');
  var a = document.getElementById('sp-annee')?.value || String(new Date().getFullYear());
  return a + '-' + m;
}

function initSalairesPaiement() {
  var now = new Date();
  var mEl = document.getElementById('sp-mois');
  var aEl = document.getElementById('sp-annee');
  if(mEl) mEl.value = String(now.getMonth()+1).padStart(2,'0');
  if(aEl) aEl.value = String(now.getFullYear());
  renderSalairesPaiement();
}

function renderSalairesPaiement() {
  var moisKey = getSPMoisKey();
  var actifs  = DB.employes.filter(function(e){ return e.statut === 'Actif'; });
  var paiements = (DB.paiementsSalaires||[]).filter(function(p){ return p.moisKey === moisKey; });
  var paidIds = {};
  paiements.forEach(function(p){ paidIds[p.empId] = p; });

  // Stats
  var masseBrute = actifs.reduce(function(a,e){ return a+(e.salaire||0); },0);
  var masseNette = actifs.reduce(function(a,e){ var b=e.salaire||0; return a+b-Math.round(b*0.05); },0);
  var nbPayes    = actifs.filter(function(e){ return !!paidIds[e.id]; }).length;
  var nbRestants = actifs.length - nbPayes;
  var totalPaye  = paiements.reduce(function(a,p){ return a+p.net; },0);
  var totalRestant = masseNette - totalPaye;

  var e1=document.getElementById('sp-total-emp');
  var e2=document.getElementById('sp-masse-sal');
  var e3=document.getElementById('sp-payes-count');
  var e4=document.getElementById('sp-restants-count');
  if(e1) e1.textContent = actifs.length;
  if(e2) e2.textContent = fmtNum(masseNette)+' F';
  if(e3) e3.textContent = nbPayes;
  if(e4) { e4.textContent = nbRestants; e4.style.color = nbRestants>0?'var(--danger)':'var(--success)'; }

  // Cartes employés
  var grid = document.getElementById('sp-cards-grid');
  if(grid) {
    if(!actifs.length) {
      grid.innerHTML = '<div style="grid-column:span 3;text-align:center;padding:40px;color:var(--text3)">Aucun employé actif. Ajoutez des employés dans RH.</div>';
    } else {
      grid.innerHTML = actifs.map(function(e) {
        var brut   = e.salaire||0;
        var ded    = Math.round(brut*0.05);
        var net    = brut - ded;
        var paid   = paidIds[e.id];
        var methode= paid ? METHODES_PAIEMENT[paid.methode] : null;
        var initials = (e.name||'?').split(' ').map(function(w){ return w[0]; }).slice(0,2).join('').toUpperCase();
        var cardCls = paid ? 'sp-emp-card paid' : 'sp-emp-card pending';

        var footer = paid
          ? '<div style="display:flex;align-items:center;gap:8px;padding-top:12px;border-top:1px solid var(--border)">' +
            '<span style="font-size:16px">' + (methode?methode.icon:'💰') + '</span>' +
            '<div style="flex:1"><div style="font-size:12px;font-weight:700;color:var(--success)">✅ Payé le ' + (paid.datePaiement||'—') + '</div>' +
            '<div style="font-size:11px;color:var(--text2)">' + (methode?methode.label:'—') + (paid.ref?' · Réf: '+paid.ref:'') + '</div></div>' +
            '<button class="btn-sm btn-outline" style="font-size:11px;color:var(--danger);border-color:var(--danger)" data-id="' + e.id + '" onclick="annulerPaiementSalaire(this.dataset.id)">Annuler</button></div>'
          : '<button class="btn-sm btn-add" style="width:100%;margin-top:12px" data-id="' + e.id + '" data-source="rh" onclick="ouvrirModalPaiement(this.dataset.id,this.dataset.source)">💸 Payer — ' + fmtNum(net) + ' F</button>';

        return '<div class="' + cardCls + '">' +
          '<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">' +
          '<div style="width:46px;height:46px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:900;color:white;font-size:16px">' + initials + '</div>' +
          '<div style="flex:1"><div style="font-family:Syne,sans-serif;font-weight:800;font-size:14px">' + (e.name||'—') + '</div>' +
          '<div style="font-size:12px;color:var(--text2)">' + (e.poste||'—') + ' · ' + (e.dept||'—') + '</div></div>' +
          '<code style="font-size:11px;color:var(--accent)">' + (e.matricule||'—') + '</code></div>' +
          '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:4px">' +
          '<div style="background:var(--surface2);border-radius:8px;padding:8px;text-align:center">' +
          '<div style="font-size:10px;color:var(--text2)">Brut</div><div style="font-weight:700;font-size:13px">' + fmtNum(brut) + ' F</div></div>' +
          '<div style="background:rgba(255,71,87,.1);border-radius:8px;padding:8px;text-align:center">' +
          '<div style="font-size:10px;color:var(--text2)">CNSS 5%</div><div style="font-weight:700;font-size:13px;color:var(--danger)">-' + fmtNum(ded) + ' F</div></div>' +
          '<div style="background:rgba(67,233,123,.1);border-radius:8px;padding:8px;text-align:center">' +
          '<div style="font-size:10px;color:var(--text2)">Net</div><div style="font-weight:800;font-size:14px;color:var(--success)">' + fmtNum(net) + ' F</div></div></div>' +
          footer + '</div>';
      }).join('');
    }
  }

  // Tableau récap
  renderRecapSalaires(actifs, paidIds, moisKey);

  var tp = document.getElementById('sp-total-paye');
  var tr2= document.getElementById('sp-total-restant');
  var rl = document.getElementById('sp-recap-label');
  if(tp)  tp.textContent  = fmtNum(totalPaye) + ' F';
  if(tr2) { tr2.textContent = fmtNum(Math.max(0,totalRestant)) + ' F'; }
  if(rl)  rl.textContent  = 'Période : ' + moisKey + ' · ' + actifs.length + ' employé(s)';
}

function renderRecapSalaires(actifs, paidIds, moisKey) {
  var tbody = document.getElementById('sp-recap-tbody');
  if(!tbody) return;
  if(!actifs.length) {
    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:var(--text3);padding:20px">Aucun employé actif</td></tr>';
    return;
  }
  tbody.innerHTML = actifs.map(function(e) {
    var brut = e.salaire||0;
    var ded  = Math.round(brut*0.05);
    var net  = brut - ded;
    var paid = paidIds[e.id];
    var m    = paid ? (METHODES_PAIEMENT[paid.methode]||{}) : {};
    var sc   = paid ? 'badge-success' : 'badge-warning';
    var sl   = paid ? '✅ Payé' : '⏳ Attente';
    return '<tr>' +
      '<td><code style="color:var(--accent)">' + (e.matricule||'—') + '</code></td>' +
      '<td style="font-weight:700">' + (e.name||'—') + '</td>' +
      '<td>' + (e.poste||'—') + '</td>' +
      '<td>' + fmtNum(brut) + ' F</td>' +
      '<td style="color:var(--danger)">-' + fmtNum(ded) + ' F</td>' +
      '<td style="font-weight:700;color:var(--success)">' + fmtNum(net) + ' F</td>' +
      '<td>' + (paid ? (m.icon||'')+ ' ' + (m.label||paid.methode) : '—') + '</td>' +
      '<td><span class="badge ' + sc + '">' + sl + '</span></td>' +
      '<td style="font-size:12px;color:var(--text2)">' + (paid?paid.datePaiement||'—':'—') + '</td></tr>';
  }).join('');
}

function ouvrirModalPaiement(empId, source) {
  var emp = source==='eglise'
    ? (DB.personnelEglise||[]).find(function(p){ return p.id===empId; })
    : DB.employes.find(function(e){ return e.id===empId||String(e.id)===String(empId); });
  if(!emp) return;

  var brut = emp.salaire||0;
  var ded  = source==='eglise' ? (emp.deduction||0) : Math.round(brut*0.05);
  var net  = brut - ded;
  var nom  = emp.name || emp.nom || '?';
  var poste= emp.poste || emp.fonction || '—';

  document.getElementById('mps-emp-id').value  = empId;
  document.getElementById('mps-source').value  = source;
  document.getElementById('mps-nom').textContent   = nom;
  document.getElementById('mps-poste').textContent = poste;
  document.getElementById('mps-brut').textContent  = fmtNum(brut) + ' F';
  document.getElementById('mps-ded').textContent   = '-' + fmtNum(ded) + ' F';
  document.getElementById('mps-net').textContent   = fmtNum(net) + ' F';
  document.getElementById('mps-avatar').textContent= nom.split(' ').map(function(w){return w[0];}).slice(0,2).join('').toUpperCase();
  document.getElementById('mps-numero').value = emp.tel || '';
  document.getElementById('mps-ref').value    = '';
  document.getElementById('mps-note').value   = '';

  // Reset sélection méthode
  document.querySelectorAll('.mps-method-card').forEach(function(c){ c.classList.remove('selected'); });
  document.getElementById('mps-numero-group').style.display = 'none';
  document.getElementById('mps-ref-group').style.display    = 'none';

  // Pré-sélectionner méthode par défaut
  var defEl = document.getElementById('sp-methode-defaut');
  if(defEl) selectMethode(null, defEl.value);

  openModal('modal-paiement-salaire');
}

function selectMethode(card, valeur) {
  window._mpsMethode = valeur;
  document.querySelectorAll('.mps-method-card').forEach(function(c){ c.classList.remove('selected'); });
  if(card) card.classList.add('selected');
  else {
    document.querySelectorAll('.mps-method-card').forEach(function(c){
      var radio = c.parentElement.querySelector('input[type=radio]');
      if(radio && radio.value === valeur) c.classList.add('selected');
    });
  }
  var mobile = ['MTN MoMo','Moov Money','Celtis Cash','Wave'];
  var ref    = ['Virement','Cheque'];
  var numGrp = document.getElementById('mps-numero-group');
  var refGrp = document.getElementById('mps-ref-group');
  var numLbl = document.getElementById('mps-numero-label');
  var refLbl = document.getElementById('mps-ref-label');
  if(numGrp) numGrp.style.display = mobile.indexOf(valeur)>=0 ? 'block' : 'none';
  if(refGrp) refGrp.style.display = ref.indexOf(valeur)>=0    ? 'block' : 'none';
  if(numLbl) numLbl.textContent = valeur + ' — Numéro';
  if(refLbl) refLbl.textContent = valeur==='Cheque' ? 'Numéro de chèque' : 'Référence virement';
}

async function confirmerPaiementSalaire() {
  var empId   = document.getElementById('mps-emp-id').value;
  var source  = document.getElementById('mps-source').value;
  var methode = window._mpsMethode || 'Especes';
  var numero  = document.getElementById('mps-numero').value.trim();
  var ref     = document.getElementById('mps-ref').value.trim();
  var note    = document.getElementById('mps-note').value.trim();

  var emp = source==='eglise'
    ? (DB.personnelEglise||[]).find(function(p){ return p.id===empId; })
    : DB.employes.find(function(e){ return e.id===empId||String(e.id)===String(empId); });
  if(!emp) return;

  var brut = emp.salaire||0;
  var ded  = source==='eglise' ? (emp.deduction||0) : Math.round(brut*0.05);
  var net  = brut - ded;
  var nom  = emp.name || emp.nom || '?';
  var moisKey = getSPMoisKey();

  var paiement = {
    empId        : empId,
    source       : source,
    nom          : nom,
    poste        : emp.poste || emp.fonction || '',
    moisKey      : moisKey,
    brut         : brut,
    deduction    : ded,
    net          : net,
    methode      : methode,
    numero       : numero,
    ref          : ref,
    note         : note,
    datePaiement : new Date().toISOString().split('T')[0],
    heure        : new Date().toLocaleTimeString('fr-FR'),
    payePar      : DB.currentUser ? DB.currentUser.name : 'Admin',
    createdAt    : new Date().toISOString()
  };

  if(!DB.paiementsSalaires) DB.paiementsSalaires = [];

  if(window.fbSave) {
    try {
      var fbId = await window.fbSave('paiements_salaires', null, paiement);
      if(fbId) paiement.id = fbId;
    } catch(e) { console.warn('Firestore:', e); }
  }
  if(!paiement.id) paiement.id = 'ps-' + Date.now();
  DB.paiementsSalaires.push(paiement);

  // Enregistrer comme dépense pour impact CA net
  var dep = {
    cat      : 'Salaires',
    montant  : net,
    desc     : 'Salaire ' + moisKey + ' — ' + nom + ' (' + (emp.poste||emp.fonction||'') + ')',
    date     : new Date().toISOString().split('T')[0],
    user     : DB.currentUser ? DB.currentUser.name : 'Admin',
    role     : DB.currentUser ? DB.currentUser.role  : '',
    source   : 'salaire',
    methode  : methode,
    createdAt: new Date().toISOString()
  };
  if(window.fbSave) { try { var dId = await window.fbSave('depenses', null, dep); if(dId) dep.id=dId; } catch(e){} }
  DB.depenses.push(dep);

  closeModal('modal-paiement-salaire');
  renderSalairesPaiement();
  if(source === 'eglise') { renderSoldeEglise(); renderHistoriqueSalairesEglise(); }
  renderCaisseStats && renderCaisseStats();
  var m = METHODES_PAIEMENT[methode]||{};
  toast((m.icon||'💸') + ' ' + fmtNum(net) + ' F payé à ' + nom + ' via ' + (m.label||methode));
}

async function annulerPaiementSalaire(empId) {
  var moisKey = getSPMoisKey();
  if(!confirm('Annuler ce paiement ?')) return;
  var idx = (DB.paiementsSalaires||[]).findIndex(function(p){ return p.empId===empId && p.moisKey===moisKey; });
  if(idx < 0) return;
  var p = DB.paiementsSalaires[idx];
  if(window.FB && p.id) {
    try {
      var { db, doc, deleteDoc } = window.FB;
      await deleteDoc(doc(db,'entreprises/'+DB.currentUser.entreprise+'/paiements_salaires',p.id));
    } catch(e){}
  }
  DB.paiementsSalaires.splice(idx,1);
  renderSalairesPaiement();
  toast('Paiement annulé');
}

async function payerTousDepuisPage() {
  var moisKey = getSPMoisKey();
  var actifs  = DB.employes.filter(function(e){ return e.statut==='Actif'; });
  var paidIds = new Set((DB.paiementsSalaires||[]).filter(function(p){ return p.moisKey===moisKey; }).map(function(p){ return p.empId; }));
  var nonPaies= actifs.filter(function(e){ return !paidIds.has(e.id) && !paidIds.has(String(e.id)); });
  if(!nonPaies.length) { toast('Tous les salaires ont déjà été payés !'); return; }
  var defEl   = document.getElementById('sp-methode-defaut');
  var methode = defEl ? defEl.value : 'Especes';
  window._mpsMethode = methode;
  for(var i=0; i<nonPaies.length; i++) {
    var e   = nonPaies[i];
    var brut= e.salaire||0;
    var ded = Math.round(brut*0.05);
    var net = brut-ded;
    var moisKey2= getSPMoisKey();
    var paiement = {
      empId: e.id, source:'rh', nom:e.name, poste:e.poste||'', moisKey:moisKey2,
      brut, deduction:ded, net, methode, datePaiement:new Date().toISOString().split('T')[0],
      heure:new Date().toLocaleTimeString('fr-FR'), payePar:DB.currentUser?DB.currentUser.name:'Admin',
      createdAt:new Date().toISOString()
    };
    if(window.fbSave){ try{ var fid=await window.fbSave('paiements_salaires',null,paiement); if(fid)paiement.id=fid; }catch(e){} }
    if(!paiement.id) paiement.id='ps-'+Date.now()+'-'+i;
    if(!DB.paiementsSalaires) DB.paiementsSalaires=[];
    DB.paiementsSalaires.push(paiement);
    var dep={cat:'Salaires',montant:net,desc:'Salaire '+moisKey2+' — '+e.name,date:new Date().toISOString().split('T')[0],user:DB.currentUser?DB.currentUser.name:'',source:'salaire',methode,createdAt:new Date().toISOString()};
    if(window.fbSave){try{var did=await window.fbSave('depenses',null,dep);if(did)dep.id=did;}catch(ex){}}
    DB.depenses.push(dep);
  }
  renderSalairesPaiement();
  renderCaisseStats && renderCaisseStats();
  toast('💸 ' + nonPaies.length + ' salaires payés via ' + (METHODES_PAIEMENT[methode]?.label||methode));
}

function exportBulletinsPDF() {

function exportSalairesCSV() {
  var moisKey = getSPMoisKey();
  var actifs  = DB.employes.filter(function(e){ return e.statut==='Actif'; });
  var paiements= (DB.paiementsSalaires||[]).filter(function(p){ return p.moisKey===moisKey; });
  var paidMap = {};
  paiements.forEach(function(p){ paidMap[p.empId]=p; });
  var rows = [['Matricule','Nom','Poste','Salaire Brut','CNSS 5%','Net','Moyen Paiement','Statut','Date Paiement']];
  actifs.forEach(function(e){
    var brut=e.salaire||0; var ded=Math.round(brut*0.05); var net=brut-ded;
    var p=paidMap[e.id]||paidMap[String(e.id)];
    rows.push([e.matricule,e.name,e.poste,brut,ded,net,p?p.methode:'—',p?'Payé':'En attente',p?p.datePaiement:'—']);
  });
  var csv = rows.map(function(r){ return r.join(';'); }).join(String.fromCharCode(10));
  var blob= new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a   = document.createElement('a');
  a.href=url; a.download='salaires-'+moisKey+'.csv'; a.click();
  URL.revokeObjectURL(url);
}

async function saveEmploye() {
  const id   = document.getElementById('emp-id').value;
  const name = document.getElementById('emp-name').value.trim();
  if(!name) { toast('Le nom est obligatoire'); return; }
  const data = {
    matricule   : document.getElementById('emp-matricule').value.trim(),
    name, poste : document.getElementById('emp-poste').value.trim(),
    dept        : document.getElementById('emp-dept').value,
    dateEmbauche: document.getElementById('emp-date').value,
    salaire     : +document.getElementById('emp-salaire').value,
    tel         : document.getElementById('emp-tel').value.trim(),
    email       : document.getElementById('emp-email').value.trim(),
    adresse     : document.getElementById('emp-adresse').value.trim(),
    statut      : document.getElementById('emp-statut').value,
    contrat     : document.getElementById('emp-contrat').value
  };
  try {
    if(id) {
      await window.fbSave('employes', id, data);
      const idx = DB.employes.findIndex(e => String(e.id) === String(id));
      if(idx !== -1) DB.employes[idx] = { ...DB.employes[idx], ...data };
      toast('Employé mis à jour ✅');
    } else {
      const newId = await window.fbSave('employes', null, data);
      DB.employes.push({ id: newId || DB.nextId.employe++, ...data });
      toast('Employé ajouté ✅');
    }
    closeModal('modal-employe'); renderRH();
  } catch(e) { toast('Erreur: ' + e.message); }
}

async function deleteEmploye(id) {

function renderReports() {
  var ventes   = DB.ventes    || [];
  var products = DB.products  || [];
  var clients  = DB.clients   || [];
  var projects = DB.projects  || [];
  var entId    = DB.currentUser ? DB.currentUser.entreprise : '';

  var reports = [
    {icon:'📈', name:'Rapport des ventes',    desc:"Analyse mensuelle du chiffre d'affaires, tendances et comparaisons.", color:'#6c63ff'},
    {icon:'📦', name:'Etat des stocks',        desc:"Inventaire complet avec valorisation et alertes de rupture.", color:'#f7971e'},
    {icon:'👥', name:'Performance clients',    desc:"Top clients, historique des achats et analyse de fidélité.", color:'#ff6584'},
    {icon:'💼', name:'Suivi des projets',      desc:"Avancement, budgets consommés, délais et rentabilité.", color:'#43e97b'},
    {icon:'🛒', name:'Analyse des achats',     desc:"Dépenses fournisseurs, coûts et ratios de marge.", color:'#ffa502'},
    {icon:'💰', name:'Rapport financier',      desc:"Marges brutes, résultats nets et flux de trésorerie.", color:'#a29bfe'},
  ];

  var grid = document.getElementById('reports-grid');
  if(grid) {
    grid.innerHTML = reports.map(function(r, i) {
      return '<div class="report-card" onclick="openDetailedReport('+i+')" style="border-top:3px solid '+r.color+';cursor:pointer">' +
        '<div class="report-icon">'+r.icon+'</div>' +
        '<div class="report-name">'+r.name+'</div>' +
        '<div class="report-desc">'+r.desc+'</div>' +
        '<div style="margin-top:14px;font-size:12px;color:'+r.color+';font-weight:600">Voir le rapport →</div>' +
      '</div>';
    }).join('');
  }

  // Tableau ventes réelles par mois (DB.sales + DB.ventes)
  var allVentes = (DB.sales||[]).concat(DB.ventes||[]);
  var byMonth = {};
  allVentes.forEach(function(v) {
    var d = v.date||v.createdAt||'';
    // Normaliser la date: peut être ISO, YYYY-MM-DD, ou timestamp
    var m = '';
    if(typeof d === 'string' && d.length >= 7) m = d.slice(0,7);
    else if(d && d.toDate) m = d.toDate().toISOString().slice(0,7);
    if(!m || m.length < 7) return;
    if(!byMonth[m]) byMonth[m] = { nb:0, ca:0, cout:0 };
    byMonth[m].nb++;
    // amount (POS) ou total ou montant
    byMonth[m].ca += Number(v.amount||v.total||v.montant||v.sub||0);
    // Coût: calculer depuis items si disponible
    var cout = 0;
    if(v.items && Array.isArray(v.items)) {
      v.items.forEach(function(it) {
        cout += Number((it.prixAchat||it.costPrice||0) * (it.qty||it.quantite||1));
      });
    }
    byMonth[m].cout += cout || Number(v.coutTotal||v.cout||0);
  });

  var months = Object.keys(byMonth).sort().slice(-6);
  var tbody  = document.getElementById('report-tbody');
  if(tbody) {
    if(!months.length) {
      tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--text3)">Aucune vente enregistrée</td></tr>';
    } else {
      tbody.innerHTML = months.map(function(m, i) {
        var d      = byMonth[m];
        var marge  = d.ca - d.cout;
        var pct    = d.ca > 0 ? Math.round(marge/d.ca*100) : 0;
        var label  = new Date(m+'-01').toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
        return '<tr>' +
          '<td>'+label+'</td>' +
          '<td style="text-align:center">'+d.nb+'</td>' +
          '<td style="font-weight:700;color:var(--accent)">'+d.ca.toLocaleString('fr-FR')+' F</td>' +
          '<td style="color:var(--danger)">'+d.cout.toLocaleString('fr-FR')+' F</td>' +
          '<td style="font-weight:700;color:var(--success)">'+marge.toLocaleString('fr-FR')+' F</td>' +
          '<td><span class="badge '+(pct>=35?'badge-success':'badge-warning')+'">'+pct+'%</span></td>' +
        '</tr>';
      }).join('');
    }
  }
}

function exportRapportCSV() {
  var ventes = DB.ventes || DB.sales || [];
  var rows   = [['Ref','Date','Client','Montant','Mode']];
  ventes.forEach(function(v) {
    rows.push([v.ref||v.id, v.date||'', v.client||'', v.total||v.amount||0, v.method||'']);
  });
  var csv  = rows.map(function(r){ return r.join(','); }).join('\n');
  var blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  var a    = document.createElement('a');
  a.href   = URL.createObjectURL(blob);
  a.download = 'rapport_ventes_'+(new Date().toISOString().slice(0,10))+'.csv';
  a.click();
  toast('✅ CSV exporté');
}

function exportReport() {
  const months = ['Janvier','Fevrier','Mars','Avril','Mai','Juin'];
  const salesData = [1850000, 2100000, 1650000, 2400000, 1980000, 2250000];
  const costData  = [980000,  1100000, 870000,  1250000, 1050000, 1180000];
  let csv = 'Mois,CA (FCFA),Cout Achats,Marge Brute,% Marge\n';
  months.forEach((m,i) => {
    const margin = salesData[i] - costData[i];
    const pct = (margin/salesData[i]*100).toFixed(1);
    csv += m+' 2025,'+salesData[i]+','+costData[i]+','+margin+','+pct+'%\n';
  });
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'rapport_dpgestpro.csv'; a.click();
  URL.revokeObjectURL(url);
  toast('Fichier CSV telecharge !');
}

function fmtNum(n) { return Number(n).toLocaleString('fr-FR'); }

// ── Compteurs persistants de numérotation ──────────
function getNextCounter(type) {
  var entId = DB.currentUser ? (DB.currentUser.entreprise||'ent') : 'ent';
  var key   = 'dpgest_counter_' + entId + '_' + type;
  var last  = parseInt(localStorage.getItem(key)||'0');
  // Calculer depuis les données existantes
  var maxFromData = 0;
  if(type === 'sale' && DB.sales) {
    maxFromData = DB.sales.reduce(function(mx,s){
      var n=parseInt((s.ref||s.id||'').toString().replace(/\D/g,''))||0;
      return n>mx?n:mx;
    },0);
  } else if(type === 'client' && DB.clients) {
    maxFromData = DB.clients.length;
  } else if(type === 'product' && DB.products) {
    maxFromData = DB.products.length;
  } else if(type === 'purchase' && DB.purchases) {
    maxFromData = DB.purchases.length;
  }
  var next = Math.max(last, maxFromData, DB.nextId[type]||0) + 1;
  localStorage.setItem(key, String(next));
  if(DB.nextId) DB.nextId[type] = next;
  return next;
}

function resetCountersFromData() {
  // Appelé au login: synchroniser les compteurs avec les données réelles
  var entId = DB.currentUser ? (DB.currentUser.entreprise||'ent') : 'ent';
  var types = ['sale','client','product','purchase','employe'];
  var sources = {
    sale    : DB.sales      || [],
    client  : DB.clients    || [],
    product : DB.products   || [],
    purchase: DB.purchases  || [],
    employe : DB.employes   || []
  };
  types.forEach(function(type) {
    var key = 'dpgest_counter_' + entId + '_' + type;
    var stored = parseInt(localStorage.getItem(key)||'0');
    var maxData = sources[type].length;
    // Essayer de lire le max des IDs numériques
    sources[type].forEach(function(item) {
      var n = parseInt((item.id||'').toString())||0;
      if(n > maxData) maxData = n;
    });
    var best = Math.max(stored, maxData);
    localStorage.setItem(key, String(best));
    if(DB.nextId) DB.nextId[type] = best + 1;
  });
  console.log('[DpGestPro] Compteurs synchronisés:', DB.nextId);
}

function openModal(id) {
  var el = document.getElementById(id);
  if(!el) return;
  // Système 1: modal-overlay
  if(el.classList.contains('modal-overlay')) {
    el.classList.add('open');
    return;
  }
  // Système 2: modal direct (class="modal" style="display:none")
  el.style.display = 'flex';
  el.style.position = 'fixed';
  el.style.inset = '0';
  el.style.background = 'rgba(0,0,0,.7)';
  el.style.zIndex = '9000';
  el.style.alignItems = 'center';
  el.style.justifyContent = 'center';
}
function closeModal(id) {
  var el = document.getElementById(id);
  if(!el) return;
  if(el.classList.contains('modal-overlay')) {
    el.classList.remove('open');
    return;
  }
  el.style.display = 'none';
}
document.querySelectorAll('.modal-overlay').forEach(overlay=>{
  overlay.addEventListener('click', function(e){ if(e.target===this) this.classList.remove('open'); });
});

// Toast notification
function toast(msg) {
  let t = document.getElementById('toast');
  if(!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:var(--surface);border:1px solid var(--border);padding:14px 20px;border-radius:12px;font-size:14px;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.4);transform:translateY(80px);transition:transform .3s;max-width:320px;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.transform = 'translateY(0)';
  setTimeout(()=>t.style.transform='translateY(80px)', 2800);
}

function renderNotes() {
  ecoleDB();
  const notes   = DB.ecoleNotes || [];
  const eleves  = DB.ecoleEleves || [];
  const classe  = document.getElementById('notes-filter-classe')?.value || '';
  const periode = document.getElementById('notes-filter-periode')?.value || '';
  const el      = document.getElementById('ecole-notes-list');
  if(!el) return;

  const filtered = notes.filter(n => {
    const eleve = eleves.find(e=>String(e.id)===String(n.eleveId));
    if(classe  && eleve?.classe  !== classe)  return false;
    if(periode && n.periode !== periode) return false;
    return true;
  });

  if(!filtered.length) { el.innerHTML='<div style="padding:32px;text-align:center;color:var(--text3)">Aucune note enregistrée</div>'; return; }

  el.innerHTML = `<table class="table"><thead><tr>
    <th>Élève</th><th>Classe</th><th>Matière</th><th>Note</th><th>Type</th><th>Période</th><th>Appréciation</th>
  </tr></thead><tbody>${filtered.map((n,i)=>{
    const eleve = eleves.find(e=>String(e.id)===String(n.eleveId));
    const moy = n.valeur >= 10;
    return `<tr>
      <td>${eleve?eleve.nom+' '+eleve.prenom:'?'}</td>
      <td>${eleve?.classe||'-'}</td>
      <td><strong>${n.matiere}</strong></td>
      <td><span style="font-size:16px;font-weight:900;color:${moy?'#10b981':'#ef4444'}">${n.valeur}/20</span></td>
      <td>${n.type||'-'}</td>
      <td>${n.periode||'-'}</td>
      <td style="font-size:12px;color:var(--text2)">${n.appreciation||'-'}</td>
    </tr>`;
  }).join('')}</tbody></table>`;
}

function imprimerBulletins() {
  ecoleDB();
  const eleves = DB.ecoleEleves || [];
  const notes  = DB.ecoleNotes  || [];
  const classe = document.getElementById('notes-filter-classe')?.value || '';
  const periode= document.getElementById('notes-filter-periode')?.value || '1er Trimestre';
  const entNom = ENTREPRISES[DB.currentUser?.entreprise]?.nom || 'École';
  const today  = new Date().toLocaleDateString('fr-FR');

  const filteredEleves = classe ? eleves.filter(e=>e.classe===classe) : eleves;
  if(!filteredEleves.length) { toast('Aucun élève pour ces filtres'); return; }

  const bulletins = filteredEleves.map(eleve => {
    const elevesNotes = notes.filter(n=>String(n.eleveId)===String(eleve.id) && (!periode||n.periode===periode));
    const matieres = [...new Set(elevesNotes.map(n=>n.matiere))];
    const moy = elevesNotes.length ? (elevesNotes.reduce((s,n)=>s+n.valeur,0)/elevesNotes.length).toFixed(2) : '-';
    const lignes = matieres.map(m=>{
      const ns = elevesNotes.filter(n=>n.matiere===m);
      const moyM = ns.length ? (ns.reduce((s,n)=>s+n.valeur,0)/ns.length).toFixed(2) : '-';
      return `<tr>
        <td style="padding:6px 10px;border-bottom:1px solid #e5e7eb">${m}</td>
        <td style="padding:6px 10px;border-bottom:1px solid #e5e7eb;text-align:center;font-weight:700;color:${moyM>=10?'#065f46':'#dc2626'}">${moyM}/20</td>
        <td style="padding:6px 10px;border-bottom:1px solid #e5e7eb;font-size:12px;color:#6b7280">${ns[0]?.appreciation||''}</td>
      </tr>`;
    }).join('');
    return `<div style="page-break-after:always;padding:20px;border:2px solid #6c63ff;border-radius:8px;margin-bottom:20px">
      <div style="display:flex;justify-content:space-between;border-bottom:2px solid #6c63ff;padding-bottom:12px;margin-bottom:16px">
        <div><div style="font-size:18px;font-weight:900;color:#6c63ff">🏫 ${entNom}</div>
        <div style="font-size:13px;font-weight:700">BULLETIN DE NOTES — ${periode}</div></div>
        <div style="text-align:right;font-size:12px;color:#6b7280"><div>${today}</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;font-size:13px">
        <div><strong>Nom :</strong> ${eleve.nom} ${eleve.prenom}</div>
        <div><strong>Classe :</strong> ${eleve.classe||'-'}</div>
        <div><strong>Matricule :</strong> ${eleve.matricule||'-'}</div>
        <div><strong>Sexe :</strong> ${eleve.sexe||'-'}</div>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead><tr style="background:#6c63ff;color:white">
          <th style="padding:8px 10px;text-align:left">Matière</th>
          <th style="padding:8px 10px;text-align:center">Moyenne</th>
          <th style="padding:8px 10px;text-align:left">Appréciation</th>
        </tr></thead><tbody>${lignes||'<tr><td colspan="3" style="padding:12px;text-align:center;color:#9ca3af">Aucune note</td></tr>'}</tbody>
        <tfoot><tr style="background:#f3f4f6;font-weight:900">
          <td style="padding:8px 10px">MOYENNE GÉNÉRALE</td>
          <td style="padding:8px 10px;text-align:center;font-size:16px;color:${moy>=10?'#065f46':'#dc2626'}">${moy}/20</td>
          <td style="padding:8px 10px;font-size:13px">${moy>=16?'Excellent':moy>=14?'Très Bien':moy>=12?'Bien':moy>=10?'Assez Bien':'Insuffisant'}</td>
        </tr></tfoot>
      </table>
      <div style="margin-top:16px;display:flex;justify-content:space-between;font-size:12px;color:#9ca3af">
        <div>Signature parent : ___________________</div>
        <div>Cachet : ___________________</div>
      </div>
    </div>`;
  }).join('');

  const html = `<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>Bulletins ${entNom}</title>
  <style>body{font-family:Arial,sans-serif;margin:0;padding:20px}@media print{@page{margin:10mm}}<\/style>
  <\/head><body>${bulletins}<\u003cscript>window.onload=function(){window.print();}<\/script><\/body><\/html>`;
  const win = window.open('','_blank','width=900,height=700');
  if(!win){toast('Autorisez les popups');return;}
  win.document.write(html); win.document.close();
}

// ─── PRÉSENCES ───
function renderPresences() {
  ecoleDB();
  const today = new Date().toLocaleDateString('fr-FR');
  const presences = (DB.ecolePresences||[]).filter(p=>p.date===today);
  const presents  = presences.filter(p=>p.statut==='Présent').length;
  const absents   = presences.filter(p=>p.statut==='Absent').length;
  const retards   = presences.filter(p=>p.statut==='Retard').length;
  document.getElementById('ecole-presents-today') && (document.getElementById('ecole-presents-today').textContent = presents);
  document.getElementById('ecole-absents-today')  && (document.getElementById('ecole-absents-today').textContent  = absents);
  document.getElementById('ecole-retards-today')  && (document.getElementById('ecole-retards-today').textContent  = retards);

  const el = document.getElementById('ecole-presences-list');
  if(!el) return;
  if(!DB.ecoleEleves?.length) { el.innerHTML='<div style="padding:32px;text-align:center;color:var(--text3)">Enregistrez des eleves dabord</div>'; return; }

  el.innerHTML = `<div style="padding:16px">
    <div style="font-size:13px;font-weight:700;margin-bottom:12px">📅 Appel du ${today}</div>
    <div style="display:grid;gap:8px">${DB.ecoleEleves.map(e=>{
      const p = presences.find(p=>String(p.eleveId)===String(e.id));
      return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface2);border-radius:8px;border:1px solid var(--border)">
        <div><span style="font-weight:600">${e.nom} ${e.prenom}</span> <span style="font-size:12px;color:var(--text3)">${e.classe}</span></div>
        <div style="display:flex;gap:6px">
          ${['Présent','Absent','Retard'].map(s=>`<button onclick="setPresence(${e.id},'${s}')"
            style="padding:4px 10px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:700;
              background:${p?.statut===s?(s==='Présent'?'#10b981':s==='Absent'?'#ef4444':'#f59e0b'):'var(--surface)'};
              color:${p?.statut===s?'white':'var(--text2)'}">${s==='Présent'?'✅':s==='Absent'?'❌':'⏰'} ${s}</button>`).join('')}
        </div>
      </div>`;
    }).join('')}</div>
  </div>`;
}

function setPresence(eleveId, statut) {
  ecoleDB();
  const today = new Date().toLocaleDateString('fr-FR');
  const idx = DB.ecolePresences.findIndex(p=>String(p.eleveId)===String(eleveId)&&p.date===today);
  const entry = { eleveId, statut, date: today, id: Date.now() };
  if(idx>=0) DB.ecolePresences[idx] = entry;
  else DB.ecolePresences.push(entry);
  saveToFirestore('ecolePresences', entry);
  renderPresences();
}

// ─── PAIEMENTS SCOLARITÉ ───
function renderEcolePaiements() {
  ecoleDB();
  const paiements = DB.ecolePaiements || [];
  const eleves    = DB.ecoleEleves    || [];
  const totalPercu= paiements.reduce((s,p)=>s+Number(p.montant||0),0);
  const totalDu   = eleves.reduce((s,e)=>s+Number(e.frais||0),0);
  document.getElementById('ecole-total-percu') && (document.getElementById('ecole-total-percu').textContent = fmtNum(totalPercu)+' F');
  document.getElementById('ecole-total-impaye') && (document.getElementById('ecole-total-impaye').textContent = fmtNum(Math.max(0,totalDu-totalPercu))+' F');
  const payes = eleves.filter(e=>(e.fraisPaye||0)>=(e.frais||0)&&(e.frais||0)>0).length;
  document.getElementById('ecole-eleves-payes') && (document.getElementById('ecole-eleves-payes').textContent = payes);

  const el = document.getElementById('ecole-paiements-list');
  if(!el) return;
  if(!paiements.length) { el.innerHTML='<div style="padding:32px;text-align:center;color:var(--text3)">Aucun paiement enregistré</div>'; return; }
  el.innerHTML = `<table class="table"><thead><tr>
    <th>Date</th><th>Élève</th><th>Classe</th><th>Tranche</th><th>Montant</th><th>Mode</th><th>Obs.</th>
  </tr></thead><tbody>${paiements.slice().reverse().map(p=>{
    const eleve = eleves.find(e=>String(e.id)===String(p.eleveId));
    return `<tr>
      <td>${p.date||'-'}</td>
      <td><strong>${eleve?eleve.nom+' '+eleve.prenom:'?'}</strong></td>
      <td>${eleve?.classe||'-'}</td>
      <td>${p.tranche||'-'}</td>
      <td style="font-weight:700;color:#10b981">${fmtNum(p.montant||0)} F</td>
      <td>${p.mode||'-'}</td>
      <td style="font-size:12px;color:var(--text2)">${p.observation||'-'}</td>
    </tr>`;
  }).join('')}</tbody></table>`;
}

function savePaiementScol() {
  ecoleDB();
  const eleveId = document.getElementById('pscol-eleve')?.value;
  const montant = Number(document.getElementById('pscol-montant')?.value||0);
  const date    = document.getElementById('pscol-date')?.value;
  if(!eleveId || !montant || !date) { toast('Champs obligatoires manquants'); return; }
  const p = {
    id         : Date.now(),
    eleveId, montant, date,
    mode       : document.getElementById('pscol-mode')?.value,
    tranche    : document.getElementById('pscol-tranche')?.value,
    observation: document.getElementById('pscol-obs')?.value?.trim()
  };
  DB.ecolePaiements.push(p);
  // Mettre à jour fraisPaye sur l'élève
  const eleve = DB.ecoleEleves.find(e=>String(e.id)===String(eleveId));
  if(eleve) eleve.fraisPaye = (eleve.fraisPaye||0) + montant;
  saveToFirestore('ecolePaiements', p);
  closeModal('modal-paiement-scol');
  renderEcolePaiements();
  toast('✅ Paiement enregistré : '+fmtNum(montant)+' F');
}

// ─── EMPLOI DU TEMPS ───
function renderEmploiDuTemps() {
  ecoleDB();
  const classe = document.getElementById('edt-classe')?.value || 'CP1';
  const edt    = (DB.ecoleEDT||[]).filter(c=>c.classe===classe);
  const jours  = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi'];
  const heures = ['7h-8h','8h-9h','9h-10h','10h-11h','11h-12h','14h-15h','15h-16h','16h-17h'];
  const el     = document.getElementById('ecole-edt-grid');
  if(!el) return;
  el.innerHTML = `<div style="overflow-x:auto;padding:16px">
    <table style="width:100%;border-collapse:collapse;font-size:12px">
      <thead><tr style="background:var(--accent)">
        <th style="padding:8px;color:white;text-align:left">Heure</th>
        ${jours.map(j=>`<th style="padding:8px;color:white;text-align:center">${j}</th>`).join('')}
      </tr></thead>
      <tbody>${heures.map(h=>`<tr>
        <td style="padding:8px;background:var(--surface2);font-weight:700;color:var(--text2);border:1px solid var(--border)">${h}</td>
        ${jours.map(j=>{
          const cours = edt.find(c=>c.heure===h&&c.jour===j);
          return `<td style="padding:8px;border:1px solid var(--border);text-align:center;cursor:pointer;background:${cours?'rgba(108,99,255,.15)':'var(--surface)'}"
            onclick="addCours('${classe}','${j}','${h}')">
            ${cours?`<div style="font-weight:700;color:var(--accent);font-size:11px">${cours.matiere}</div><div style="font-size:10px;color:var(--text3)">${cours.enseignant||''}</div>${cours.salle?`<div style="font-size:9px;color:var(--accent2);opacity:.7">${cours.salle}</div>`:''}`:'<span style="color:var(--text3);font-size:18px;opacity:.3">+</span>'}
          </td>`;
        }).join('')}
      </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

function addCours(classe, jour, heure) {
  ecoleDB();
  var existing = (DB.ecoleEDT||[]).find(function(c){
    return c.classe===classe && c.jour===jour && c.heure===heure;
  });
  window._edtClasse = classe;
  window._edtJour   = jour;
  window._edtHeure  = heure;

  var modal = document.getElementById('modal-edt-cours');
  if(!modal) {
    modal = document.createElement('div');
    modal.id = 'modal-edt-cours';
    modal.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;align-items:center;justify-content:center;';

    var box = document.createElement('div');
    box.className = 'modal';
    box.style.cssText = 'width:440px;max-width:95vw;';

    // Header
    var hdr = document.createElement('div');
    hdr.className = 'modal-header';
    var ttl = document.createElement('div');
    ttl.className = 'modal-title';
    ttl.innerHTML = '📅 Cours — <span id="edt-slot-label"></span>';
    var closeBt = document.createElement('button');
    closeBt.className = 'modal-close';
    closeBt.textContent = '✕';
    closeBt.onclick = function(){ modal.style.display='none'; };
    hdr.appendChild(ttl);
    hdr.appendChild(closeBt);
    box.appendChild(hdr);

    // Body
    var body = document.createElement('div');
    body.className = 'modal-body';
    body.style.cssText = 'display:flex;flex-direction:column;gap:14px;';

    function mkField(lbl, el) {
      var g = document.createElement('div');
      g.className = 'form-group';
      var lb = document.createElement('label');
      lb.className = 'form-label';
      lb.textContent = lbl;
      g.appendChild(lb);
      g.appendChild(el);
      return g;
    }

    // Matière select
    var selMat = document.createElement('select');
    selMat.id = 'edt-matiere';
    selMat.className = 'form-input';
    ['','Mathématiques','Français','Anglais','Sciences','Histoire-Géo',
     'Physique-Chimie','SVT','Informatique','EPS','Arts','Philosophie',
     'Économie','Comptabilité','Autre'].forEach(function(m){
      var o = document.createElement('option');
      o.value = m; o.textContent = m || '-- Choisir une matière --';
      selMat.appendChild(o);
    });
    body.appendChild(mkField('Matière *', selMat));

    // Matière custom
    var inpCus = document.createElement('input');
    inpCus.id = 'edt-matiere-custom';
    inpCus.className = 'form-input';
    inpCus.placeholder = 'Matière personnalisée';
    var fCus = mkField('Autre matière', inpCus);
    fCus.id = 'edt-field-custom';
    fCus.style.display = 'none';
    body.appendChild(fCus);
    selMat.onchange = function(){
      fCus.style.display = selMat.value === 'Autre' ? 'block' : 'none';
    };

    // Enseignant
    var inpEns = document.createElement('input');
    inpEns.id = 'edt-enseignant';
    inpEns.className = 'form-input';
    inpEns.placeholder = "Nom de l'enseignant";
    body.appendChild(mkField('Enseignant', inpEns));

    // Heures début/fin
    var heures = ['7h00','7h30','8h00','8h30','9h00','9h30','10h00','10h30',
                  '11h00','11h30','12h00','13h00','13h30','14h00','14h30',
                  '15h00','15h30','16h00','16h30','17h00','17h30'];
    var rowH = document.createElement('div');
    rowH.style.cssText = 'display:grid;grid-template-columns:1fr 1fr;gap:10px;';

    var selHD = document.createElement('select');
    selHD.id = 'edt-heure-debut'; selHD.className = 'form-input';
    var selHF = document.createElement('select');
    selHF.id = 'edt-heure-fin'; selHF.className = 'form-input';
    heures.forEach(function(h){
      var o1 = document.createElement('option'); o1.value=h; o1.textContent=h; selHD.appendChild(o1);
      var o2 = document.createElement('option'); o2.value=h; o2.textContent=h; selHF.appendChild(o2);
    });

    var gHD = document.createElement('div'); gHD.className='form-group';
    var lHD = document.createElement('label'); lHD.className='form-label'; lHD.textContent='Heure début';
    gHD.appendChild(lHD); gHD.appendChild(selHD);

    var gHF = document.createElement('div'); gHF.className='form-group';
    var lHF = document.createElement('label'); lHF.className='form-label'; lHF.textContent='Heure fin';
    gHF.appendChild(lHF); gHF.appendChild(selHF);

    rowH.appendChild(gHD); rowH.appendChild(gHF);
    body.appendChild(rowH);

    // Salle

function validerCours() {
  var matSel = document.getElementById('edt-matiere').value;
  var matCus = document.getElementById('edt-matiere-custom').value.trim();
  var matiere = (matSel === 'Autre' ? matCus : matSel) || matCus;
  if(!matiere) { toast('❌ Choisissez une matière'); return; }
  var ens    = document.getElementById('edt-enseignant').value.trim();
  var hDeb   = document.getElementById('edt-heure-debut').value;
  var hFin   = document.getElementById('edt-heure-fin').value;
  var salle  = document.getElementById('edt-salle').value.trim();
  var classe = window._edtClasse; var jour = window._edtJour; var heure = window._edtHeure;
  ecoleDB();
  const idxE = DB.ecoleEDT.findIndex(function(c){ return c.classe===classe&&c.jour===jour&&c.heure===heure; });
  const entry = { classe, jour, heure, matiere, enseignant:ens, heureDebut:hDeb, heureFin:hFin, salle, id: Date.now() };
  if(idxE>=0) DB.ecoleEDT[idxE]=entry; else DB.ecoleEDT.push(entry);
  saveToFirestore('ecoleEDT', entry);
  idbSave('ecoleEDT', DB.ecoleEDT).catch(function(){});
  closeModal('modal-edt-cours');
  renderEmploiDuTemps();
  toast('✅ Cours enregistré: '+matiere+' ('+hDeb+'-'+hFin+')');
}

function supprimerCours() {
  var classe=window._edtClasse, jour=window._edtJour, heure=window._edtHeure;
  ecoleDB();
  DB.ecoleEDT = DB.ecoleEDT.filter(function(c){ return !(c.classe===classe&&c.jour===jour&&c.heure===heure); });
  idbSave('ecoleEDT', DB.ecoleEDT).catch(function(){});
  closeModal('modal-edt-cours');
  renderEmploiDuTemps();
  toast('🗑 Cours supprimé');
}

function imprimerEDT() {
  ecoleDB();
  const classe = document.getElementById('edt-classe')?.value || '';
  const entNom = ENTREPRISES[DB.currentUser?.entreprise]?.nom || 'École';
  const edt    = (DB.ecoleEDT||[]).filter(c=>c.classe===classe);
  const jours  = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi'];
  const heures = ['7h-8h','8h-9h','9h-10h','10h-11h','11h-12h','14h-15h','15h-16h','16h-17h'];
  const rows   = heures.map(h=>`<tr>
    <td style="padding:8px;font-weight:700;background:#f3f4f6">${h}</td>
    ${jours.map(j=>{
      const c = edt.find(x=>x.heure===h&&x.jour===j);
      return `<td style="padding:8px;text-align:center;background:${c?'#ede9fe':'#fff'};border:1px solid #e5e7eb">
        ${c?`<strong style="color:#7c3aed">${c.matiere}</strong><br><small>${c.enseignant||''}</small>`:''}

function genererEtSauverLicence() {
  const entId   = document.getElementById('lic-entid')?.value;
  const forfait = document.getElementById('lic-forfait')?.value;
  const debut   = document.getElementById('lic-debut')?.value || new Date().toISOString().split('T')[0];
  const montant = document.getElementById('lic-montant')?.value;
  if(!entId || !forfait) { toast('Sélectionnez une entreprise et un forfait'); return; }

  const cle    = genererCleLicence(entId, forfait);
  const fin    = calculerDateFin(forfait, debut);
  const licData = { cle, entId, forfait, dateDebut: debut, dateFin: fin, montant: Number(montant||0), actif: true, creeLe: new Date().toISOString() };

  if(!window.FB) { toast('Firebase non disponible'); return; }
  // Utiliser les originaux (pas les monkey-patchés)
  const _setDoc = window.FB._setDoc_orig || window.FB.setDoc;
  const { doc, db } = window.FB;

  // Sauvegarder dans licences/{cle} ET dans entreprises/{entId}/settings/licence
  Promise.all([
    _setDoc(doc(db, 'licences', cle), licData),
    _setDoc(doc(db, 'entreprises', entId, 'settings', 'licence'), licData)
  ]).then(() => {
    LICENCES[entId] = { ...licData };
    toast('✅ Licence générée !');
    chargerLicences();
    // Afficher la clé dans une alerte
    const msg = '🔑 CLÉ DE LICENCE GÉNÉRÉE\n\n' +
      'Entreprise : ' + (ENTREPRISES[entId]?.nom||entId) + '\n' +
      'Forfait    : ' + FORFAITS[forfait]?.label + '\n' +
      'Clé        : ' + cle + '\n' +
      'Du         : ' + debut + '\n' +
      'Au         : ' + fin + '\n' +
      'Montant    : ' + fmtNum(licData.montant) + ' F\n\n' +
      'Copiez cette clé et envoyez-la au client.';
    alert(msg);
  }).catch(e => toast('❌ Erreur : ' + e.message));
}

function chargerLicences() {
  if(!window.FB) { toast('Firebase non disponible'); return; }
  const _getDocs = window.FB._getDocs_orig || window.FB.getDocs;

    snap.forEach(d => lics.push(d.data()));

// ── Sauvegarde Firestore sécurisée (bypass en mode démo) ──

// ══════════════════════════════════════════════════════
// MOTEUR INDEXEDDB — Stockage local illimité (500 MB+)
// localStorage (5 MB) → IndexedDB (500 MB+) + Firestore cloud
// ══════════════════════════════════════════════════════

var _IDB       = null;
var _IDB_NAME  = 'DpGestProDB';
var _IDB_VER   = 1;
var _isOnline  = navigator.onLine;
var _syncQueue = [];
var _LS_PREFIX = 'dpgestpro_';

// Collections stockées localement
var _IDB_STORES = [
  'products','clients','ventes','purchases','projects',
  'expenses','employees','salaires','journees','cultes',
  'collectes','membres','presences','egliseAnnexes',
  'settings','_meta'
];

// ── Ouvrir IndexedDB ──────────────────────────────────
function openIDB() {
  return new Promise(function(resolve, reject) {
    if(_IDB) { resolve(_IDB); return; }
    var req = indexedDB.open(_IDB_NAME, _IDB_VER);
    req.onupgradeneeded = function(e) {
      var db = e.target.result;
      _IDB_STORES.forEach(function(s) {
        if(!db.objectStoreNames.contains(s))
          db.createObjectStore(s, {keyPath:'_id', autoIncrement:true});
      });
    };
    req.onsuccess  = function(e) { _IDB = e.target.result; resolve(_IDB); };
    req.onerror    = function(e) { reject(e.target.error); };
  });
}

// ── Sauvegarder collection entière dans IDB ───────────
function idbSave(storeName, items) {
  return openIDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var entId = DB.currentUser ? DB.currentUser.entreprise||'default' : 'default';
      var arr   = Array.isArray(items) ? items : [items];
      var tx    = db.transaction(storeName, 'readwrite');
      var store = tx.objectStore(storeName);
      // PUT chaque item sans effacer (upsert)
      arr.forEach(function(item) {
        if(!item || typeof item !== 'object') return;
        var record    = Object.assign({}, item);
        record._entId = entId;
        record._id    = entId + '_' + storeName + '_' + (item.id || Date.now() + '_' + Math.random().toString(36).slice(2,6));
        record._ts    = Date.now();
        try { store.put(record); } catch(e) {}
      });
      tx.oncomplete = function() { resolve(true); };
      tx.onerror    = function(e) { console.warn('idbSave error:', e.target.error); resolve(false); };
    });
  }).catch(function(e) {
    console.warn('idbSave fallback localStorage:', e);
    try {
      var key = '_idb_' + (DB.currentUser ? DB.currentUser.entreprise||'default' : 'default') + '_' + storeName;
      var existing = JSON.parse(localStorage.getItem(key)||'[]');
      var arr2     = Array.isArray(items) ? items : [items];
      arr2.forEach(function(item) {
        var idx2 = existing.findIndex(function(e){ return e.id === item.id; });
        if(idx2 >= 0) existing[idx2] = item;
        else existing.push(item);
      });
      localStorage.setItem(key, JSON.stringify(existing));
    } catch(le) {}
  });
}


function idbLoad(storeName) {
  return openIDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var entId = DB.currentUser ? DB.currentUser.entreprise||'default' : 'default';
      var tx    = db.transaction(storeName, 'readonly');
      var store = tx.objectStore(storeName);
      var req   = store.getAll();
      req.onsuccess = function() {
        var all = req.result || [];
        // Filtrer par entreprise
        var filtered = all.filter(function(r){ return r._entId === entId; });
        // Retirer les métadonnées internes
        var clean = filtered.map(function(r){
          var c = Object.assign({}, r);
          delete c._id; delete c._entId; delete c._ts;
          return c;
        });
        resolve(clean);
      };
      req.onerror = function(e) { reject(e.target.error); };
    });
  }).catch(function() {
    try {
      var key  = '_idb_' + (DB.currentUser ? DB.currentUser.entreprise||'default' : 'default') + '_' + storeName;
      var raw  = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : [];
    } catch(e) { return []; }
  });
}


function idbDelete(storeName, itemId) {
  return openIDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx    = db.transaction(storeName, 'readwrite');
      var store = tx.objectStore(storeName);
      store.delete(itemId);
      tx.oncomplete = function() { resolve(true); };
      tx.onerror    = function(e) { reject(e.target.error); };
    });
  });
}

// ── Taille IDB ────────────────────────────────────────
async function getIDBSize() {
  try {
    if(navigator.storage && navigator.storage.estimate) {
      var est  = await navigator.storage.estimate();
      var used = Math.round((est.usage||0)/1024/1024*10)/10;
      var quot = Math.round((est.quota||0)/1024/1024);
      return { used, quota:quot, pct:quot>0?Math.round(used/quot*100):0 };
    }
  } catch(e) {}
  return { used:0, quota:500, pct:0 };
}

async function syncPendingQueue() {
  if(!_isOnline || !window.FB || !_syncQueue.length) return;
  var { db, doc, setDoc } = window.FB;
  var entId = DB.currentUser ? DB.currentUser.entreprise||'default' : 'default';
  var done  = [];
  for(var i=0; i<_syncQueue.length; i++) {
    var a = _syncQueue[i];

      await setDoc(doc(db,'entreprises',entId,a.col,String(a.id)), a.data, {merge:true});

  if(done.length) toast('☁️ '+done.length+' action(s) synchronisée(s)');
}

// ── Sync Firestore → IDB (arrière-plan) ───────────────
async function syncFromFirestore(entId) {
  if(!entId) return 0;

  // Déterminer le type d'entreprise pour charger les bonnes collections
  var ent     = window.ENTREPRISES && window.ENTREPRISES[entId];
  var entType = (ent && ent.type) || 'commerce';

  // Collections selon le type
  var commerceCols  = ['products','clients','sales','ventes','purchases','projects','expenses','employees','salaires','journees'];
  var hopitalCols   = ['patients','consultations','hospit','medicaments','equipements','personnel','factures','urgences','laboratoire','imagerie','rh_employes'];
  var ecoleCols     = ['ecoleEleves','ecoleNotes','emploidutemps','ecolePresences','ecolePaiements','ecoleExamens','ecoleBiblio','rh_employes','ecoleEDT','ecoleEmprunts','ecoleBourses'];
  var egliseCols    = ['membres','cultes','collectes','egliseAnnexes'];
  var mfiCols       = ['mfi_clients','mfi_prets','mfi_remboursements','mfi_epargne','mfi_caisse'];
  var footCols      = ['foot_joueurs','foot_matchs','foot_entrainements','foot_competitions','foot_medical','foot_finances'];

  // Toujours inclure les collections communes
  var baseCols = ['products','clients','sales','ventes','purchases','projects','expenses','employees','salaires','journees'];
  var typeCols = entType==='hopital'      ? hopitalCols
               : entType==='ecole'        ? ecoleCols
               : entType==='eglise'       ? egliseCols
               : entType==='microfinance' ? mfiCols
               : entType==='football'     ? footCols
               : [];

  // Fusionner sans doublons
  var allCols = baseCols.concat(typeCols.filter(function(c){ return !baseCols.includes(c); }));

  var mapping = allCols.map(function(c) {
    var dbKey = c === 'sales' ? 'ventes' : c;
    return { fs: c, db: dbKey };
  });
  // D'abord charger IDB (offline) → affichage immédiat
  for(var j=0; j<mapping.length; j++) {
    var m = mapping[j];
    try {
      var local = await idbLoad(m.fs);
      if(local && local.length > 0 && (!DB[m.db] || !DB[m.db].length)) {
        DB[m.db] = local;
      }
    } catch(e) {}
  }

  if(!window.FB || window._isDemoMode) return 0;
  var { db, collection: col, getDocs } = window.FB;
  var total = 0;
  var seen  = {};

  for(var i=0; i<mapping.length; i++) {
    var mp = mapping[i];
    if(seen[mp.fs]) continue;
    seen[mp.fs] = true;
    try {
      var snap = await getDocs(col(db, 'entreprises', entId, mp.fs));
      if(!snap.empty) {
        var data = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
        // Fusionner avec IDB existant (ne pas écraser si données locales plus récentes)
        await idbSave(mp.fs, data);
        // Mapping MFI et Football vers les bonnes clés DB
        var mfiMap  = {'mfi_clients':'mfiClients','mfi_prets':'mfiPrets',
          'mfi_remboursements':'mfiRemboursements','mfi_epargne':'mfiEpargne','mfi_caisse':'mfiCaisse'};
        var footMap = {'foot_joueurs':'footJoueurs','foot_matchs':'footMatchs',
          'foot_entrainements':'footEntrainements','foot_competitions':'footCompetitions',
          'foot_medical':'footMedical','foot_finances':'footFinances'};
        var realKey = mfiMap[mp.fs] || footMap[mp.fs] || mp.db;
        DB[realKey] = data;
        // Alias spéciaux
        if(mp.fs === 'sales')  DB.ventes = data;
        if(mp.fs === 'ventes') DB.sales  = data;
        total += data.length;
      } else {
        // Firestore vide → garder IDB
        var idbData = await idbLoad(mp.fs);
        if(idbData.length) {
          DB[mp.db] = idbData;
          if(mp.fs === 'sales')  DB.ventes = idbData;
          if(mp.fs === 'ventes') DB.sales  = idbData;
        }
      }
    } catch(e) {
      // Firestore inaccessible → utiliser IDB
      try {
        var fallback = await idbLoad(mp.fs);
        if(fallback.length) DB[mp.db] = fallback;
      } catch(e2) {}
    }
  }
  if(total) console.log('✅ Sync Firestore→IDB: '+total+' docs pour '+entId);
  return total;
}

// ── Modifier saveToFirestore pour IDB en parallèle ────
// (patch appliqué après définition originale)

function saveToFirestore(collection, data, customId) {
  if(window._isDemoMode) return Promise.resolve(); // Démo : pas de Firestore

  // HYBRID: sauvegarder en IDB d'abord (instantané, offline-safe)
  var itemId  = customId || data.id || ('loc_'+Date.now());
  var newItem = Object.assign({}, data, {id: itemId});
  // Mettre à jour la collection locale
  idbLoad(collection).then(function(existing) {
    var arr  = Array.isArray(existing) ? existing : [];
    var idx2 = arr.findIndex(function(e){ return e.id === itemId; });
    if(idx2 >= 0) arr[idx2] = newItem; else arr.push(newItem);
    idbSave(collection, arr);
  }).catch(function(){ idbSave(collection, [newItem]); });
  showSyncStatus('saved');

  // Si hors ligne → file d'attente Firestore
  if(!_isOnline) {
    _syncQueue.push({col:collection, id:itemId, data:newItem, ts:Date.now()});
    showSyncStatus('offline');
    return Promise.resolve({id:itemId});
  }

  if(!window.FB) return Promise.resolve();
  const { db, doc, setDoc, addDoc, collection: col, serverTimestamp } = window.FB;
  const entId = window.currentEntrepriseId || 'dpgestpro';
  try {
    if(customId) {
      return setDoc(doc(db, 'entreprises', entId, collection, String(customId)), 
        { ...data, updatedAt: serverTimestamp() }, { merge: true });
    } else {
      return addDoc(col(db, 'entreprises', entId, collection), 
        { ...data, createdAt: serverTimestamp() });
    }
  } catch(e) { console.warn('saveToFirestore error:', e); return Promise.resolve(); }
}

// ── Charger les demandes de paiement en attente ──
function chargerDemandes() {
  if(!window.FB) { toast('Firebase non disponible'); return; }
  const _getDocs = window.FB._getDocs_orig || window.FB.getDocs;
  const { collection, db } = window.FB;
  const el = document.getElementById('demandes-list');
  if(el) el.innerHTML = '<div style="padding:20px;text-align:center">⏳ Chargement...</div>';

  _getDocs(collection(db, 'demandes_activation')).then(snap => {
    const items = [];
    snap.forEach(d => items.push({id: d.id, ...d.data()}));
    items.sort((a,b) => (b.creeLe||'').localeCompare(a.creeLe||''));

    if(!items.length) { el.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text3)">Aucune demande</div>'; return; }

    el.innerHTML = `<table class="table"><thead><tr>
      <th>Date</th><th>Entreprise</th><th>Forfait</th><th>Montant</th>
      <th>Méthode</th><th>Référence</th><th>Client</th><th>Statut</th><th>Action</th>
    </tr></thead><tbody>${items.map(d => `<tr>
      <td style="font-size:11px">${new Date(d.creeLe).toLocaleDateString('fr-FR')}</td>
      <td><strong>${d.entNom||d.entId}</strong></td>
      <td>${FORFAITS[d.forfait]?.label||d.forfait}</td>
      <td style="font-weight:700;color:#10b981">${fmtNum(d.montant||0)} F</td>
      <td>${d.methode||'-'}</td>
      <td style="font-family:monospace;font-size:11px">${d.reference||'-'}</td>
      <td style="font-size:12px">${d.nom||''}<br><span style="color:var(--text3)">${d.email||''}</span></td>
      <td><span style="padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;
        background:${d.statut==='En attente'?'rgba(245,158,11,.15)':'rgba(16,185,129,.15)'};
        color:${d.statut==='En attente'?'#f59e0b':'#10b981'}">${d.statut}</span></td>
      <td>
        ${d.statut==='En attente'?`
        <button class="btn-sm btn-add" onclick="validerDemande('${d.id}','${d.entId}','${d.forfait}')"
          style="font-size:11px;padding:4px 10px">✅ Valider</button>`:
        '<span style="color:#10b981;font-size:12px">✅ Fait</span>'}
      </td>
    </tr>`).join('')}</tbody></table>`;
  }).catch(e => { if(el) el.innerHTML = '<div style="padding:20px;color:#ef4444">Erreur: '+e.message+'</div>'; });
}

function validerDemande(demandeId, entId, forfait) {
  if(!confirm('Valider ce paiement et générer la licence pour ' + (ENTREPRISES[entId]?.nom||entId) + ' ?')) return;
  // Générer la licence
  const cle    = genererCleLicence(entId, forfait);
  const debut  = new Date().toISOString().split('T')[0];
  const fin    = calculerDateFin(forfait, debut);
  const type   = ENTREPRISES[entId]?.type || 'commerce';
  const montant= TARIFS[type]?.[forfait] || 0;
  const licData= { cle, entId, forfait, dateDebut:debut, dateFin:fin, montant, actif:true, creeLe: new Date().toISOString() };

  const _setDoc = window.FB._setDoc_orig || window.FB.setDoc;
  const { doc, db } = window.FB;

  Promise.all([
    _setDoc(doc(db,'licences',cle), licData),
    _setDoc(doc(db,'entreprises',entId,'settings','licence'), licData),
    _setDoc(doc(db,'demandes_activation',demandeId), { statut:'Validé', cleLicence:cle }, { merge:true })
  ]).then(() => {
    LICENCES[entId] = { ...licData };
    const msg = '✅ LICENCE GÉNÉRÉE\n\n' +
      'Entreprise : '+(ENTREPRISES[entId]?.nom||entId)+'\n'+
      'Clé        : '+cle+'\n'+
      'Du         : '+debut+'\n'+
      'Au         : '+fin+'\n\n'+
      'Envoyez cette clé au client !';
    alert(msg);
    chargerDemandes();
    toast('✅ Licence activée pour '+(ENTREPRISES[entId]?.nom||entId));
  }).catch(e => toast('❌ Erreur : '+e.message));
}

  ecoleDB();

  const l = DB.ecoleLivres[idx];

    l.emprunteur = null;
    toast('✅ Livre retourné');

  const passes   = examens.filter(e=>e.statut==='Terminé').length;
  const attente  = examens.filter(e=>e.statut==='Programmé'||e.date>today).length;
  const admis    = examens.reduce((s,e)=>s+Number(e.admis||0),0);

      '<td><span style="background:var(--accent);color:white;padding:2px 8px;border-radius:10px;font-size:11px">'+e.classe+'</span></td>'+
      '<td>'+e.matiere+'</td>'+
      '<td>'+e.date+'</td>'+

      '<td style="text-align:center">'+cand+'</td>'+
      '<td style="text-align:center;color:#10b981;font-weight:700">'+adm+' <small>('+tx+')</small></td>'+

function renderBibliotheque() {
  ecoleDB();
  if(!DB.ecoleBiblio)   DB.ecoleBiblio   = [];
  if(!DB.ecoleEmprunts) DB.ecoleEmprunts = [];
  const search  = (document.getElementById('biblio-search')?.value||'').toLowerCase();
  const filtCat = document.getElementById('biblio-filter')?.value || '';
  const today   = new Date().toISOString().split('T')[0];

  const total   = DB.ecoleBiblio.length;
  const enCours = DB.ecoleEmprunts.filter(e=>!e.rendu).length;
  const retard  = DB.ecoleEmprunts.filter(e=>!e.rendu && e.dateRetour < today).length;
  const dispo   = DB.ecoleBiblio.reduce((s,l)=>{
    const emp = DB.ecoleEmprunts.filter(e=>!e.rendu && String(e.ouvrageId)===String(l.id)).length;
    return s + Math.max(0, Number(l.qty||1) - emp);
  }, 0);

  document.getElementById('ecole-total-ouvrages')  && (document.getElementById('ecole-total-ouvrages').textContent  = total);
  document.getElementById('ecole-emprunts-encours') && (document.getElementById('ecole-emprunts-encours').textContent = enCours);
  document.getElementById('ecole-emprunts-retard')  && (document.getElementById('ecole-emprunts-retard').textContent  = retard);
  document.getElementById('ecole-ouvrages-dispo')   && (document.getElementById('ecole-ouvrages-dispo').textContent   = dispo);

  // Peupler select ouvrages dans modale emprunt
  const selOuvrage = document.getElementById('emprunt-ouvrage');
  if(selOuvrage) {
    selOuvrage.innerHTML = '<option value="">-- Sélectionner --</option>' +
      DB.ecoleBiblio.map(l=>`<option value="${l.id}">${l.titre} — ${l.auteur||''} (${l.code||''})</option>`).join('');
  }

  const filtered = DB.ecoleBiblio.filter(l => {
    const ms = !search || l.titre.toLowerCase().includes(search) || (l.auteur||'').toLowerCase().includes(search);
    const mc = !filtCat || l.categorie === filtCat;
    return ms && mc;
  });

  const el = document.getElementById('ecole-biblio-list');
  if(!el) return;
  if(!filtered.length) { el.innerHTML='<div style="padding:32px;text-align:center;color:var(--text3)">Aucun ouvrage</div>'; return; }

  el.innerHTML = `<table class="table"><thead><tr>
    <th>Code</th><th>Titre</th><th>Auteur</th><th>Catégorie</th><th>Niveau</th><th>Exemplaires</th><th>Disponibles</th><th>État</th><th></th>
  </tr></thead><tbody>${filtered.map((l,i)=>{

function renderEcoleStats() {
  ecoleDB();
  const eleves    = DB.ecoleEleves    || [];
  const personnel = DB.ecolePersonnel || [];
  const paiements = DB.ecolePaiements || [];

  const totalPercu = paiements.reduce((s,p)=>s+Number(p.montant||0),0);
  const totalDu    = eleves.reduce((s,e)=>s+Number(e.frais||0),0);

  document.getElementById('stats-total-eleves')   && (document.getElementById('stats-total-eleves').textContent   = eleves.length);
  document.getElementById('stats-total-personnel') && (document.getElementById('stats-total-personnel').textContent = personnel.length);
  document.getElementById('stats-frais-total')    && (document.getElementById('stats-frais-total').textContent    = fmtNum(totalPercu)+' F');
  document.getElementById('stats-frais-impaye')   && (document.getElementById('stats-frais-impaye').textContent   = fmtNum(Math.max(0,totalDu-totalPercu))+' F');

  // Répartition par niveau
  const niveaux = {Primaire:0, Collège:0, Lycée:0, Université:0, 'Formation Pro':0};
  eleves.forEach(e => {
    const c = e.classe||'';
    if(['CP1','CP2','CE1','CE2','CM1','CM2'].includes(c)) niveaux.Primaire++;
    else if(['6ème','5ème','4ème','3ème'].includes(c)) niveaux.Collège++;
    else if(c.startsWith('2nde')||c.startsWith('1ère')||c.startsWith('Tle')) niveaux.Lycée++;
    else if(c.startsWith('Licence')||c.startsWith('Master')||c.startsWith('BTS')||c.startsWith('DUT')) niveaux.Université++;
    else if(c.startsWith('CAP')||c.startsWith('BEP')||c==='Formation courte') niveaux['Formation Pro']++;
  });

  const el1 = document.getElementById('stats-par-niveau');
  if(el1) el1.innerHTML = Object.entries(niveaux).map(([k,v])=>
    `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
      <span>${k}</span><strong style="color:var(--accent)">${v} élève(s)</strong>
    </div>`).join('');

  // Répartition par sexe
  const garcons = eleves.filter(e=>e.sexe==='Masculin').length;
  const filles  = eleves.filter(e=>e.sexe==='Féminin').length;
  const el2 = document.getElementById('stats-par-sexe');
  if(el2) el2.innerHTML = `
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
      <span>👦 Garçons / Hommes</span><strong style="color:#6c63ff">${garcons}</strong>
    </div>
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)">
      <span>👧 Filles / Femmes</span><strong style="color:#f59e0b">${filles}</strong>
    </div>
    <div style="display:flex;justify-content:space-between;padding:8px 0">
      <span><strong>Total</strong></span><strong style="color:#10b981">${eleves.length}</strong>
    </div>`;

  // Frais par classe
  const parClasse = {};
  eleves.forEach(e => {
    if(!parClasse[e.classe]) parClasse[e.classe] = {du:0, paye:0};
    parClasse[e.classe].du   += Number(e.frais||0);
    parClasse[e.classe].paye += Number(e.fraisPaye||0);
  });
  const el3 = document.getElementById('stats-frais-classe');
  if(el3) el3.innerHTML = Object.entries(parClasse).slice(0,8).map(([cls,d])=>
    `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">
      <span><b>${cls}</b></span>
      <span style="color:#10b981">${fmtNum(d.paye)} F</span>
      <span style="color:#f59e0b">/${fmtNum(d.du)} F</span>
    </div>`).join('') || '<div style="padding:12px;color:var(--text3)">Aucune donnée</div>';
}

// ─── POINT 1 : GESTION MEMBRES avec filtres ───
function renderMembresGestion() {
  var membres = DB.membres || [];
  var filtSexe = document.getElementById('mb-filter-sexe')?.value || '';
  var filtAge  = document.getElementById('mb-filter-age')?.value  || '';
  var filtMin  = document.getElementById('mb-filter-ministere')?.value || '';
  var filtStat = document.getElementById('mb-filter-statut')?.value || '';
  var search   = (document.getElementById('mb-search-nom')?.value || '').toLowerCase();

  // Stats globales
  var total   = membres.length;
  var hommes  = membres.filter(m=>m.sexe==='Masculin').length;
  var femmes  = membres.filter(m=>m.sexe==='Féminin').length;
  var jeunes  = membres.filter(m=>{var a=Number(m.age||0);return a>=13&&a<=35;}).length;
  var enfants = membres.filter(m=>{var a=Number(m.age||0);return a<13;}).length;
  var actifs  = membres.filter(m=>m.statut==='Actif').length;

  document.getElementById('mb-total')   && (document.getElementById('mb-total').textContent   = total);
  document.getElementById('mb-hommes')  && (document.getElementById('mb-hommes').textContent  = hommes);
  document.getElementById('mb-femmes')  && (document.getElementById('mb-femmes').textContent  = femmes);
  document.getElementById('mb-jeunes')  && (document.getElementById('mb-jeunes').textContent  = jeunes);
  document.getElementById('mb-enfants') && (document.getElementById('mb-enfants').textContent = enfants);
  document.getElementById('mb-actifs')  && (document.getElementById('mb-actifs').textContent  = actifs);

  // Filtrage
  var filtered = membres.filter(function(m) {
    if(filtSexe && m.sexe !== filtSexe) return false;
    if(filtAge) {
      var a = Number(m.age||0);
      if(filtAge==='enfant' && !(a<13)) return false;
      if(filtAge==='jeune'  && !(a>=13&&a<=35)) return false;
      if(filtAge==='adulte' && !(a>35)) return false;
    }
    if(filtMin  && m.ministere !== filtMin) return false;
    if(filtStat && m.statut    !== filtStat) return false;
    if(search   && !(m.nom||'').toLowerCase().includes(search) && !(m.prenom||'').toLowerCase().includes(search)) return false;
    return true;
  });

  // Titre dynamique
  var titre = 'Liste des membres';
  if(filtSexe||filtAge||filtMin||filtStat) titre += ' (filtrés: '+filtered.length+')';
  document.getElementById('mb-list-title') && (document.getElementById('mb-list-title').textContent = '📋 ' + titre);

  var el = document.getElementById('eglise-membres-list');
  if(!el) return;

  if(!filtered.length) {
    el.innerHTML = '<div style="padding:32px;text-align:center;color:var(--text3)">Aucun membre trouvé</div>';
    document.getElementById('mb-total-global') && (document.getElementById('mb-total-global').innerHTML = '');
    return;
  }

  el.innerHTML = '<table class="table"><thead><tr>' +
    '<th>Nom & Prénom</th><th>Sexe</th><th>Âge</th><th>Catégorie</th>' +
    '<th>Ministère</th><th>Téléphone</th><th>Statut</th>' +
    '</tr></thead><tbody>' +
    filtered.map(function(m) {
      var age = Number(m.age||0);
      var cat = age < 13 ? '👶 Enfant' : age <= 35 ? '🧒 Jeune' : '👴 Adulte';
      var col = age < 13 ? '#6c63ff' : age <= 35 ? '#f59e0b' : '#10b981';
      return '<tr>' +
        '<td><strong>'+(m.nom||'')+' '+(m.prenom||'')+'</strong></td>' +
        '<td>'+(m.sexe||'-')+'</td>' +
        '<td>'+(m.age||'-')+' ans</td>' +
        '<td><span style="color:'+col+';font-weight:700">'+cat+'</span></td>' +
        '<td>'+(m.ministere||'-')+'</td>' +
        '<td>'+(m.telephone||'-')+'</td>' +
        '<td><span style="padding:3px 8px;border-radius:10px;font-size:11px;font-weight:700;' +
          'background:'+(m.statut==='Actif'?'rgba(16,185,129,.15)':'rgba(239,68,68,.15)')+';' +
          'color:'+(m.statut==='Actif'?'#10b981':'#ef4444')+'">'+(m.statut||'Actif')+'</span></td>' +
      '</tr>';
    }).join('') + '</tbody></table>';

  // Total global en bas
  var hF = filtered.filter(m=>m.sexe==='Masculin').length;
  var fF = filtered.filter(m=>m.sexe==='Féminin').length;
  var gTot = document.getElementById('mb-total-global');
  if(gTot) gTot.innerHTML =
    '<span>👥 Résultat : <strong>'+filtered.length+' membre(s)</strong></span>' +
    '<span>👨 Hommes/Garçons : <strong>'+hF+'</strong></span>' +
    '<span>👩 Femmes/Filles : <strong>'+fF+'</strong></span>' +
    '<span style="color:var(--accent)">TOTAL GLOBAL : <strong style="font-size:18px">'+filtered.length+'</strong></span>';
}

function calcTotauxCulte() {
  var eg = Number(document.getElementById('c-enf-g')?.value||0);

  var jg = Number(document.getElementById('c-jeu-g')?.value||0);

  var ah = Number(document.getElementById('c-adu-h')?.value||0);

  document.getElementById('tot-jeunes')  && (document.getElementById('tot-jeunes').textContent  = totJeu);

function renderRapportCaisseEglise() {
  var collectes = DB.collectes || [];

      '<div style="font-size:13px;font-weight:800;color:#10b981;margin-bottom:10px">📈 ENTRÉES</div>' +

          '<span style="color:#10b981;font-weight:700">+'+fmtNum(c.montant)+' F</span></div>';

      '<div style="margin-top:10px;display:flex;justify-content:space-between;font-weight:900">' +
        '<span>TOTAL ENTRÉES</span><span style="color:#10b981;font-size:16px">'+fmtNum(totalEntrees)+' F</span>' +
      '</div>' +
    '</div>' +
    // DÉPENSES
    '<div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);border-radius:12px;padding:16px">' +
      '<div style="font-size:13px;font-weight:800;color:#ef4444;margin-bottom:10px">📉 DÉPENSES</div>' +

        return '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">' +
          '<span>'+(d.date||d.creeLe||'')+'</span><span>'+(d.categorie||d.desc||'-')+'</span>' +
          '<span style="color:#ef4444;font-weight:700">-'+fmtNum(d.montant)+' F</span></div>';

    '<div style="background:'+(solde>=0?'rgba(108,99,255,.1)':'rgba(239,68,68,.1)')+';border:2px solid '+(solde>=0?'var(--accent)':'#ef4444')+';border-radius:12px;padding:20px;text-align:center">' +
      '<div style="font-size:13px;font-weight:800;color:var(--text2);margin-bottom:8px">💰 SOLDE GÉNÉRAL</div>' +
      '<div style="font-size:32px;font-weight:900;color:'+(solde>=0?'var(--accent)':'#ef4444')+'">'+fmtNum(solde)+' F</div>' +
      '<div style="font-size:11px;color:var(--text3);margin-top:4px">'+(solde>=0?'✅ Solde positif':'⚠️ Déficit')+'</div>' +

  if(!DB.visites) DB.visites = [];

  var filtMb  = document.getElementById('vis-filter-membre')?.value || '';
  var filtered= visites.filter(function(v){return !filtMb||String(v.membreId)===filtMb;});

  document.getElementById('vis-total')  && (document.getElementById('vis-total').textContent  = visites.length);
  document.getElementById('vis-bien')   && (document.getElementById('vis-bien').textContent   = visites.filter(v=>v.etat==='Bonne santé').length);
  document.getElementById('vis-malades')&& (document.getElementById('vis-malades').textContent= visites.filter(v=>['Malade','Hospitalisé'].includes(v.etat)).length);
  document.getElementById('vis-besoins')&& (document.getElementById('vis-besoins').textContent= visites.filter(v=>v.besoin&&v.besoin!=='Aucun').length);

  var el = document.getElementById('eglise-visites-list');
  if(!el) return;
  if(!filtered.length){el.innerHTML='<div style="padding:32px;text-align:center;color:var(--text3)">Aucune visite enregistrée</div>';return;}

  var membres = DB.membres||[];
  el.innerHTML = '<table class="table"><thead><tr>' +
    '<th>Date</th><th>Membre visité</th><th>Visiteur</th><th>État</th><th>Besoin</th><th>Prière</th><th>Rapport</th><th></th>' +
    '</tr></thead><tbody>' +
    filtered.slice().reverse().map(function(v,i) {
      var mb = membres.find(function(m){return String(m.id)===String(v.membreId);});

      return '<tr>' +
        '<td>'+(v.date||'-')+'</td>' +
        '<td><strong>'+(mb?mb.nom+' '+mb.prenom:'?')+'</strong></td>' +
        '<td>'+(v.visiteur||'-')+'</td>' +
        '<td style="color:'+col+';font-weight:700">'+(v.etat||'-')+'</td>' +
        '<td>'+(v.besoin||'Aucun')+'</td>' +
        '<td>'+(v.priere==='Oui'?'✅ Oui':'❌ Non')+'</td>' +
        '<td style="font-size:11px;max-width:180px;overflow:hidden;text-overflow:ellipsis">'+(v.rapport||'-')+'</td>' +
        '<td><button class="btn-sm btn-outline" onclick="suppVisite('+i+')" style="font-size:11px;padding:4px 8px">🗑</button></td>' +

function initBanques() {
  if(!DB.egliseBanques)    DB.egliseBanques   = [];
