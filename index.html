var _hopTchatConvId = null;

function initHopTchat(){
  toggleEgliseMenu();
  renderHopConvList();
  // Générer lien public
  var base  = window.location.href.replace(/\/[^\/]*$/, '').replace(/\/+$/, '');
  var entId = DB.currentUser?.entreprise || 'cs_tohou';
  var lien  = base + '/tchat.html?ent=' + entId;
  var el    = document.getElementById('hop-tchat-public-link');
  var linkA = document.getElementById('hop-tchat-public-link-open');
  if(el)    el.textContent = lien;
  if(linkA) linkA.href     = lien;
}

function copyHopTchatLink(){
  var el = document.getElementById('hop-tchat-public-link');
  if(!el) return;
  var lien = el.textContent;
  if(navigator.clipboard){
    navigator.clipboard.writeText(lien).then(function(){ toast('🔗 Lien copié ! Partagez-le aux patients.'); });
  } else {
    var tmp = document.createElement('input');
    tmp.value = lien; document.body.appendChild(tmp);
    tmp.select(); document.execCommand('copy'); document.body.removeChild(tmp);
    toast('🔗 Lien copié !');
  }
}

function filterHopTchat(){
  var q=(document.getElementById('hop-tchat-search')?.value||'').toLowerCase();
  renderHopConvList(q);
}

function renderHopConvList(q){
  var el=document.getElementById('hop-conv-list'); if(!el) return;
  var convs=(DB.hopConvs||[]).sort(function(a,b){return (b.lastAt||'').localeCompare(a.lastAt||'');});
  if(q) convs=convs.filter(function(c){return (c.patientNom||'').toLowerCase().includes(q)||(c.sujet||'').toLowerCase().includes(q);});
  if(!convs.length){el.innerHTML='<div style="color:var(--text3);text-align:center;padding:30px;font-size:13px">Aucune conversation.<br>Créez-en une avec le bouton +</div>';return;}
  el.innerHTML=convs.map(function(c){
    var isActive=c.id===_hopTchatConvId;
    var initials=(c.patientNom||'?').split(' ').map(function(w){return w[0];}).slice(0,2).join('').toUpperCase();
    return '<div onclick="openHopConv(\''+c.id+'\')" style="padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;gap:10px;align-items:center;background:'+(isActive?'rgba(0,180,216,.1)':'')+';transition:background .15s" onmouseover="this.style.background=\'rgba(0,180,216,.07)\'" onmouseout="this.style.background=\''+(isActive?'rgba(0,180,216,.1)':'')+'\'">'+
      '<div style="width:42px;height:42px;border-radius:50%;background:#00b4d8;display:flex;align-items:center;justify-content:center;color:white;font-weight:900;font-size:15px;flex-shrink:0">'+initials+'</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div style="font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(c.patientNom||'Patient inconnu')+'</div>'+
        '<div style="font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(c.sujet||'Suivi médical')+'</div>'+
      '</div>'+
      (c.nonLu?'<span style="width:8px;height:8px;background:#00b4d8;border-radius:50%;flex-shrink:0"></span>':'')+
    '</div>';
  }).join('');
}

async function openNewHopConv(){
  var pts=DB.patients||[];
  if(!pts.length){toast('Aucun patient enregistré');return;}
  var opts=pts.map(function(p){return p.nom+' ('+p.dossier+')';}).join('\n');
  var idx=parseInt(prompt('Choisissez le patient (numéro):\n'+pts.map(function(p,i){return (i+1)+'. '+p.nom+' — '+p.dossier;}).join('\n')))-1;
  if(isNaN(idx)||idx<0||idx>=pts.length)return;
  var pt=pts[idx];
  var sujet=prompt('Sujet de la conversation :','Suivi post-consultation');
  if(!sujet)return;
  var conv={patientId:pt.id,patientNom:pt.nom,dossier:pt.dossier,sujet,messages:[],lastAt:new Date().toISOString(),createdAt:new Date().toISOString()};
  if(!DB.hopConvs)DB.hopConvs=[];
  if(window.fbSave){var fid=await window.fbSave('hop_convs',null,conv).catch(function(){return null;});if(fid)conv.id=fid;}
  if(!conv.id)conv.id='hc-'+Date.now();
  DB.hopConvs.push(conv);
  renderHopConvList();
  openHopConv(conv.id);
}

function openHopConv(id){
  _hopTchatConvId=id;
  var c=(DB.hopConvs||[]).find(function(x){return x.id===id;});
  if(!c)return;
  c.nonLu=false;
  var pt=(DB.patients||[]).find(function(p){return p.id===c.patientId;});
  var nomEl=document.getElementById('hop-chat-patient-nom');
  var infoEl=document.getElementById('hop-chat-patient-info');
  var dossierBtn=document.getElementById('hop-chat-voir-dossier');
  if(nomEl)nomEl.textContent=c.patientNom||'Patient';
  if(infoEl)infoEl.textContent=(pt?pt.dossier+' · ':'')+(c.sujet||'Suivi médical');
  if(dossierBtn){dossierBtn.style.display='';dossierBtn.dataset.patId=c.patientId;}
  renderHopMessages(c);
  renderHopConvList();
  var inp=document.getElementById('hop-chat-input'); if(inp)inp.focus();
}

function renderHopMessages(c){
  var el=document.getElementById('hop-chat-messages'); if(!el)return;
  var msgs=c.messages||[];
  if(!msgs.length){el.innerHTML='<div style="text-align:center;color:var(--text3);padding:30px;font-size:13px">Démarrez la conversation de suivi médical</div>';return;}
  var currentUser=DB.currentUser?DB.currentUser.name:'Médecin';
  el.innerHTML=msgs.map(function(m){
    var isMe=m.auteur===currentUser;
    return '<div style="display:flex;justify-content:'+(isMe?'flex-end':'flex-start')+'">'+
      '<div style="max-width:70%;background:'+(isMe?'#00b4d8':'var(--surface2)')+';color:'+(isMe?'white':'var(--text)')+';padding:10px 14px;border-radius:'+(isMe?'16px 16px 4px 16px':'16px 16px 16px 4px')+';font-size:13px">'+
        '<div style="font-weight:700;font-size:11px;margin-bottom:4px;opacity:.8">'+m.auteur+'</div>'+
        '<div>'+m.texte+'</div>'+
        '<div style="font-size:10px;opacity:.6;margin-top:4px;text-align:right">'+m.heure+'</div>'+
      '</div></div>';
  }).join('');
  el.scrollTop=el.scrollHeight;
}

async function sendHopMessage(){
  if(!_hopTchatConvId){toast('Sélectionnez une conversation');return;}
  var inp=document.getElementById('hop-chat-input');
  var texte=inp?inp.value.trim():'';
  if(!texte)return;
  var c=(DB.hopConvs||[]).find(function(x){return x.id===_hopTchatConvId;}); if(!c)return;
  var msg={auteur:DB.currentUser?DB.currentUser.name:'Médecin',texte,heure:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),ts:new Date().toISOString()};
  if(!c.messages)c.messages=[];
  c.messages.push(msg);
  c.lastAt=new Date().toISOString();
  c.dernierMsg=texte.substring(0,40);
  if(window.fbSave)window.fbSave('hop_convs',_hopTchatConvId,{messages:c.messages,lastAt:c.lastAt,dernierMsg:c.dernierMsg}).catch(function(){});
  if(inp)inp.value='';
  renderHopMessages(c);
  renderHopConvList();
}

function hopChatEnter(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendHopMessage();} }

function voirDossierActuel(){
  var btn=document.getElementById('hop-chat-voir-dossier');
  if(btn&&btn.dataset.patId) voirDossier(btn.dataset.patId);
}

// ─── MEMBRES ───
function renderMfiClients() {
  mfiDB();
  var search  = (document.getElementById('mfi-client-search')?.value||'').toLowerCase();
  var statut  = document.getElementById('mfi-client-statut')?.value||'';
  var list    = DB.mfiClients.filter(function(c){
    var ok = (!search || (c.nom||'').toLowerCase().includes(search) || (c.telephone||'').includes(search));
    if(statut) ok = ok && c.statut === statut;
    return ok;
  });
  var tbody = document.getElementById('mfi-clients-tbody');
  if(!tbody) return;
  tbody.innerHTML = list.length ? list.map(function(c){
    var sc = c.statut==='Actif'?'badge-success':c.statut==='Suspendu'?'badge-danger':'badge-warning';
    return '<tr><td><code style="color:var(--accent)">'+(c.num||'—')+'</code></td>'+
      '<td style="font-weight:700">'+(c.nom||'—')+'</td>'+
      '<td>'+(c.telephone||'—')+'</td>'+
      '<td>'+(c.ville||'—')+'</td>'+
      '<td style="font-size:12px;color:var(--text2)">'+(c.dateAdhesion||'—')+'</td>'+
      '<td style="color:var(--success);font-weight:700">'+fmtNum(c.soldeEpargne||0)+' F</td>'+
      '<td><span class="badge '+sc+'">'+(c.statut||'Actif')+'</span></td>'+
      '<td style="display:flex;gap:6px">'+
        '<button class="btn-sm btn-outline" style="color:var(--accent);border-color:var(--accent)" data-id="'+c.id+'" onclick="editMfiClient(this.dataset.id)">✏️</button>'+
        '<button class="btn-sm btn-danger" data-id="'+c.id+'" onclick="deleteMfiClient(this.dataset.id)">🗑</button>'+
      '</td></tr>';
  }).join('') : '<tr><td colspan="8" style="text-align:center;color:var(--text3);padding:24px">Aucun membre enregistré</td></tr>';

        '<button class="btn-sm btn-danger" style="font-size:11px" data-id="'+p.id+'" onclick="deleteMfiPret(this.dataset.id)">🗑</button>'+

  // Stats
  var actifs = DB.mfiPrets.filter(function(p){return p.statut==='En cours'||p.statut==='En retard';});
  var encours = actifs.reduce(function(a,p){return a+(p.montant||0);},0);
  var recouvrer = actifs.reduce(function(a,p){return a+((p.montant||0)-(p.capitalRembourse||0));},0);

function openNewMfiPret() {
  mfiDB();
  if(!DB.mfiClients.length){toast('⚠️ Ajoutez d\'abord des membres !');return;}
  var noms = DB.mfiClients.filter(function(c){return c.statut==='Actif';}).map(function(c){return c.num+' — '+c.nom;}).join('\n');
  var sel = prompt('Sélectionnez le membre (numéro) :\n'+noms+'\n\nEntrez le N° membre (ex: MFI-0001) :');
  if(!sel) return;
  var client = DB.mfiClients.find(function(c){return c.num===sel.trim()||c.nom.toLowerCase().includes(sel.toLowerCase());});
  if(!client){toast('❌ Membre introuvable');return;}
  var montant = parseFloat(prompt('Montant du prêt (F CFA) :'));
  if(!montant||montant<=0){toast('❌ Montant invalide');return;}
  var duree = parseInt(prompt('Durée (mois) :'))||12;
  var taux  = parseFloat(prompt('Taux d\'intérêt mensuel (%) :')||'2');
  var mensualite = Math.round(montant * taux/100 * Math.pow(1+taux/100,duree) / (Math.pow(1+taux/100,duree)-1));
  var num = 'PRET-'+String(DB.mfiPrets.length+1).padStart(4,'0');
  var pret = {
    id: 'mfi-pr-'+Date.now(), num, clientId: client.id, clientNom: client.nom,
    montant, duree, taux, mensualite,
    capitalRembourse: 0, interetsPayes: 0,
    dateDebut: new Date().toISOString().split('T')[0],
    statut: 'En attente', createdAt: new Date().toISOString()
  };
  DB.mfiPrets.push(pret);
  if(window.fbSave) window.fbSave('mfi_prets', null, pret).catch(function(){});
    idbSave('mfi_prets', DB.mfiPrets).catch(function(){});
  // Approuver immédiatement
  if(confirm('Approuver ce prêt de '+fmtNum(montant)+' F à '+client.nom+' ?')){
    pret.statut = 'Approuvé';
    if(window.fbSave) window.fbSave('mfi_prets', pret.id, pret).catch(function(){});
  }
  renderMfiPrets();
  toast('💰 Prêt '+num+' créé — Mensualité: '+fmtNum(mensualite)+' F');
}

function decaisserPret(id) {
  var p = DB.mfiPrets.find(function(x){return x.id===id;});
  if(!p||p.statut!=='Approuvé') return;
  if(!confirm('Décaisser '+fmtNum(p.montant)+' F à '+p.clientNom+' ?')) return;
  p.statut = 'En cours';
  p.dateDécaissement = new Date().toISOString().split('T')[0];
  if(window.fbSave) window.fbSave('mfi_prets', id, p).catch(function(){});
  // Opération caisse — sortie
  var op = {id:'mfi-ca-'+Date.now(), type:'Sortie', categorie:'Décaissement prêt',
    clientNom: p.clientNom, montant: p.montant, refPret: p.num,
    moyen:'Espèces', date: new Date().toISOString().split('T')[0],
    heure: new Date().toLocaleTimeString('fr-FR'), createdAt: new Date().toISOString()};
  DB.mfiCaisse.push(op);
  if(window.fbSave) window.fbSave('mfi_caisse', null, op).catch(function(){});
    idbSave('mfi_caisse', DB.mfiCaisse).catch(function(){});
  renderMfiPrets();
  toast('💸 Prêt '+p.num+' décaissé !');
}

function rembourserPret(id) {
  var p = DB.mfiPrets.find(function(x){return x.id===id;});
  if(!p) return;
  var montant = parseFloat(prompt('Montant remboursé (mensualité: '+fmtNum(p.mensualite)+' F) :')||p.mensualite);
  if(!montant||montant<=0) return;
  var interet = Math.round((p.montant - p.capitalRembourse) * p.taux/100);
  var capital = montant - interet;
  p.capitalRembourse  = (p.capitalRembourse||0) + Math.max(0,capital);
  p.interetsPayes     = (p.interetsPayes||0) + interet;
  if(p.capitalRembourse >= p.montant) p.statut = 'Soldé';
  if(window.fbSave) window.fbSave('mfi_prets', id, p).catch(function(){});
  // Remboursement Firestore
  var remb = {id:'mfi-rb-'+Date.now(), pretId: id, pretNum: p.num, clientNom: p.clientNom,
    montant, capital: Math.max(0,capital), interet,
    date: new Date().toISOString().split('T')[0], createdAt: new Date().toISOString()};
  DB.mfiRemboursements.push(remb);
  if(window.fbSave) window.fbSave('mfi_remboursements', null, remb).catch(function(){});
    idbSave('mfi_remboursements', DB.mfiRemboursements).catch(function(){});
  // Entrée caisse
  var op = {id:'mfi-ca-'+Date.now(), type:'Entrée', categorie:'Remboursement prêt',
    clientNom: p.clientNom, montant, refPret: p.num,
    moyen:'Espèces', date: new Date().toISOString().split('T')[0],
    heure: new Date().toLocaleTimeString('fr-FR'), createdAt: new Date().toISOString()};
  DB.mfiCaisse.push(op);
  if(window.fbSave) window.fbSave('mfi_caisse', null, op).catch(function(){});
    idbSave('mfi_caisse', DB.mfiCaisse).catch(function(){});
  renderMfiPrets();
  toast('✅ Remboursement '+fmtNum(montant)+' F enregistré'+(p.statut==='Soldé'?' — Prêt SOLDÉ 🎉':''));
}

function renderMfiRapports() {

  var retardsM  = DB.mfiPrets.filter(function(p){return p.statut==='En retard';}).reduce(function(a,p){return a+(p.montant||0);},0);

// Chargement Firestore MFI
async function loadMfiFromFirestore(basePath) {
  if(!window.FB) return;
  const { db, collection, getDocs } = window.FB;
  try {
    const cols = ['mfi_clients','mfi_prets','mfi_remboursements','mfi_epargne','mfi_caisse'];
    const keys = ['mfiClients','mfiPrets','mfiRemboursements','mfiEpargne','mfiCaisse'];
    for(var i=0;i<cols.length;i++){
      try{
        const snap = await getDocs(collection(db, basePath+'/'+cols[i]));
        DB[keys[i]] = snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
      }catch(e){ DB[keys[i]]=[]; }
    }
  } catch(e){ console.warn('MFI Firestore:', e); }
}

function jouerMatch(id) {
  var m = DB.footMatchs.find(function(x){return x.id===id;});
  if(!m) return;
  var sn = parseInt(prompt('Score de notre équipe :')||'0');
  var sa = parseInt(prompt('Score de l\'adversaire ('+m.adversaire+') :')||'0');
  m.scoreNous = sn; m.scoreAdv = sa;
  m.resultat  = sn>sa?'Victoire':sn<sa?'Défaite':'Nul';
  m.statut    = 'Joué';
  // Buteurs
  var butsList = [];
  for(var i=0;i<sn;i++){
    var nom = prompt('Buteur #'+(i+1)+' (nom) :');
    var min = prompt('Minute :');
    if(nom) butsList.push({nom, minute:min||'', joueurId:''});
  }
  m.buteurs = butsList;
  // Mettre à jour matchsJoues des joueurs
  DB.footJoueurs.forEach(function(j){
    butsList.forEach(function(b){
      if(j.nom.toLowerCase().includes(b.nom.toLowerCase())){
        j.matchsJoues = (j.matchsJoues||0)+1;
        if(window.fbSave) window.fbSave('foot_joueurs', j.id, j).catch(function(){});
      }
    });
  });
  if(window.fbSave) window.fbSave('foot_matchs', id, m).catch(function(){});
  renderFootMatchs();
  renderFootStats();
  toast('⚽ Résultat enregistré : '+(m.resultat)+' '+sn+'-'+sa);
}

// Chargement Firestore Football
async function loadFootFromFirestore(basePath) {
  if(!window.FB) return;
  const { db, collection, getDocs } = window.FB;
  try {
    var cols = ['foot_joueurs','foot_matchs','foot_entrainements','foot_competitions','foot_medical','foot_finances'];
    var keys = ['footJoueurs','footMatchs','footEntrainements','footCompetitions','footMedical','footFinances'];
    for(var i=0;i<cols.length;i++){
      try{
        const snap = await getDocs(collection(db, basePath+'/'+cols[i]));
        DB[keys[i]] = snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
      }catch(e){ DB[keys[i]]=[]; }
    }
  } catch(e){ console.warn('Football Firestore:', e); }
}

function initEgliseRH() {
  // Sélectionner le mois courant dans le select
  var now   = new Date();
  var moisEl = document.getElementById('egl-sal-mois');
  var anneeEl= document.getElementById('egl-sal-annee');
  var histEl = document.getElementById('egl-hist-mois');
  if(moisEl)  moisEl.value  = String(now.getMonth()+1).padStart(2,'0');
  if(anneeEl) anneeEl.value = String(now.getFullYear());
  if(histEl && !histEl.value) histEl.value = now.toISOString().slice(0,7);
  renderPersonnelEglise();
  renderSalairesEglise();

function showEglRHTab(tab, btn) {
  ['personnel','salaires','historique'].forEach(function(t) {
    var el = document.getElementById('egl-rh-tab-' + t);
    if(el) el.style.display = t === tab ? 'block' : 'none';
  });

    b.className = 'btn-sm btn-outline egl-rh-tab';
  });

}

function updateEglRHStats() {
  var actifs    = (DB.personnelEglise||[]).filter(function(p){ return p.statut === 'Actif'; });
  var masse     = actifs.reduce(function(a,p){ return a+(p.salaire||0); }, 0);
  var moisKey   = getMoisKey();
  var payes     = (DB.salairesEglise||[]).filter(function(s){ return s.moisKey === moisKey; });
  var paiesTot  = payes.reduce(function(a,s){ return a+(s.netPaye||0); }, 0);
  var attente   = actifs.length - new Set(payes.map(function(s){return s.personnelId;})).size;

  var e1 = document.getElementById('egl-rh-total');
  var e2 = document.getElementById('egl-rh-masse');
  var e3 = document.getElementById('egl-rh-payes');
  var e4 = document.getElementById('egl-rh-restants');
  if(e1) e1.textContent = actifs.length;
  if(e2) e2.textContent = fmtNum(masse) + ' F';
  if(e3) e3.textContent = payes.length;
  if(e4) { e4.textContent = Math.max(0,attente); e4.style.color = attente>0?'var(--danger)':'var(--success)'; }
}

function getMoisKey() {
  var moisEl  = document.getElementById('egl-sal-mois');
  var anneeEl = document.getElementById('egl-sal-annee');
  var m = moisEl  ? moisEl.value  : String(new Date().getMonth()+1).padStart(2,'0');
  var a = anneeEl ? anneeEl.value : String(new Date().getFullYear());
  return a + '-' + m;
}

function renderPersonnelEglise() {

    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text3);padding:24px">Aucun personnel enregistré</td></tr>';
    return;
  }
  tbody.innerHTML = list.map(function(p) {
    var sc = p.statut==='Actif'?'badge-success':p.statut==='Congé'?'badge-info':'badge-danger';
    return '<tr>' +
      '<td><code style="color:var(--accent)">' + (p.matricule||'—') + '</code></td>' +
      '<td style="font-weight:700">' + (p.nom||'—') + '</td>' +
      '<td><span style="background:rgba(108,99,255,.15);color:var(--accent);padding:3px 10px;border-radius:20px;font-size:11px">' + (p.fonction||'—') + '</span></td>' +
      '<td style="font-size:12px;color:var(--text2)">' + (p.ministere||'—') + '</td>' +
      '<td style="font-size:12px;color:var(--text2)">' + (p.dateEngagement||'—') + '</td>' +

      '</td></tr>';
  }).join('');

function renderSalairesEglise() {
  var tbody   = document.getElementById('egl-salaires-tbody');
  if(!tbody) return;
  var moisKey = getMoisKey();
  var actifs  = (DB.personnelEglise||[]).filter(function(p){ return p.statut === 'Actif'; });
  var paiements = (DB.salairesEglise||[]).filter(function(s){ return s.moisKey === moisKey; });
  var paidIds = new Set(paiements.map(function(s){ return s.personnelId; }));

  if(!actifs.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--text3);padding:24px">Aucun personnel actif</td></tr>';
    return;
  }

  var totalNet = 0;
  tbody.innerHTML = actifs.map(function(p) {
    var deduction = p.deduction || 0;
    var net       = (p.salaire||0) - deduction;
    totalNet += net;
    var isPaid = paidIds.has(p.id);
    var sc    = isPaid ? 'badge-success' : 'badge-danger';
    var label = isPaid ? '✅ Payé' : '⏳ En attente';
    var btn   = isPaid
      ? '<button class="btn-sm btn-outline" style="font-size:11px" disabled>✅ Payé</button>'
      : '<button class="btn-sm btn-add" style="font-size:11px" data-id="' + p.id + '" data-source="eglise" onclick="ouvrirModalPaiement(this.dataset.id,this.dataset.source)">💸 Payer</button>';
    return '<tr>' +
      '<td><code style="color:var(--accent)">' + (p.matricule||'—') + '</code></td>' +
      '<td style="font-weight:700">' + (p.nom||'—') + '</td>' +
      '<td style="font-size:12px">' + (p.fonction||'—') + '</td>' +
      '<td style="color:var(--success);font-weight:700">' + fmtNum(p.salaire||0) + ' F</td>' +
      '<td style="color:var(--danger)">' + fmtNum(deduction) + ' F</td>' +
      '<td style="color:var(--accent);font-weight:800">' + fmtNum(net) + ' F</td>' +
      '<td><span class="badge ' + sc + '">' + label + '</span></td>' +
      '<td>' + btn + '</td></tr>';
  }).join('');

  var e1 = document.getElementById('egl-sal-total-net');
  if(e1) e1.textContent = fmtNum(totalNet) + ' F';

  // Solde après paiement
  var today     = new Date().toISOString().split('T')[0];
  var thisMois  = today.slice(0,7);
  var collectesMois = (DB.collectes||[]).reduce(function(a,c){ return a+(c.date&&c.date.startsWith(thisMois)?c.montant:0); },0);
  var depMois = DB.depenses.reduce(function(a,d){ return a+(d.date&&d.date.startsWith(thisMois)?d.montant:0); },0);
  var soldeActuel = collectesMois - depMois;
  var soldeApres  = soldeActuel - totalNet;
  var e2 = document.getElementById('egl-sal-solde-apres');
  if(e2) { e2.textContent = fmtNum(soldeApres) + ' F'; e2.style.color = soldeApres>=0?'var(--success)':'var(--danger)'; }
}

async function payerSalaireEglise(personnelId) {
  var p = (DB.personnelEglise||[]).find(function(x){ return x.id === personnelId; });
  if(!p) return;
  var deduction = p.deduction || 0;
  var net       = (p.salaire||0) - deduction;
  var moisKey   = getMoisKey();
  var methodEl  = document.getElementById('egl-pers-paiement');
  var methode   = p.modePaiement || 'Espèces';

  var paiement = {
    personnelId  : personnelId,
    nom          : p.nom,
    fonction     : p.fonction,
    moisKey      : moisKey,
    salaireBrut  : p.salaire||0,
    deduction    : deduction,
    netPaye      : net,
    methode      : methode,
    payePar      : DB.currentUser ? DB.currentUser.name : 'Admin',
    datePaiement : new Date().toISOString().split('T')[0],
    heure        : new Date().toLocaleTimeString('fr-FR'),
    createdAt    : new Date().toISOString()
  };

  if(window.fbSave) {
    try {
      var fbId = await window.fbSave('salaires_eglise', null, paiement);
      if(fbId) paiement.id = fbId;
    } catch(e) { console.warn('Erreur Firestore:', e); }
  }

  if(!DB.salairesEglise) DB.salairesEglise = [];
  DB.salairesEglise.push(paiement);

  // Enregistrer aussi comme dépense pour impact sur solde
  var dep = {
    cat      : 'Salaires',
    montant  : net,
    desc     : 'Salaire ' + moisKey + ' — ' + p.nom + ' (' + p.fonction + ')',
    date     : new Date().toISOString().split('T')[0],
    user     : DB.currentUser ? DB.currentUser.name : 'Admin',
    role     : DB.currentUser ? DB.currentUser.role  : '',
    source   : 'salaire_eglise',
    createdAt: new Date().toISOString()
  };
  if(window.fbSave) {
    try { var dId = await window.fbSave('depenses', null, dep); if(dId) dep.id = dId; } catch(e) {}
  }
  DB.depenses.push(dep);

  renderSalairesEglise();
  renderHistoriqueSalairesEglise();
  updateEglRHStats();
  renderSoldeEglise();
  toast('💸 Salaire de ' + p.nom + ' payé — ' + fmtNum(net) + ' F');
}

async function payerTousSalairesEglise() {
  var moisKey = getMoisKey();
  var actifs  = (DB.personnelEglise||[]).filter(function(p){ return p.statut === 'Actif'; });
  var paidIds = new Set((DB.salairesEglise||[]).filter(function(s){ return s.moisKey===moisKey; }).map(function(s){return s.personnelId;}));
  var nonPaies = actifs.filter(function(p){ return !paidIds.has(p.id); });
  if(!nonPaies.length) { toast('Tous les salaires ont déjà été payés ce mois !'); return; }
  for(var i=0; i<nonPaies.length; i++) { await payerSalaireEglise(nonPaies[i].id); }
  toast('💸 Tous les salaires payés !');
}

function renderHistoriqueSalairesEglise() {
  var tbody = document.getElementById('egl-hist-tbody');
  if(!tbody) return;
  var filtEl  = document.getElementById('egl-hist-mois');
  var filtMois= filtEl ? filtEl.value : '';
  var list    = (DB.salairesEglise||[]).filter(function(s){

  var total = list.reduce(function(a,s){ return a+s.netPaye; }, 0);

async function savePersonnelEglise() {
  var nom       = document.getElementById('egl-pers-nom').value.trim();
  var fonction  = document.getElementById('egl-pers-fonction').value;
  var ministere = document.getElementById('egl-pers-ministere').value.trim();
  var date      = document.getElementById('egl-pers-date').value;
  var tel       = document.getElementById('egl-pers-tel').value.trim();
  var salaire   = parseFloat(document.getElementById('egl-pers-salaire').value)||0;
  var methode   = document.getElementById('egl-pers-paiement').value;
  var statut    = document.getElementById('egl-pers-statut').value;
  var notes     = document.getElementById('egl-pers-notes').value.trim();
  var existId   = document.getElementById('egl-pers-id').value;

  if(!nom) { toast('Nom obligatoire'); return; }

  var data = { nom, fonction, ministere, dateEngagement:date, tel, salaire, modePaiement:methode, statut, notes, updatedAt:new Date().toISOString() };

  if(!DB.personnelEglise) DB.personnelEglise = [];

  if(existId) {
    // Modification
    if(window.fbSave) { try { await window.fbSave('personnel_eglise', existId, data); } catch(e){} }
    var idx = DB.personnelEglise.findIndex(function(x){ return x.id===existId; });
    if(idx>=0) DB.personnelEglise[idx] = Object.assign({id:existId}, data);
  } else {
    // Nouveau — générer matricule
    var num     = (DB.personnelEglise.length+1).toString().padStart(3,'0');
    data.matricule = 'EGL-' + num;
    data.createdAt = new Date().toISOString();
    if(window.fbSave) { try { var fbId = await window.fbSave('personnel_eglise', null, data); if(fbId) data.id=fbId; } catch(e){} }
    if(!data.id) data.id = 'egl-p-'+Date.now();
    DB.personnelEglise.push(data);
  }

  closeModal('modal-personnel-egl');
  renderPersonnelEglise();
  renderSalairesEglise();
  updateEglRHStats();
  toast('Personnel enregistre !');
}

// ── Chargement complet caisse église (collectes + dépenses) ──
async function loadEgliseCaisseComplet() {
  if(!window.FB) {
    renderDepensesEglise();
    renderSoldeEglise();
    return;
  }
  const { db, collection, getDocs } = window.FB;
  const entId = DB.currentUser?.entreprise;
  try {
    // Charger collectes
    const snapC = await getDocs(collection(db,'entreprises/'+entId+'/collectes'));
    DB.collectes = snapC.docs.map(d => ({id:d.id,...d.data()})).sort((a,b) => (b.date||'').localeCompare(a.date||''));
    renderCollectes();
  } catch(e) {}
  try {
    // Charger dépenses
    const snapD = await getDocs(collection(db,'entreprises/'+entId+'/depenses'));
    DB.depenses = snapD.docs.map(d => ({id:d.id,...d.data()})).sort((a,b) => (b.date||'').localeCompare(a.date||''));
  } catch(e) {}
  // Maintenant calculer le solde avec données fraîches
  renderDepensesEglise();
  renderSoldeEglise();
}

async function saveDepenseEglise() {
  var catEl   = document.getElementById("dep-cat");
  var montEl  = document.getElementById("dep-montant-egl");
  var descEl  = document.getElementById("dep-desc-egl");
  var dateEl  = document.getElementById("dep-date-egl");
  var autreEl = document.getElementById("dep-autre-label-egl");

  var cat     = catEl ? catEl.value : "";
  if(cat === "Autre" && autreEl && autreEl.value.trim()) cat = autreEl.value.trim();
  var montant = parseFloat(montEl ? montEl.value : 0) || 0;
  var desc    = descEl ? descEl.value.trim() : "";
  var date    = dateEl ? dateEl.value : new Date().toISOString().split("T")[0];

  if(!cat)         { toast("Choisissez une categorie"); return; }
  if(montant <= 0) { toast("Montant invalide"); return; }
  if(!date)        { toast("Date obligatoire"); return; }

  var dep = {
    cat, montant, desc, date,
    user     : DB.currentUser ? DB.currentUser.name : "Inconnu",
    role     : DB.currentUser ? DB.currentUser.role  : "",
    source   : "eglise",
    createdAt: new Date().toISOString()
  };

  if(window.fbSave) {
    try { var fbId = await window.fbSave("depenses", null, dep); if(fbId) dep.id = fbId; }
    catch(e) { console.warn("Depense non sauvegardee:", e); }
  }
  DB.depenses.push(dep);

  if(montEl)  montEl.value  = "";
  if(descEl)  descEl.value  = "";
  if(autreEl) autreEl.value = "";

  renderDepensesEglise();
  renderSoldeEglise();
  toast("Depense eglise enregistree !");
}

function renderDepensesEglise() {
  var filtMois = document.getElementById("dep-filtre-mois-egl")?.value || new Date().toISOString().slice(0,7);
  var today    = new Date().toISOString().split("T")[0];
  var filtered = DB.depenses.filter(function(d) {
    return !filtMois || (d.date && d.date.startsWith(filtMois));
  }).sort(function(a,b) { return (b.date||"").localeCompare(a.date||""); });

  var total = filtered.reduce(function(s,d) { return s+d.montant; }, 0);

  var tbody = document.getElementById("dep-tbody-egl");
  if(!tbody) return;

  if(filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:30px">Aucune dépense enregistrée</td></tr>';
  } else {
    tbody.innerHTML = filtered.map(function(d) {
      var icon = DEP_ICONS[d.cat] || "📝";
      var dateStr = d.date ? new Date(d.date+"T00:00:00").toLocaleDateString("fr-FR") : "—";
      var canDel  = DB.currentUser && (DB.currentUser.role === "directeur" || DB.currentUser.uid === ADMIN_UID);
      var tr = '<tr>';
      tr += '<td style="font-size:12px;color:var(--text2)">' + dateStr + '</td>';
      tr += '<td><span style="background:rgba(255,71,87,.1);color:#ff6b7a;padding:3px 10px;border-radius:20px;font-size:12px">' + icon + ' ' + d.cat + '</span></td>';
      tr += '<td style="font-size:13px">' + (d.desc||'—') + '</td>';
      tr += '<td style="font-weight:800;color:var(--danger)">−' + fmtNum(d.montant) + ' F</td>';
      tr += '<td style="font-size:12px;color:var(--text2)">' + (d.user||'—') + '</td>';
      tr += '<td>' + (canDel && d.id ? '<button class="btn-sm btn-outline" style="font-size:11px;color:var(--danger);border-color:var(--danger)" data-id="' + d.id + '" onclick="deleteDepense(this.dataset.id)">&#x1F5D1;</button>' : '') + '</td>';
      tr += '</tr>';
      return tr;
    }).join("");
  }

  var totEl = document.getElementById("dep-total-egl");
  if(totEl) totEl.textContent = fmtNum(total) + " F";
  renderSoldeEglise();
}

function renderSoldeEglise() {
  var today    = new Date().toISOString().split("T")[0];
  var thisMois = today.slice(0,7);

  // Collectes ce mois
  var collectesMois = (DB.collectes||[]).reduce(function(a,c) {
    return a + (c.date && c.date.startsWith(thisMois) ? (c.montant||0) : 0);
  }, 0);

  // Dépenses ce mois
  var depMois = DB.depenses.reduce(function(a,d) {
    return a + (d.date && d.date.startsWith(thisMois) ? d.montant : 0);
  }, 0);

  // Dépenses aujourd'hui
  var depJour = DB.depenses.reduce(function(a,d) {
    return a + (d.date === today ? d.montant : 0);
  }, 0);

  var solde = collectesMois - depMois;

  var e1 = document.getElementById("egl-collectes-mois");
  var e2 = document.getElementById("egl-dep-mois");
  var e3 = document.getElementById("egl-solde-net");
  var e4 = document.getElementById("egl-dep-jour");
  var e5 = document.getElementById("dep-solde-egl");

  if(e1) e1.textContent = fmtNum(collectesMois) + " F";
  if(e2) e2.textContent = fmtNum(depMois) + " F";
  if(e3) {
    e3.textContent = fmtNum(solde) + " F";
    e3.style.color = solde >= 0 ? "var(--success)" : "var(--danger)";
  }
  if(e4) e4.textContent = fmtNum(depJour) + " F";
  if(e5) {
    e5.textContent = fmtNum(solde) + " F";
    e5.style.color = solde >= 0 ? "var(--success)" : "var(--danger)";
  }
}

async function deleteDepense(id) {
  if(!confirm("Supprimer cette dépense ?")) return;
  DB.depenses = DB.depenses.filter(function(d) { return d.id !== id; });
  // Supprimer dans Firestore
  if(window.FB) {
    try {
      var entId = window.currentEntrepriseId || "dpgestpro";
      var docRef = window.FB.doc(window.FB.db, "entreprises/" + entId + "/depenses/" + id);
      await window.FB.deleteDoc(docRef);
    } catch(e) {}
  }
  renderDepenses();
  toast("🗑 Dépense supprimée");
}

function renderDepenses() {
  var filtCat  = document.getElementById("dep-filtre-cat")?.value  || "";
  var filtMois = document.getElementById("dep-filtre-mois")?.value || "";
  var today    = new Date().toISOString().split("T")[0];
  var thisMois = today.slice(0,7);

  var all = DB.depenses.slice().sort(function(a,b) { return b.date.localeCompare(a.date); });

  // Stats globales
  var totalMois = 0, totalJour = 0;
  var catCount  = {};
  DB.depenses.forEach(function(d) {
    if(d.date && d.date.slice(0,7) === thisMois) totalMois += d.montant;
    if(d.date === today) totalJour += d.montant;
    catCount[d.cat] = (catCount[d.cat]||0) + d.montant;
  });
  var topCat = Object.entries(catCount).sort(function(a,b){ return b[1]-a[1]; })[0];

  var el1 = document.getElementById("dep-total-mois");
  var el2 = document.getElementById("dep-total-jour");
  var el3 = document.getElementById("dep-nb-total");
  var el4 = document.getElementById("dep-cat-top");
  if(el1) el1.textContent = fmtNum(totalMois) + " F";
  if(el2) el2.textContent = fmtNum(totalJour)  + " F";
  if(el3) el3.textContent = DB.depenses.length;
  if(el4) el4.textContent = topCat ? (DEP_ICONS[topCat[0]]||"📝") + " " + topCat[0].split(" /")[0] : "—";

  // Filtrer
  var filtered = all.filter(function(d) {
    var okCat  = !filtCat  || d.cat === filtCat;
    var okMois = !filtMois || (d.date && d.date.startsWith(filtMois));
    return okCat && okMois;
  });

  var totalAff = filtered.reduce(function(s,d){ return s + d.montant; }, 0);
  var taEl = document.getElementById("dep-total-affiche");
  if(taEl) taEl.textContent = fmtNum(totalAff) + " F";

  var tbody = document.getElementById("dep-tbody");
  if(!tbody) return;

  if(filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:30px">Aucune dépense enregistrée</td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(function(d) {
    var icon     = DEP_ICONS[d.cat] || "📝";
    var dateStr  = d.date ? new Date(d.date + "T00:00:00").toLocaleDateString("fr-FR") : "—";
    var roleColor= d.role==="directeur"?"#f5a623":d.role==="gestionnaire"?"#6c63ff":"#43e97b";

    return '<tr>' +
      '<td style="font-size:12px;color:var(--text2)">' + dateStr + '</td>' +
      '<td><span style="background:rgba(255,71,87,.1);color:#ff6b7a;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600">' + icon + ' ' + d.cat + '</span></td>' +
      '<td style="font-size:13px">' + (d.desc||'—') + '</td>' +
      '<td style="font-weight:800;color:var(--danger);font-size:14px">−' + fmtNum(d.montant) + ' F</td>' +
      '<td style="font-size:12px"><span style="color:' + roleColor + '">' + (d.user||"—") + '</span></td>' +
      '<td>' + (canDel && d.id ? '<button class="btn-sm btn-outline" style="font-size:11px;color:var(--danger);border-color:var(--danger)" data-id="' + d.id + '" onclick="deleteDepense(this.dataset.id)">🗑</button>' : '') + '</td>' +

//  SÉCURITÉ — CODE PIN PAR UTILISATEUR
// ═══════════════════════════════════════════════════════

var _pinBuffer = '';
var _pinMode = 'verify';   // 'verify' | 'set' | 'confirm'
var _pinNewTemp = '';
var _pinCallback = null;
var _pinAttempts = 0;
var MAX_PIN_ATTEMPTS = 5;

function showPinScreen(mode, callback) {
  _pinBuffer   = '';
  _pinMode     = mode || 'verify';
  _pinCallback = callback || null;
  _pinAttempts = 0;
  updatePinDots();
  const el = document.getElementById('pin-screen');
  const title = document.getElementById('pin-screen-title');
  const nameEl = document.getElementById('pin-user-name');
  const errEl  = document.getElementById('pin-error');
  if(errEl) errEl.style.display = 'none';
  if(nameEl) nameEl.textContent = DB.currentUser?.name || '';
  if(title) {
    if(mode === 'set')     title.textContent = '🔐 Créer votre code PIN';
    else if(mode === 'confirm') title.textContent = '🔐 Confirmer le code PIN';
    else                   title.textContent = '🔐 Code PIN requis';
  }
  if(el) el.style.display = 'flex';
}

function hidePinScreen() {
  _pinBuffer = '';
  const el = document.getElementById('pin-screen');
  if(el) el.style.display = 'none';
}

function pinPress(val) {
  const errEl = document.getElementById('pin-error');
  if(errEl) errEl.style.display = 'none';

  if(val === '←') {
    _pinBuffer = _pinBuffer.slice(0, -1);
  } else if(val === '✓') {
    _pinValider();
    return;
  } else {
    if(_pinBuffer.length >= 6) return;
    _pinBuffer += val;
  }
  updatePinDots();
  if(_pinBuffer.length === 6) {
    setTimeout(_pinValider, 200);
  }
}

function updatePinDots() {
  const dots = document.querySelectorAll('#pin-dots .pin-dot');
  dots.forEach((d, i) => {
    d.classList.toggle('filled', i < _pinBuffer.length);
  });
}

async function _pinValider() {
  if(_pinBuffer.length < 4) {
    showPinError('Minimum 4 chiffres'); return;
  }
  const uid = DB.currentUser?.id;

  if(_pinMode === 'set') {
    _pinNewTemp = _pinBuffer;
    _pinBuffer  = '';
    updatePinDots();
    _pinMode = 'confirm';
    const title = document.getElementById('pin-screen-title');
    if(title) title.textContent = '🔐 Confirmer le code PIN';
    return;
  }

  if(_pinMode === 'confirm') {
    if(_pinBuffer !== _pinNewTemp) {
      showPinError('Les codes ne correspondent pas');
      _pinBuffer = ''; _pinNewTemp = '';
      updatePinDots(); return;
    }
    // Sauvegarder le PIN hashé
    const hashed = await hashPin(_pinBuffer);
    await savePinToFirestore(uid, hashed);
    // Mettre à jour en mémoire
    const entId = DB.currentUser?.entreprise;
    if(ENTREPRISES[entId]?.users[uid]) {
      ENTREPRISES[entId].users[uid].pin = hashed;
    }
    hidePinScreen();
    toast('🔐 Code PIN enregistré ✅');
    if(_pinCallback) _pinCallback(true);
    return;
  }

  // Mode verify
  const storedPin = await getPinFromFirestore(uid);
  if(!storedPin) {
    // Pas de PIN configuré — laisser passer
    hidePinScreen();
    if(_pinCallback) _pinCallback(true);
    return;
  }
  const hashed = await hashPin(_pinBuffer);
  if(hashed === storedPin) {
    _pinAttempts = 0;
    hidePinScreen();
    if(_pinCallback) _pinCallback(true);
  } else {
    _pinAttempts++;
    _pinBuffer = ''; updatePinDots();
    if(_pinAttempts >= MAX_PIN_ATTEMPTS) {
      showPinError('Trop de tentatives — déconnexion');
      setTimeout(() => { hidePinScreen(); logout(); }, 2000);
    } else {
      showPinError('Code incorrect (' + _pinAttempts + '/' + MAX_PIN_ATTEMPTS + ' tentatives)');
    }
  }
}

function showPinError(msg) {
  const el = document.getElementById('pin-error');
  if(el) { el.style.display = 'block'; el.textContent = msg; }
  const screen = document.getElementById('pin-screen');
  if(screen) { screen.style.animation = 'shake .3s'; setTimeout(()=>{ screen.style.animation=''; }, 300); }
}

function pinAnnuler() { hidePinScreen(); logout(); }

async function hashPin(pin) {
  const buf  = new TextEncoder().encode(pin + '_dpgest_salt_2025');
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function savePinToFirestore(uid, hashedPin) {
  if(!window.FB) return;
  const { db, doc, setDoc } = window.FB;
  await setDoc(doc(db, 'user_pins', uid), { pin: hashedPin, updatedAt: new Date().toISOString() }, { merge: true }).catch(()=>{});
}

async function getPinFromFirestore(uid) {
  if(!window.FB) return null;
  const { db, doc, getDoc } = window.FB;
  try {
    const snap = await getDoc(doc(db, 'user_pins', uid));
    return snap.exists() ? snap.data().pin : null;
  } catch(e) { return null; }
}

  }
}

async function updateEgliseStats() {
  if(!window.FB) return;
  const { db, collection, getDocs } = window.FB;
  const entId = DB.currentUser?.entreprise;
  try {
    const mbSnap = await getDocs(collection(db, 'entreprises/' + entId + '/membres'));
    const nbMb = mbSnap.size;
    const el = document.getElementById('egl-stat-membres');
    if(el) el.textContent = nbMb;

    const colSnap = await getDocs(collection(db, 'entreprises/' + entId + '/collectes'));
    const mois = new Date().getMonth();
    const an   = new Date().getFullYear();
    let totalMois = 0;
    colSnap.forEach(d => {
      const c = d.data();
      const dt = new Date(c.date);
      if(dt.getMonth() === mois && dt.getFullYear() === an) totalMois += (c.montant||0);
    });
    const caEl = document.getElementById('egl-stat-ca');
    if(caEl) caEl.textContent = totalMois.toLocaleString('fr-FR') + ' F';
  } catch(e) {}
}

function renderCollectes() {
  const all   = DB.collectes || [];
  const mois  = new Date().getMonth();
  const an    = new Date().getFullYear();
  const cemois= all.filter(c => { const d=new Date(c.date); return d.getMonth()===mois && d.getFullYear()===an; });

  const types = ['dime','offrande','action_grace','don'];
  const labels = { dime:'💍 Dîme', offrande:'🎁 Offrande', action_grace:'🙌 Action de grâce', don:'💝 Don', quete:'🧺 Quête', projet:'🏗 Projet' };
  const ids    = { dime:'caisse-dime', offrande:'caisse-offrande', action_grace:'caisse-action', don:'caisse-don' };

  types.forEach(t => {
    const total = cemois.filter(c => c.type===t).reduce((s,c) => s+(c.montant||0), 0);
    const el = document.getElementById(ids[t]);
    if(el) el.textContent = total.toLocaleString('fr-FR') + ' F';
  });

  const totalMois = cemois.reduce((s,c) => s+(c.montant||0), 0);
  const totalGen  = all.reduce((s,c) => s+(c.montant||0), 0);
  const tmEl = document.getElementById('caisse-total-mois');
  const tgEl = document.getElementById('caisse-total-general');
  if(tmEl) tmEl.textContent = totalMois.toLocaleString('fr-FR') + ' F';
  if(tgEl) tgEl.textContent = totalGen.toLocaleString('fr-FR') + ' F';

  // Graphique répartition
  const chart = document.getElementById('caisse-chart');
  if(chart && totalMois > 0) {
    const colors = { dime:'#6c63ff', offrande:'#43e97b', action_grace:'#ffd43b', don:'#ff6b9d', quete:'#74c0fc', projet:'#ff922b' };
    const byType = {};
    cemois.forEach(c => { byType[c.type] = (byType[c.type]||0) + (c.montant||0); });
    chart.innerHTML = Object.entries(byType).map(([t,v]) => {
      const pct = Math.round(v/totalMois*100);
      return `<div style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">
          <span>${labels[t]||t}</span><span style="font-weight:700">${v.toLocaleString('fr-FR')} F (${pct}%)</span>
        </div>
        <div style="height:8px;background:var(--surface2);border-radius:4px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${colors[t]||'var(--accent)'};border-radius:4px"></div>
        </div>
      </div>`;
    }).join('');
  }

  // Tableau historique
  const tbody = document.getElementById('collectes-tbody');
  if(!tbody) return;
  tbody.innerHTML = all.length ? all.slice(0,50).map(c => `<tr>
    <td style="font-size:12px">${c.date||'-'}</td>
    <td><span class="badge badge-info" style="font-size:11px">${labels[c.type]||c.type}</span></td>
    <td style="font-size:12px">${c.occasion||'-'}</td>
    <td style="font-size:12px">${c.donateur||'Anonyme'}</td>
    <td style="font-weight:700;color:var(--success)">${(c.montant||0).toLocaleString('fr-FR')} F</td>
    <td><button class="btn-sm btn-danger" onclick="deleteCollecte('${c.id}')">🗑</button></td>
  </tr>`).join('') : '<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:16px">Aucune collecte</td></tr>';
}

function renderRapportsEglise() {
  const all   = DB.collectes || [];
  const mois  = new Date().getMonth();
  const an    = new Date().getFullYear();
  const labels = { dime:'💍 Dîme', offrande:'🎁 Offrande', action_grace:'🙌 Action de grâce', don:'💝 Don', quete:'🧺 Quête', projet:'🏗 Projet' };

  // Rapport mensuel
  const cemois = all.filter(c => { const d=new Date(c.date); return d.getMonth()===mois && d.getFullYear()===an; });
  const totalM = cemois.reduce((s,c) => s+(c.montant||0), 0);
  const byType = {};
  cemois.forEach(c => { byType[c.type] = (byType[c.type]||0) + (c.montant||0); });
  const rMoisEl = document.getElementById('rapport-eglise-mois');
  if(rMoisEl) {

      `<div style="font-size:12px;color:var(--text3)">${cemois.length} collectes enregistrées | ${(DB.cultes||[]).filter(c=>{const d=new Date(c.date);return d.getMonth()===mois&&d.getFullYear()===an;}).length} cultes</div>`;
  }

  // Rapport annuel
  const celan  = all.filter(c => new Date(c.date).getFullYear() === an);
  const totalA = celan.reduce((s,c) => s+(c.montant||0), 0);
  const byTypeA = {};
  celan.forEach(c => { byTypeA[c.type] = (byTypeA[c.type]||0) + (c.montant||0); });
  const rAnnuelEl = document.getElementById('rapport-eglise-annuel');
  if(rAnnuelEl) {
    rAnnuelEl.innerHTML = `<div style="margin-bottom:12px;color:var(--text2);font-size:13px">Année ${an}</div>` +
      Object.entries(byTypeA).map(([t,v]) => `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><span style="font-size:13px">${labels[t]||t}</span><span style="font-weight:700;color:var(--success)">${v.toLocaleString('fr-FR')} F</span></div>`).join('') +
      `<div style="display:flex;justify-content:space-between;padding:12px 0;font-weight:800;font-size:15px"><span>TOTAL</span><span style="color:var(--accent)">${totalA.toLocaleString('fr-FR')} F</span></div>`;
  }

  // Graphique annuel par mois
  const chartEl = document.getElementById('eglise-chart-annuel');
  if(chartEl) {
    const moisNoms = ['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
    const parMois  = Array(12).fill(0);
    celan.forEach(c => { const m=new Date(c.date).getMonth(); parMois[m]+=(c.montant||0); });
    const maxVal = Math.max(...parMois, 1);
    chartEl.innerHTML = parMois.map((v,i) => {
      const h = Math.round(v/maxVal*120);
      const actif = i === mois;
      return `<div style="display:flex;flex-direction:column;align-items:center;flex:1;gap:4px">
        <div style="font-size:10px;color:var(--text3)">${v>0?Math.round(v/1000)+'k':''}</div>
        <div style="width:100%;height:${h}px;background:${actif?'var(--accent)':'var(--surface2)'};border-radius:4px 4px 0 0;min-height:4px"></div>
        <div style="font-size:10px;color:${actif?'var(--accent)':'var(--text3)'};font-weight:${actif?'700':'400'}">${moisNoms[i]}</div>
      </div>`;
    }).join('');
  }
}

async function loadLogs() {

  if(!tbody) return;
  tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:16px">⏳ Chargement...</td></tr>';

  const { db, collection, getDocs, query, orderBy, limit } = window.FB;
  const entId = DB.currentUser?.entreprise || 'dpgestpro';
  try {
    const snap = await getDocs(collection(db, 'entreprises/' + entId + '/logs'));
    const logs = snap.docs.map(d => d.data()).sort((a,b) => (b.timestamp?.seconds||0) - (a.timestamp?.seconds||0)).slice(0,50);
    if(!logs.length) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:16px">Aucun log disponible</td></tr>';

    tbody.innerHTML = logs.map(l => `<tr>
      <td style="font-size:12px">${l.date||'-'}</td>
      <td style="font-size:12px">${l.heure||'-'}</td>
      <td style="font-weight:600">${l.nom||'-'}</td>

  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--danger)">Erreur: ' + e.message + '</td></tr>';
  }
}

function applyFirebaseConfig() {
  const raw = document.getElementById('fb-config-input').value.trim();
  if(!raw) { toast('Collez votre firebaseConfig d abord'); return; }

  // Extraire les valeurs du bloc de config
  const extract = (key) => {
    const m = new RegExp(key + '[^:]*:\\s*[\x22\x27]([^\x22\x27]+)').exec(raw);
    return m ? m[1] : '';
  };
  const cfg = {
    apiKey           : extract('apiKey'),
    authDomain       : extract('authDomain'),
    projectId        : extract('projectId'),
    storageBucket    : extract('storageBucket'),
    messagingSenderId: extract('messagingSenderId'),
    appId            : extract('appId')
  };
  if(!cfg.apiKey || !cfg.projectId) {
    toast('Config invalide — vérifiez votre firebaseConfig');
    return;
  }
  // Sauvegarder dans localStorage pour persistance
  localStorage.setItem('dpgestpro_firebase_config', JSON.stringify(cfg));
  toast('Configuration sauvegardée — rechargez la page pour appliquer');
  setTimeout(() => {
    if(confirm('Recharger la page maintenant pour activer Firebase ?')) {
      location.reload();
    }
  }, 1000);
}

function initJournee() {
  const today = new Date().toISOString().split('T')[0];
  const now   = new Date();

  // Chercher journée du jour
  let j = DB.journees.find(j => j.date === today);
  if(!j) {
    // Créer journée ouverte automatiquement
    j = { id: today, date: today, heureOuverture: now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}), heureFermeture: null, statut: 'ouverte' };
    DB.journees.push(j);
    DB.journeeActive = j;
    if(window.fbSave) window.fbSave('journees', today, j).catch(()=>{});
  }
  DB.journeeActive = j;
  renderJournee();
}

function renderJournee() {
  const today = new Date().toISOString().split('T')[0];
  const j = DB.journeeActive || DB.journees.find(jj => jj.date === today);
  const role = DB.currentUser?.role;
  const isOuverte = j?.statut === 'ouverte';

  // Statut visuel
  const iconEl   = document.getElementById('journee-icon');
  const statusEl = document.getElementById('journee-status-text');
  const dateEl   = document.getElementById('journee-date-text');
  const btnEl    = document.getElementById('journee-toggle-btn');
  const btnCont  = document.getElementById('journee-btn-container');
  const caissMsg = document.getElementById('journee-caissier-msg');

  if(iconEl)   iconEl.textContent   = isOuverte ? '🔓' : '🔒';
  if(statusEl) { statusEl.textContent = isOuverte ? 'Journée Ouverte' : 'Journée Fermée'; statusEl.style.color = isOuverte ? 'var(--success)' : 'var(--danger)'; }
  if(dateEl)   dateEl.textContent   = new Date().toLocaleDateString('fr-FR', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

  // Stats du jour
  const ventesJour = DB.sales.filter(s => s.date === today);
  const caJour     = ventesJour.reduce((a,s) => a + (s.amount||0), 0);
  const nbJour     = document.getElementById('j-ventes-nb');
  const caEl       = document.getElementById('j-ca-jour');
  const heureEl    = document.getElementById('j-heure-ouv');
  if(nbJour) nbJour.textContent = ventesJour.length;
  if(caEl)   caEl.textContent   = fmtNum(caJour) + ' F';
  if(heureEl) heureEl.textContent = j?.heureOuverture || '--:--';

  // Bouton selon rôle
  if(role === 'directeur') {
    if(btnCont) btnCont.style.display = 'block';
    if(caissMsg) caissMsg.style.display = 'none';
    if(btnEl) {
      btnEl.textContent = isOuverte ? '🔒 Clôturer la journée' : '🔓 Ouvrir la journée';
      btnEl.style.background = isOuverte ? 'var(--danger)' : 'var(--success)';
    }
  } else {
    if(btnCont) btnCont.style.display = 'none';
    if(caissMsg) caissMsg.style.display = isOuverte ? 'none' : 'block';
  }

  // Mise à jour label sidebar
  const navLabel = document.getElementById('nav-journee-label');
  if(navLabel) navLabel.textContent = isOuverte ? '🔓 Journée ouverte' : '🔒 Journée fermée';

  // Rapports journalier et hebdomadaire
  renderRapportJour();
  renderRapportSemaine();
  renderHistoriqueJournees();
}

async function toggleJournee() {
  if(DB.currentUser?.role !== 'directeur' && !isGlobalAdmin()) {
    toast('Seul le Directeur peut ouvrir/fermer la journée'); return;
  }
  const today = new Date().toISOString().split('T')[0];
  const now   = new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  let j = DB.journees.find(jj => jj.date === today);
  if(!j) {
    j = { id:today, date:today, heureOuverture:now, heureFermeture:null, statut:'ouverte' };
    DB.journees.push(j);
  }

  if(j.statut === 'ouverte') {
    // Demander confirmation + générer rapport
    if(!confirm('Clôturer la journée du '+today+' ?\nUn rapport sera généré automatiquement.')) return;
    j.statut = 'fermee'; j.heureFermeture = now;
    // Sauvegarder en Firestore
    if(window.FB) {
      var { db, doc, setDoc } = window.FB;
      var entId = DB.currentUser?.entreprise;
      setDoc(doc(db,'entreprises',entId,'journees',today), j, {merge:true});
    }
    toast('🔒 Journée clôturée à ' + now);
    initJournee();
    // Proposer le rapport PDF
    setTimeout(function() {
      if(confirm('Voulez-vous imprimer le rapport de journée ?')) {
        exportRapportJournee(today);
      }
    }, 500);
  } else {
    if(!confirm('Réouvrir la journée du '+today+' ?')) return;
    j.statut = 'ouverte'; j.heureOuverture = now; j.heureFermeture = null;
    if(window.FB) {
      var { db, doc, setDoc } = window.FB;
      var entId = DB.currentUser?.entreprise;
      setDoc(doc(db,'entreprises',entId,'journees',today), j, {merge:true});
    }

function updateHopStats() {
  var today = new Date().toISOString().split('T')[0];
  var thisMois = today.slice(0,7);
  var pts = DB.patients||[];
  var e1=document.getElementById('hop-total-patients');
  var e2=document.getElementById('hop-patients-actifs');
  var e3=document.getElementById('hop-patients-hospit');
  var e4=document.getElementById('hop-patients-jour');
  if(e1) e1.textContent = pts.length;
  if(e2) e2.textContent = pts.filter(function(p){return p.statut==='Actif';}).length;
  if(e3) e3.textContent = pts.filter(function(p){return p.statut==='Hospitalisé';}).length;
  if(e4) e4.textContent = pts.filter(function(p){return p.dateArrivee===today||p.createdAt&&p.createdAt.startsWith(today);}).length;
}

    var age = p.dateNaissance ? calcAge(p.dateNaissance) : '—';
    var sc  = p.statut==='Hospitalisé'?'badge-danger':p.statut==='Actif'?'badge-success':p.statut==='Référé'?'badge-info':'badge-neutral';
    return '<tr>' +

function filterPatients() {
  var q  = (document.getElementById('hop-search-patient')?.value||'').toLowerCase();
  var st = document.getElementById('hop-filtre-statut')?.value||'';
  var res= (DB.patients||[]).filter(function(p){
    var inq = !q||(p.nom||'').toLowerCase().includes(q)||(p.dossier||'').toLowerCase().includes(q)||(p.tel||'').includes(q);
    var ist = !st||p.statut===st;
    return inq && ist;
  });
  renderPatients(res);
}

function calcAge(dateNaissance) {
  var diff = Date.now() - new Date(dateNaissance).getTime();
  return Math.floor(diff / (365.25*24*3600*1000));
}

function openNewPatient() {
  var fields = ['pat-id','pat-nom','pat-ddn','pat-tel','pat-tel-urgence','pat-adresse',
    'pat-profession','pat-antecedents','pat-antecedents-fam','pat-allergies','pat-vaccins','pat-traitement-hab'];

  document.getElementById('pat-date-arrivee').value = new Date().toISOString().split('T')[0];

function editPatient(id) {

  document.getElementById('pat-id').value           = p.id;
  document.getElementById('pat-nom').value          = p.nom||'';
  document.getElementById('pat-ddn').value          = p.dateNaissance||'';
  document.getElementById('pat-sexe').value         = p.sexe||'M';

  document.getElementById('pat-tel').value          = p.tel||'';

async function savePatient() {
  var nom = document.getElementById('pat-nom').value.trim();
  if(!nom){ toast('Nom du patient obligatoire'); return; }
  var existId = document.getElementById('pat-id').value;
  var data = {
    nom, dateNaissance:document.getElementById('pat-ddn').value,
    sexe:document.getElementById('pat-sexe').value,
    groupeSanguin:document.getElementById('pat-sang').value,
    tel:document.getElementById('pat-tel').value.trim(),
    telUrgence:document.getElementById('pat-tel-urgence').value.trim(),
    adresse:document.getElementById('pat-adresse').value.trim(),
    profession:document.getElementById('pat-profession').value.trim(),
    antecedents:document.getElementById('pat-antecedents').value.trim(),
    antecedentsFam:document.getElementById('pat-antecedents-fam').value.trim(),
    allergies:document.getElementById('pat-allergies').value.trim(),
    vaccins:document.getElementById('pat-vaccins').value.trim(),
    traitementHab:document.getElementById('pat-traitement-hab').value.trim(),
    statut:document.getElementById('pat-statut').value,
    dateArrivee:document.getElementById('pat-date-arrivee').value,
    updatedAt:new Date().toISOString()
  };
  if(!DB.patients) DB.patients=[];
  if(existId) {
    if(window.fbSave) await window.fbSave('patients',existId,data).catch(function(){});
    var i=DB.patients.findIndex(function(x){return x.id===existId;});
    if(i>=0) DB.patients[i]=Object.assign({id:existId},DB.patients[i],data);
  } else {
    data.dossier = 'PAT-'+(DB.patients.length+1).toString().padStart(4,'0');
    data.createdAt = new Date().toISOString();
    if(window.fbSave){ var fid=await window.fbSave('patients',null,data).catch(function(){return null;}); if(fid) data.id=fid; }
    if(!data.id) data.id='pat-'+Date.now();
    DB.patients.push(data);
  }
  closeModal('modal-patient');
  renderPatients();
  refreshPatientSelects();
  toast('🧑‍⚕️ Dossier patient enregistré !');
}

async function deletePatient(id) {
  if(!confirm('Supprimer ce dossier patient ?')) return;
  if(window.FB){ try{ var {db,doc,deleteDoc}=window.FB; await deleteDoc(doc(db,'entreprises/'+DB.currentUser.entreprise+'/patients',id)); }catch(e){} }
  DB.patients=(DB.patients||[]).filter(function(p){return p.id!==id;});
  renderPatients();
  toast('Dossier supprimé');
}

  for(var i=1;i<=HOP_NB_LITS;i++){
    var lit='L'+String(i).padStart(2,'0');

  if(e3)e3.textContent=(DB.hospitalisations||[]).filter(function(h){return h.dateEntree===today;}).length;

function renderMedicaments(list) {
  var tbody=document.getElementById('hop-med-tbody'); if(!tbody) return;
  var meds=list||DB.medicaments||[];
  var today=new Date().toISOString().split('T')[0];
  var d30=new Date(); d30.setDate(d30.getDate()+30); var d30s=d30.toISOString().split('T')[0];
  // Stats
  var rupture=meds.filter(function(m){return (m.qte||0)<=(m.seuil||10);});
  var expProche=meds.filter(function(m){return m.expiration&&m.expiration<=d30s&&m.expiration>=today;});
  var valeur=meds.reduce(function(a,m){return a+(m.qte||0)*(m.prix||0);},0);
  var e1=document.getElementById('hop-med-total');var e2=document.getElementById('hop-med-rupture');
  var e3=document.getElementById('hop-med-valeur');var e4=document.getElementById('hop-med-expiration');
  if(e1)e1.textContent=meds.length; if(e2)e2.textContent=rupture.length;
  if(e3)e3.textContent=fmtNum(valeur)+' F'; if(e4)e4.textContent=expProche.length;
  if(!meds.length){tbody.innerHTML='<tr><td colspan="9" style="text-align:center;color:var(--text3);padding:20px">Aucun médicament en stock</td></tr>';return;}
  tbody.innerHTML=meds.map(function(m){
    var low=(m.qte||0)<=(m.seuil||10);
    var exp=m.expiration&&m.expiration<=d30s;
    var sc=low?'badge-danger':exp?'badge-warning':'badge-success';
    var sl=low?'Rupture/Faible':exp?'Expire bientôt':'OK';
    return '<tr>'+
      '<td style="font-weight:700">'+(m.nom||'—')+'</td>'+
      '<td><span style="font-size:11px;background:rgba(0,180,216,.1);color:#00b4d8;padding:2px 8px;border-radius:10px">'+(m.categorie||'—')+'</span></td>'+
      '<td style="font-size:12px">'+(m.forme||'—')+'</td>'+
      '<td style="font-weight:700;color:'+(low?'var(--danger)':'var(--success)')+'">'+m.qte+'</td>'+
      '<td style="font-size:12px;color:var(--text2)">'+m.seuil+'</td>'+
      '<td>'+fmtNum(m.prix||0)+' F</td>'+
      '<td style="font-size:12px;color:'+(exp?'var(--danger)':'var(--text2)')+'">'+( m.expiration||'—')+'</td>'+
      '<td><span class="badge '+sc+'">'+sl+'</span></td>'+
      '<td style="display:flex;gap:5px">'+
        '<button class="btn-sm btn-outline" style="color:var(--success);border-color:var(--success);font-size:11px" data-id="'+m.id+'" onclick="reapprovMed(this.dataset.id)">+</button>'+
        '<button class="btn-sm btn-outline" style="color:var(--accent);border-color:var(--accent);font-size:11px" data-id="'+m.id+'" onclick="editMed(this.dataset.id)">✏</button>'+
        '<button class="btn-sm btn-danger" style="font-size:11px" data-id="'+m.id+'" onclick="deleteMed(this.dataset.id)">🗑</button>'+
      '</td></tr>';
  }).join('');
  renderMedAlertes();
}

function renderMedAlertes() {

var HOP_TARIFS = {
  'Consultation générale':2000,'Consultation spécialiste':5000,'Pansement':1500,
  'Injection':1000,'Perfusion':3000,'Prise de sang':2500,'ECG':5000,
  'Échographie':15000,'Radio thorax':8000,'Analyse urine':2000,'Paludisme TDR':1500,
  'Accouchement normal':25000,'Accouchement césarienne':150000,'Hospitalisation/jour':5000,
  'Consultation pédiatrie':2500,'Vaccination':1000
};

function initFactureForm() {
  var fDate=document.getElementById('fact-date'); if(fDate) fDate.value=new Date().toISOString().split('T')[0];
  _factActes=[];
  renderFactActesList(); calcFactureTotal();
}

function addActeFacture() {
  var sel='<select class="fact-acte-sel" onchange="updateActePrix(this)" style="padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;flex:1">';
  sel+='<option value="">-- Acte --</option>';

function renderFactActesList(){
  var el=document.getElementById('fact-actes-list'); if(!el) return;
  if(!_factActes.length){el.innerHTML='<div style="color:var(--text3);font-size:12px;text-align:center;padding:10px">Cliquez sur "Ajouter un acte"</div>';return;}
  el.innerHTML=_factActes.map(function(a,i){
    var opts=Object.keys(HOP_TARIFS).map(function(k){return '<option value="'+k+'"'+(a.libelle===k?' selected':'')+'>'+k+'</option>';}).join('');
    return '<div style="display:flex;gap:6px;align-items:center;margin-bottom:6px">'+
      '<select data-i="'+i+'" onchange="updateActeSel(this)" style="flex:2;padding:7px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px">'+
        '<option value="">-- Acte --</option>'+opts+'<option value="__custom"'+(HOP_TARIFS[a.libelle]===undefined&&a.libelle?' selected':'')+'>Autre...</option>'+
      '</select>'+
      '<input type="text" placeholder="Libellé" value="'+(HOP_TARIFS[a.libelle]===undefined?a.libelle:'')+'" data-i="'+i+'" '+(HOP_TARIFS[a.libelle]!==undefined&&a.libelle?'style="display:none"':'')+' oninput="updateActeLibelle(this)" style="flex:2;padding:7px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px">'+
      '<input type="number" value="'+a.prix+'" data-i="'+i+'" oninput="updateActePrixVal(this)" style="width:80px;padding:7px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px" placeholder="Prix">'+
      '<input type="number" value="'+a.qte+'" data-i="'+i+'" oninput="updateActeQte(this)" style="width:50px;padding:7px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px" placeholder="Qté">'+
      '<button class="btn-sm btn-danger" style="font-size:11px" data-i="'+i+'" onclick="removeActe(this.dataset.i)">✕</button>'+

function updateActeSel(sel){var i=parseInt(sel.dataset.i);var v=sel.value;if(v&&v!=='__custom'){_factActes[i].libelle=v;_factActes[i].prix=HOP_TARIFS[v]||0;}else if(v==='__custom'){_factActes[i].libelle='';}_factActes[i].qte=_factActes[i].qte||1;renderFactActesList();calcFactureTotal();}
function updateActeLibelle(inp){_factActes[parseInt(inp.dataset.i)].libelle=inp.value;calcFactureTotal();}
function updateActePrixVal(inp){_factActes[parseInt(inp.dataset.i)].prix=parseFloat(inp.value)||0;calcFactureTotal();}
function updateActeQte(inp){_factActes[parseInt(inp.dataset.i)].qte=parseInt(inp.value)||1;calcFactureTotal();}
function removeActe(i){_factActes.splice(parseInt(i),1);renderFactActesList();calcFactureTotal();}
function calcFactureTotal(){
  var sub=_factActes.reduce(function(a,ac){return a+(ac.prix||0)*(ac.qte||1);},0);
  var rem=parseFloat(document.getElementById('fact-remise')?.value)||0;
  var total=Math.max(0,sub-rem);
  var e1=document.getElementById('fact-subtotal');var e2=document.getElementById('fact-total');
  if(e1)e1.textContent=fmtNum(sub)+' F';if(e2)e2.textContent=fmtNum(total)+' F';
}

async function saveFacturePatient(){
  var patId=document.getElementById('fact-patient').value;if(!patId){toast('Sélectionnez un patient');return;}
  if(!_factActes.length||!_factActes.some(function(a){return a.libelle;})){toast('Ajoutez au moins un acte');return;}
  var sub=_factActes.reduce(function(a,ac){return a+(ac.prix||0)*(ac.qte||1);},0);
  var rem=parseFloat(document.getElementById('fact-remise').value)||0;
  var total=Math.max(0,sub-rem);
  var methode=document.getElementById('fact-methode').value;
  var date=document.getElementById('fact-date').value;
  var pt=(DB.patients||[]).find(function(p){return p.id===patId;});
  var data={
    patientId:patId, patientNom:pt?pt.nom:'—',
    date, actes:_factActes.slice(), sousTotal:sub, remise:rem, total, methode,
    numFacture:'FACT-'+String(getNextCounter('acte')).padStart(4,'0'),
    statut:methode==='Impayé'?'Impayé':'Payé',
    payePar:DB.currentUser?DB.currentUser.name:'', createdAt:new Date().toISOString()
  };
  if(!DB.actes)DB.actes=[];
  if(window.fbSave){var fid=await window.fbSave('actes',null,data).catch(function(){return null;});if(fid)data.id=fid;}
  if(!data.id)data.id='fact-'+Date.now();
  DB.actes.push(data);
  if(methode!=='Impayé'){
    var dep={cat:'Recette patient',montant:total,desc:data.numFacture+' — '+pt?.nom,date,user:DB.currentUser?DB.currentUser.name:'',source:'hopital_fact',createdAt:new Date().toISOString()};
    if(window.fbSave)window.fbSave('depenses',null,dep).catch(function(){});
    DB.depenses.push(dep);
  }
  imprimerFacture(data);
  _factActes=[];renderFactActesList();calcFactureTotal();
  document.getElementById('fact-patient').value='';

  renderFacturesHopital();renderFactChart();
