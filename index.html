<head>
<meta charset="UTF-8">

<title>DpGestPro — Système de Gestion Multi-Entreprises</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080f;--surf:#0f1118;--surf2:#161922;
  --acc:#6c63ff;--acc2:#8b83ff;
  --green:#10b981;--red:#ef4444;
  --bdr:rgba(108,99,255,.2);--bdr2:rgba(108,99,255,.08);
  --txt:#eeeef8;--txt2:#9090b8;--txt3:#505078;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif}

/* LOADER */
#loader{position:fixed;inset:0;z-index:9999;
  background:radial-gradient(ellipse at 30% 40%,#0e0a2e,#05060f);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .4s ease}
#loader.hide{opacity:0;pointer-events:none}
.l-logo{font-family:'Syne',sans-serif;font-size:40px;font-weight:800;margin-bottom:6px}
.l-logo span{color:var(--acc)}
.l-sub{font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:3px;margin-bottom:36px}
.l-bar{width:180px;height:3px;background:rgba(108,99,255,.12);border-radius:2px;overflow:hidden}
.l-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:2px;
  animation:lf 1.8s ease-in-out infinite}
@keyframes lf{0%{width:0;margin-left:0}50%{width:100%}100%{width:0;margin-left:100%}}
.l-status{font-size:12px;color:var(--txt3);margin-top:14px;text-align:center}

/* LOGIN */
#login-screen{position:fixed;inset:0;z-index:9500;display:none;
  align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(ellipse at 30% 40%,#0e0a2e,#05060f)}
#login-screen.show{display:flex}
.lw{width:420px;max-width:100%}
.ll-icon{width:64px;height:64px;border-radius:18px;margin:0 auto 14px;
  background:linear-gradient(135deg,var(--acc),#8b5cf6);
  display:flex;align-items:center;justify-content:center;font-size:28px;
  box-shadow:0 0 40px rgba(108,99,255,.3)}
.ll-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;text-align:center;
  background:linear-gradient(135deg,#fff,var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ll-sub{font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:2px;text-align:center;margin:4px 0 28px}
.lcard{background:var(--surf);border:1px solid var(--bdr);border-radius:20px;padding:28px;
  box-shadow:0 0 60px rgba(108,99,255,.1)}
.lbl{font-size:10px;font-weight:700;color:var(--txt2);text-transform:uppercase;
  letter-spacing:.8px;display:block;margin-bottom:5px}
.linp{width:100%;background:var(--surf2);border:1.5px solid var(--bdr);border-radius:9px;
  padding:11px 14px;color:var(--txt);font-size:14px;font-family:'DM Sans',sans-serif;
  transition:border-color .2s;outline:none;margin-bottom:12px}
.linp:focus{border-color:var(--acc)}
.linp::placeholder{color:var(--txt3)}
.lsel{width:100%;background:var(--surf2);border:1.5px solid var(--bdr);border-radius:9px;
  padding:11px 14px;color:var(--txt);font-size:14px;font-family:'DM Sans',sans-serif;
  outline:none;margin-bottom:12px;cursor:pointer}
.lsel option{background:var(--surf2)}
.lbtn-main{width:100%;padding:13px;background:linear-gradient(135deg,var(--acc),#8b5cf6);
  border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;
  font-family:'Syne',sans-serif;cursor:pointer;transition:all .2s;margin-bottom:12px;
  display:flex;align-items:center;justify-content:center;gap:8px}
.lbtn-main:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,99,255,.35)}
.lbtn-main:disabled{opacity:.5;cursor:not-allowed;transform:none}
.ldiv{display:flex;align-items:center;gap:10px;margin:4px 0 12px;color:var(--txt3);font-size:11px}
.ldiv::before,.ldiv::after{content:'';flex:1;height:1px;background:var(--bdr)}
.lbtn-g{width:100%;padding:12px;background:#fff;border:1.5px solid #ddd;border-radius:10px;
  color:#333;font-size:13px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s}
.lbtn-g:hover{background:#f7f7f7;box-shadow:0 3px 12px rgba(0,0,0,.1)}
.lbtn-g:disabled{opacity:.5;cursor:not-allowed}
.lerr{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);
  border-radius:8px;padding:10px 14px;color:#f87171;font-size:12px;
  margin-top:12px;display:none;line-height:1.5}
.lerr.show{display:block}
.lfooter{text-align:center;font-size:10px;color:var(--txt3);margin-top:16px;line-height:1.7}
.lfooter a{color:var(--acc2);text-decoration:none}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;padding:12px 18px;border-radius:11px;
  background:var(--surf);border:1px solid var(--bdr);color:var(--txt);font-size:13px;
  font-weight:500;z-index:99999;transform:translateY(80px);opacity:0;
  transition:all .3s;box-shadow:0 4px 20px rgba(0,0,0,.4);max-width:320px;
  font-family:'DM Sans',sans-serif;pointer-events:none}
</style>

<!-- Script inline: définitions d'abord, AVANT les CDN Firebase -->
<script>
// Config Firebase
var FB_CONFIG = {
  apiKey:            "AIzaSyDCqoYZLBK0ipbotTejMCAvYGxrkomGIGk",
  authDomain:        "dpgestpro.firebaseapp.com",
  projectId:         "dpgestpro",
  storageBucket:     "dpgestpro.firebasestorage.app",
  messagingSenderId: "795000345158",
  appId:             "1:795000345158:web:b33a6f77ce9e98bff87047"
};
// ADMIN_UID et ADMIN_EMAIL définis dans app.js

// État global
window.fbAuth  = null;
window.fbDb    = null;
window._fbReady = false;
window._fbUser  = null;
window.selectedEntrepriseId = 'dpgestpro';
window._forcedEntreprise    = 'dpgestpro';

// ── initFirebase — appelé via onload sur le 3ème script Firebase ──
function initFirebase() {
  if(window._fbReady) return;
  // Attendre que le DOM soit prêt
  if(document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initFirebase);
    return;
  }
  setStatus('Initialisation Firebase...');
  try {
    if(!firebase.apps || !firebase.apps.length) {
      firebase.initializeApp(FB_CONFIG);
    }
    window.fbAuth = firebase.auth();
    window.fbDb   = firebase.firestore();
    window._fbReady = true;

    // Mettre à jour window.FB aussi
    window.FB.auth = window.fbAuth;
    window.FB.db   = window.fbDb;
    window.FB.GoogleAuthProvider = firebase.auth.GoogleAuthProvider;
    window.FB.googleProvider     = new firebase.auth.GoogleAuthProvider();

    setStatus('Firebase prêt ✓');

    // Écouter l'état utilisateur
    firebase.auth().onAuthStateChanged(function(user) {
      if(user) {
        window._fbUser = user;
        onUserConnected(user);
      } else {
        window._fbUser = null;
        showLoginScreen();
      }
    });

  } catch(e) {
    console.error('[DpGestPro] Firebase init:', e.message);
    setStatus('Erreur init');
    showLoginError('Erreur Firebase: ' + e.message);
    showLoginScreen();
  }
}

// ── Fallback CDN si gstatic.com échoue ──
var _fbCdnErrors = {};
function fbCdnError(mod) {
  _fbCdnErrors[mod] = true;
  console.warn('[DpGestPro] CDN échoué:', mod);
  if(Object.keys(_fbCdnErrors).length >= 1) {
    setStatus('CDN principal indisponible, chargement alternatif...');
    var fallbacks = [
      'https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-app-compat.js',
      'https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-auth-compat.js',
      'https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-firestore-compat.js'
    ];
    if(typeof firebase !== 'undefined') { initFirebase(); return; }
    var i = 0;
    function next() {
      if(i >= fallbacks.length) { initFirebase(); return; }
      var s = document.createElement('script');
      s.src = fallbacks[i++];
      s.onload = next;
      s.onerror = function() {
        showLoginError('Impossible de charger Firebase.<br>Vérifiez votre connexion et rechargez (Ctrl+F5).');
        showLoginScreen();
      };
      document.head.appendChild(s);
    }
    next();
  }
}

// ── Timeout 12s ──
setTimeout(function() {
  if(!window._fbReady) {
    setStatus('Délai dépassé');
    showLoginError('Firebase tarde à répondre.<br>Vérifiez votre connexion internet et rechargez (Ctrl+F5).');
    showLoginScreen();
  }
}, 12000);

// ── CONNEXION EMAIL ──
function doLogin() {
  var email = ((document.getElementById('login-email')||{}).value||'').trim();
  var pw    = ((document.getElementById('login-pw')||{}).value||'').trim();
  clearLoginError();
  if(!email||!pw) { showLoginError('Entrez votre email et mot de passe'); return; }
  if(!window._fbReady) { showLoginError('Firebase en cours de chargement... Réessayez dans 5s'); return; }

  var btn = document.getElementById('btn-login');
  var txt = document.getElementById('btn-login-txt');
  if(btn) btn.disabled = true;
  if(txt) txt.textContent = '⏳ Connexion...';

  firebase.auth().signInWithEmailAndPassword(email, pw)
    .then(function() {
      if(txt) txt.textContent = '✅ Connecté!';
    })
    .catch(function(e) {
      if(btn) btn.disabled = false;
      if(txt) txt.textContent = '🔐 Se connecter';
      var m = e.code;
      if(m==='auth/user-not-found'||m==='auth/invalid-email') m='Email introuvable dans Firebase';
      else if(m==='auth/wrong-password'||m==='auth/invalid-credential') m='Mot de passe incorrect';
      else if(m==='auth/too-many-requests') m='Trop de tentatives. Attendez quelques minutes.';
      else m = e.message||e.code;
      showLoginError(m);
    });
}

// ── CONNEXION GOOGLE ──
function doGoogleLogin() {
  clearLoginError();
  if(!window._fbReady) { showLoginError('Firebase en cours de chargement...'); return; }
  var btn = document.getElementById('btn-google');
  var txt = document.getElementById('btn-google-txt');
  if(btn) btn.disabled = true;
  if(txt) txt.textContent = '⏳ Google...';

  var provider = new firebase.auth.GoogleAuthProvider();
  firebase.auth().signInWithPopup(provider)
    .then(function(){ if(txt) txt.textContent='✅ Connecté!'; })
    .catch(function(e) {
      if(btn) btn.disabled = false;
      if(txt) txt.textContent = 'Se connecter avec Google';
      if(e.code!=='auth/popup-closed-by-user') showLoginError(e.message||e.code);
    });
}

// Alias pour compatibilité avec app.js
function loginAvecEmail() { doLogin(); }
function doLogout() { firebase.auth && firebase.auth().signOut(); }

// ── APRÈS CONNEXION RÉUSSIE ──
function onUserConnected(user) {
  hideLoginScreen();
  setStatus('Chargement de l\'application...');
  // Attendre que app.js définisse fbLoginSuccess
  var t = 0;
  var w = setInterval(function() {
    t++;
    if(typeof window.fbLoginSuccess === 'function') {
      clearInterval(w);
      hideLoader();
      window.fbLoginSuccess(user);
    } else if(t > 600) { // 60 secondes max
      clearInterval(w);
      hideLoader();
      showLoginError('app.js n\'a pas pu être chargé.<br>Vérifiez votre connexion et rechargez.');
      showLoginScreen();
    }
  }, 100);
}

// ── UI helpers ──
function setStatus(m){ var e=document.getElementById('l-status'); if(e)e.textContent=m; }
function showLoginScreen(){ document.getElementById('loader').classList.add('hide'); document.getElementById('login-screen').classList.add('show'); }
function hideLoginScreen(){ document.getElementById('login-screen').classList.remove('show'); }
function hideLoader(){ document.getElementById('loader').classList.add('hide'); }
function showLoginError(m){ var e=document.getElementById('login-err'); if(e){e.innerHTML='❌ '+m; e.classList.add('show');} }
function clearLoginError(){ var e=document.getElementById('login-err'); if(e){e.innerHTML='';e.classList.remove('show');} }
var _tT;
function toast(msg,type){
  var e=document.getElementById('toast');if(!e)return;
  clearTimeout(_tT);
  e.innerHTML=msg;
  e.style.background=type==='err'?'rgba(239,68,68,.1)':type==='ok'?'rgba(16,185,129,.1)':'var(--surf)';
  e.style.borderColor=type==='err'?'rgba(239,68,68,.3)':type==='ok'?'rgba(16,185,129,.3)':'var(--bdr)';
  e.style.transform='translateY(0)'; e.style.opacity='1';
  _tT=setTimeout(function(){ e.style.transform='translateY(80px)'; e.style.opacity='0'; },3500);
}

// ── window.FB — rétro-compatibilité avec l'ancien app.js ──
window.FB = {
  auth:null, db:null, GoogleAuthProvider:null, googleProvider:null,
  signInWithEmailAndPassword: function(a,e,p){ return firebase.auth().signInWithEmailAndPassword(e,p); },
  signOut:      function(){ return firebase.auth().signOut(); },
  onAuthStateChanged: function(a,cb){ return firebase.auth().onAuthStateChanged(cb); },
  signInWithPopup:    function(a,p){ return firebase.auth().signInWithPopup(p); },
  getRedirectResult:  function(){ return firebase.auth().getRedirectResult(); },
  // Firestore wrappers — pas de variables indéfinies
  doc:        function(db,col,id){ var d=window.fbDb||db; return d&&d.collection?d.collection(col).doc(id):null; },
  collection: function(db,col){ var d=window.fbDb||db; return d&&d.collection?d.collection(col):null; },
  getDoc:     function(r){ return r&&r.get?r.get():Promise.resolve({exists:false,data:function(){return null;}}); },
  getDocs:    function(r){ return r&&r.get?r.get():Promise.resolve({docs:[],forEach:function(){}}); },
  setDoc:     function(r,d,o){ return r&&r.set?r.set(d,o||{}):Promise.resolve(); },
  addDoc:     function(c,d){ return c&&c.add?c.add(d):Promise.resolve({id:'local_'+Date.now()}); },
  updateDoc:  function(r,d){ return r&&r.update?r.update(d):Promise.resolve(); },
  deleteDoc:  function(r){ return r&&r.delete?r.delete():Promise.resolve(); },
  onSnapshot: function(r,cb){ return r&&r.onSnapshot?r.onSnapshot(cb):function(){}; },
  serverTimestamp: function(){ return(firebase.firestore&&firebase.firestore.FieldValue)?firebase.firestore.FieldValue.serverTimestamp():new Date(); },
  query:   function(r){ var a=Array.prototype.slice.call(arguments,1); return a.reduce(function(x,f){return f&&typeof f==='function'?f(x):x;},r); },
  orderBy: function(f,d){ return function(r){ return r&&r.orderBy?r.orderBy(f,d||'asc'):r; }; }
};

// Fonctions helpers directs (pour app.js)
function fbDoc(col,id){ return window.fbDb?window.fbDb.collection(col).doc(id):null; }
function fbCol(col){ return window.fbDb?window.fbDb.collection(col):null; }
function fbGet(r){ return r&&r.get?r.get():Promise.resolve({exists:false,data:function(){return null;}}); }
function fbSet(r,d,o){ return r&&r.set?r.set(d,o||{}):Promise.resolve(); }
function fbAdd(c,d){ return c&&c.add?c.add(d):Promise.resolve({id:'local_'+Date.now()}); }
function fbUpdate(r,d){ return r&&r.update?r.update(d):Promise.resolve(); }
function fbDelete(r){ return r&&r.delete?r.delete():Promise.resolve(); }
function fbWatch(r,cb){ return r&&r.onSnapshot?r.onSnapshot(cb):function(){}; }
function fbTS(){ return(firebase.firestore&&firebase.firestore.FieldValue)?firebase.firestore.FieldValue.serverTimestamp():new Date(); }
</script>

<!-- app.js : logique principale -->
<script>

// ── Callback appelé par le module Firebase après connexion ──
window.fbLoginSuccess = function(fbUser) {
  if(!fbUser) return;
  // Charger les entreprises dynamiques si la fonction est disponible
  if(typeof chargerEntreprisesDynamiques === 'function') {
    chargerEntreprisesDynamiques().then(function() {
      _fbLoginSuccessCore(fbUser);
    }).catch(function() {
      _fbLoginSuccessCore(fbUser);
    });
  } else {
    // Appel direct si chargerEntreprisesDynamiques pas encore définie
    _fbLoginSuccessCore(fbUser);
  }
}


function _fbLoginSuccessCore(fbUser) {
  // Récupérer l'entreprise sélectionnée sur l'écran de login
  // Sauvegarder l'email pour pré-remplissage
  if(fbUser && fbUser.email) localStorage.setItem('dp_last_email', fbUser.email);
  var entId  = window._forcedEntreprise || window.selectedEntrepriseId || 'dpgestpro';
  var ent    = window.ENTREPRISES ? window.ENTREPRISES[entId] : null;
  var uid    = fbUser.uid;
  
  // Déterminer le rôle depuis ENTREPRISES
  var userInfo = ent?.users?.[uid];
  var role     = userInfo?.role || fbUser.role || 'directeur';
  var isAdm    = uid === 'GU8y7JeJ7VYCPQf0vGyRKj38hLn1' || fbUser.email === 'jeanpaulbognon3@gmail.com';
  if(isAdm) role = 'directeur';

  // Peupler DB.currentUser complètement
  if(typeof DB === 'undefined') window.DB = {settings:{},products:[],clients:[],sales:[],purchases:[]};
  if(!DB.currentUser) DB.currentUser = {};
  DB.currentUser.uid          = uid;
  DB.currentUser.email        = fbUser.email;
  DB.currentUser.name         = fbUser.name || fbUser.displayName;
  DB.currentUser.role         = role;
  window._currentUserEmail    = fbUser.email || ''; // Pour matching par email
  DB.currentUser.demo         = fbUser.demo || false;
  DB.currentUser.entreprise   = entId;
  DB.currentUser.entrepriseNom= ent?.nom || entId;
  window.currentEntrepriseId  = entId; // Sync isolation
  // Assigner le site si URL contient ?site=
  var siteParam = window._forcedSite || new URLSearchParams(window.location.search).get("site") || "";
  if(siteParam && ent?.sites?.[siteParam]) {
    DB.currentUser.site    = siteParam;
    DB.currentUser.siteNom = ent.sites[siteParam].nom || siteParam;

async function _doLoginAsync() {
  const errEl = document.getElementById('login-error');
  if(errEl) errEl.style.display = 'none';

  if(!window.FB) {
    // Firebase pas encore prêt - attendre
    let t = 0;
    const wait = setInterval(function() {
      t++;
      if(window.FB) { clearInterval(wait); lancerConnexionGoogle(); }
      else if(t > 100) {
        clearInterval(wait);
        showLoginError('Serveur indisponible. Vérifiez votre connexion.');
      }
    }, 100);
    return;
  }
  lancerConnexionGoogle();
}

function lancerConnexionGoogle() {
  var loginBtn = document.getElementById('login-btn');
  var btnText  = document.getElementById('login-btn-text');

  if(!window.FB) {
    if(btnText) btnText.textContent = 'Firebase non disponible...';
    showLoginError('Firebase non charge. Rechargez la page.');
    return;
  }

  var auth             = window.FB.auth;
  var GoogleAuthProvider = window.FB.GoogleAuthProvider;
  var signInWithPopup    = window.FB.signInWithPopup;
  var signInWithRedirect = window.FB.signInWithRedirect;

  if(!auth || !GoogleAuthProvider) {
    showLoginError('Erreur Firebase. Rechargez la page (Ctrl+F5).');
    return;
  }

  var provider = new GoogleAuthProvider();
  provider.addScope('email');
  provider.addScope('profile');

  if(loginBtn) loginBtn.disabled = true;
  if(btnText)  btnText.textContent = 'Connexion...';

  // Essayer Popup d'abord (plus fiable)
  signInWithPopup(auth, provider)
    .then(function(result) {
      console.log('✅ Connexion popup OK:', result.user.email);
      if(btnText) btnText.textContent = '✅ Connecte!';
    })
    .catch(function(err) {
      console.warn('Popup echec:', err.code, '→ essai redirect');

      // Si popup bloquée → basculer sur redirect
      if(err.code === 'auth/popup-blocked' ||
         err.code === 'auth/popup-closed-by-user' ||
         err.code === 'auth/cancelled-popup-request') {
        if(btnText) btnText.textContent = 'Redirection Google...';
        signInWithRedirect(auth, provider).catch(function(err2) {
          if(loginBtn) loginBtn.disabled = false;
          if(btnText)  btnText.textContent = 'Se connecter avec Google';
          handleLoginError(err2);
        });
        return;
      }
      // Autre erreur
      if(loginBtn) loginBtn.disabled = false;
      if(btnText)  btnText.textContent = 'Se connecter avec Google';
      handleLoginError(err);
    });
}

function handleLoginError(err) {
  console.error('Login error:', err.code, err.message);
  var msg = 'Erreur de connexion';
  if(err.code === 'auth/unauthorized-domain')
    msg = 'Domaine non autorise dans Firebase. Ajoutez jeanpaul329.github.io dans Firebase Console → Authentication → Authorized domains.';
  else if(err.code === 'auth/network-request-failed')
    msg = 'Erreur reseau. Verifiez votre connexion internet.';
  else if(err.code === 'auth/too-many-requests')
    msg = 'Trop de tentatives. Attendez quelques minutes.';
  else if(err.code === 'auth/user-disabled')
    msg = 'Compte desactive.';
  else if(err.code)
    msg = 'Erreur: ' + err.code;
  showLoginError(msg);
}

window.fbSave = async function(collectionName, id, data) {
  const entId = window.currentEntrepriseId || DB.currentUser?.entreprise || 'dpgestpro';

  // ① IDB toujours en premier (offline-safe, instantané)
  const itemId  = id || data.id || ('idb_' + Date.now());
  const idbItem = Object.assign({}, data, { id: itemId });
  try { await idbSave(collectionName, [idbItem]); } catch(e) {}

  // ② Mettre à jour DB en mémoire
  const dbKey = collectionName === 'products'  ? 'products'  :
                collectionName === 'clients'   ? 'clients'   :
                collectionName === 'sales'     ? 'ventes'    :
                collectionName === 'purchases' ? 'purchases' :
                collectionName === 'projects'  ? 'projects'  :
                collectionName === 'employees' ? 'employees' : null;
  if(dbKey && DB[dbKey]) {
    const idx2 = DB[dbKey].findIndex(function(e){ return String(e.id) === String(itemId); });
    if(idx2 >= 0) DB[dbKey][idx2] = idbItem;
    else DB[dbKey].push(idbItem);
  }

  // ③ Si hors ligne → file d'attente Firestore
  if(!_isOnline) {
    _syncQueue.push({ col: collectionName, id: itemId, data: idbItem, ts: Date.now() });
    showSyncStatus('offline');
    return itemId;
  }

  // ④ Firestore en parallèle (si en ligne)
  if(!window.FB) return itemId;
  const fullPath = 'entreprises/' + entId + '/' + collectionName;
  try {
    const { db, doc, setDoc, addDoc, collection: col, serverTimestamp } = window.FB;
    const payload = Object.assign({}, data, { updatedAt: serverTimestamp(), entId });
    if(id) {
      await setDoc(doc(db, fullPath, String(id)), payload, { merge: true });
      showSyncStatus('saved');
      return id;
    } else {
      const ref = await addDoc(col(db, fullPath), Object.assign({}, payload, { createdAt: serverTimestamp() }));
      // Mettre à jour IDB avec le vrai ID Firestore
      try {
        const idbFinal = Object.assign({}, data, { id: ref.id });
        await idbSave(collectionName, [idbFinal]);
        if(dbKey && DB[dbKey]) {
          const idx3 = DB[dbKey].findIndex(function(e){ return String(e.id) === String(itemId); });
          if(idx3 >= 0) DB[dbKey][idx3] = idbFinal;
        }
      } catch(e) {}
      showSyncStatus('saved');
      return ref.id;
    }
  } catch(e) {
    console.warn('Firestore write skipped:', e.message);
    showSyncStatus('saved'); // Déjà dans IDB
    return itemId;
  }
};

window.fbDelete = async function(collectionName, id) {
  const entId = window.currentEntrepriseId || DB.currentUser?.entreprise || 'dpgestpro';

  // ① Supprimer de IDB
  try { await idbDelete(collectionName, 'default_' + collectionName + '_' + id); } catch(e) {}
  // Aussi chercher par id dans IDB et supprimer
  try {
    var existing = await idbLoad(collectionName);
    var filtered = existing.filter(function(e){ return String(e.id) !== String(id); });
    await idbSave(collectionName, filtered);
  } catch(e) {}

  // ② Mettre à jour mémoire
  const dbKeys = { products:'products', clients:'clients', sales:'ventes',
                   purchases:'purchases', projects:'projects', employees:'employees' };
  const dbKey = dbKeys[collectionName];
  if(dbKey && DB[dbKey]) DB[dbKey] = DB[dbKey].filter(function(e){ return String(e.id) !== String(id); });

  // ③ Firestore
  if(!window.FB) return;
  const fullPath = 'entreprises/' + entId + '/' + collectionName;
  try {
    const { db, doc, deleteDoc } = window.FB;
    await deleteDoc(doc(db, fullPath, String(id)));
  } catch(e) { console.warn('fbDelete Firestore:', e.message); }
};

function genererCleLicence(entId, forfait) {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  const rand  = (n) => Array.from({length:n}, ()=>chars[Math.floor(Math.random()*chars.length)]).join('');
  const prefix = (entId.slice(0,3).toUpperCase() + '-' + forfait.slice(0,3).toUpperCase()).replace(/[^A-Z0-9-]/g,'');
  return prefix + '-' + rand(4) + '-' + rand(4) + '-' + rand(4);
}

function calculerDateFin(forfait, dateDebut) {
  const d = new Date(dateDebut || Date.now());
  d.setDate(d.getDate() + (FORFAITS[forfait]?.duree || 30));
  return d.toISOString().split('T')[0];
}

function verifierLicence(entId) {
  const lic = LICENCES[entId];
  if(!lic || !lic.actif) return { valide: false, raison: 'Aucune licence active' };
  var today = new Date().toISOString().split('T')[0];
  if(today > lic.dateFin) return { valide: false, raison: 'Licence expirée le ' + lic.dateFin };
  const joursRestants = Math.ceil((new Date(lic.dateFin) - new Date()) / 86400000);
  return { valide: true, joursRestants, forfait: lic.forfait, dateFin: lic.dateFin };
}

function validerCleLicence(entId) {
  const cle = document.getElementById('input-cle-licence')?.value?.trim().toUpperCase();
  if(!cle || cle.length < 10) { toast('Entrez une clé de licence valide'); return; }
  // Vérifier la clé dans Firestore
  if(window.FB) {
    const { doc, getDoc, db } = window.FB;
    getDoc(doc(db, 'licences', cle)).then(snap => {
      if(snap.exists()) {
        const data = snap.data();
        if(data.entId !== entId) { toast('❌ Cette clé ne correspond pas à cette entreprise'); return; }
        if(data.utilisee && data.utilisee !== entId) { toast('❌ Clé déjà utilisée'); return; }
        // Activer la licence
        LICENCES[entId] = { cle, forfait: data.forfait, dateDebut: data.dateDebut, dateFin: data.dateFin, actif: true };
        const licScreen = document.getElementById('licence-screen');
        if(licScreen) licScreen.style.display = 'none';
        document.getElementById('login-screen').style.display = 'flex';
        toast('✅ Licence activée ! Valide au ' + data.dateFin);
      } else {
        toast('❌ Clé de licence invalide');
      }
    }).catch(()=>{ toast('❌ Erreur de vérification. Vérifiez votre connexion.'); });
  } else {
    toast('⚠️ Firebase non disponible');
  }
}


function loginSuccess(user) {
  document.getElementById('login-screen').style.display = 'none';
  const app = document.getElementById('app');
  // ── Vérification licence ──
  const _entIdLic = user.entreprise;
  // dpgestpro = tableau de bord admin, toujours libre
  if(_entIdLic && _entIdLic !== 'dpgestpro' && !ADMIN_UID.includes(user.uid)) {
    const _lic = verifierLicence(_entIdLic);
    if(!_lic.valide) {
      // Charger la licence depuis Firestore d'abord
      if(window.FB) {
        const { doc, getDoc, db } = window.FB;
        getDoc(doc(db, 'entreprises', _entIdLic, 'settings', 'licence')).then(snap => {
          if(snap.exists()) {
            const d = snap.data();
            LICENCES[_entIdLic] = { ...d, actif: true };
            const check2 = verifierLicence(_entIdLic);
            if(!check2.valide) { afficherLicenceExpired(_entIdLic); return; }
            if(check2.joursRestants <= 7) toast('⚠️ Licence expire dans '+check2.joursRestants+' jour(s)');
          } else {
            // Pas de licence en Firestore → mode démo ou admin
            // Vérifier si mode démo actif et non expiré
            const _isDemoEnt = _entIdLic?.startsWith('demo_');
            if(!window._isDemoMode && !_isDemoEnt) afficherLicenceExpired(_entIdLic);
            else if(_isDemoEnt && isDemoExpired(_entIdLic)) {
              toast('⏰ Démo expirée (24h). Contactez-nous pour un abonnement.');
            }
          }
        }).catch(()=>{ /* erreur réseau — laisser passer */ });
      }
    } else {
      if(_lic.joursRestants <= 7) toast('⚠️ Licence expire dans '+_lic.joursRestants+' jour(s)');
    }
  }
  app.classList.add('visible');

  // Mettre à jour titre onglet navigateur
  document.title = 'DpGestPro' + (user.entrepriseNom && user.entrepriseNom.toLowerCase()!=='dpgestpro' ? ' | ' + user.entrepriseNom : ' — Système de Gestion');

  // Mettre à jour logo topbar : DpGestPro + nom entreprise

  // Init pages

function setupSidebar(role) {
  const entId      = DB.currentUser?.entreprise;
  const entTypeNav = ENTREPRISES[entId]?.type || 'commerce';
  const userInfo   = ENTREPRISES[entId]?.users?.[DB.currentUser?.uid];
  const isAdminGlobal = ADMIN_UID.includes ? ADMIN_UID.includes(DB.currentUser?.uid) : DB.currentUser?.uid === ADMIN_UID;
  const isFullAdmin = isAdminGlobal || userInfo?.admin === true || (DB.currentUser?.demo && DB.currentUser?.role === 'directeur');

  // Mapping type entreprise → classe bouton
  const isEglNav  = entTypeNav === 'eglise';
  const isHopNav  = entTypeNav === 'hopital';
  const isMfiNav  = entTypeNav === 'microfinance';
  const isFootNav = entTypeNav === 'football';
  const isEcoleNav= entTypeNav === 'ecole';
  const isComNav  = (entTypeNav === 'commerce' || entTypeNav === 'ong');

  // Fonction helper: ce bouton appartient-il au bon type?
  function btnMatchesType(btn) {
    if(btn.classList.contains('eglise-only'))       return isEglNav;
    if(btn.classList.contains('hopital-only'))      return isHopNav;
    if(btn.classList.contains('microfinance-only')) return isMfiNav;
    if(btn.classList.contains('football-only'))     return isFootNav;
    if(btn.classList.contains('ecole-only'))        return isEcoleNav;
    if(btn.classList.contains('commerce-only'))     return isComNav;
    return true; // pas de classe type = bouton global (dashboard, tchat...)
  }

  document.querySelectorAll('.nav-item').forEach(function(btn) {
    if(btn.id === 'admin-nav-btn') return;

    // 1. Cacher si mauvais type
    if(!btnMatchesType(btn)) { btn.style.display='none'; return; }

    // 2. Afficher si bon type
    if(isFullAdmin) {
      btn.style.display = 'flex';
      return;
    }

    // 3. Filtrer par rôle pour non-admin
    var roles = (btn.dataset.roles || '').split(',').map(function(r){return r.trim();});
    btn.style.display = roles.indexOf(role) >= 0 ? 'flex' : 'none';
  });

  // Sections sidebar
  document.querySelectorAll('[data-section-roles]').forEach(function(el) {
    if(el.id === 'admin-section') return;

    // Cacher sections mauvais type
    if(el.classList.contains('eglise-only')       && !isEglNav)  { el.style.display='none'; return; }
    if(el.classList.contains('hopital-only')       && !isHopNav)  { el.style.display='none'; return; }
    if(el.classList.contains('microfinance-only')  && !isMfiNav)  { el.style.display='none'; return; }
    if(el.classList.contains('football-only')      && !isFootNav) { el.style.display='none'; return; }
    if(el.classList.contains('ecole-only')         && !isEcoleNav){ el.style.display='none'; return; }
    if(el.classList.contains('commerce-only')      && !isComNav)  { el.style.display='none'; return; }

    if(isFullAdmin) { el.style.display='block'; return; }
    var secRoles = (el.dataset.sectionRoles || '').split(',').map(function(r){return r.trim();});
    el.style.display = secRoles.indexOf(role) >= 0 ? 'block' : 'none';
  });

  // Bouton Admin
  var adminBtn  = document.getElementById('admin-nav-btn');
  var adminSect = document.getElementById('admin-section');
  var isAdmin   = (isAdminGlobal || DB.currentUser?.email === ADMIN_EMAIL) && !DB.currentUser?.demo;
  if(adminBtn)  adminBtn.style.display  = isAdmin ? 'flex'  : 'none';
  if(adminSect) adminSect.style.display = isAdmin ? 'block' : 'none';

  // Premier bouton visible actif
  var firstVisible = document.querySelector('.nav-item[style*="flex"]');
  if(firstVisible) {
    document.querySelectorAll('.nav-item').forEach(function(b){b.classList.remove('active');});
    firstVisible.classList.add('active');
  }
}

  const isFoot  = entType === 'football';
  const isEcole = entType === 'ecole';

  // ─── Permissions par type + rôle ─────────────────────
  const perms = {
    // HÔPITAL
    directeur: isHop
      ? ['dashboard',...hopPagesAll,'depenses','salaires-paiement','tchat','admin','settings']
      : isEgl
        ? ['dashboard',...eglisePages,'depenses','tchat','admin','settings']
        : isMfi

          : isFoot
            ? ['dashboard',...footPages,'depenses','salaires-paiement','tchat','admin','settings']
            : isEcole
              ? ['dashboard',...ecolePagesAll,'depenses','salaires-paiement','tchat','admin','settings']
              : ['dashboard','inventory','clients','projects','purchases','sales','caisse','journee','depenses','reports','rh','salaires-paiement','annexes','tchat','admin','settings',...eglisePages],

    medecin:   isHop ? ['dashboard',...hopPagesAll,'depenses','tchat'] : ['dashboard'],
    infirmier: isHop ? ['dashboard','hop-patients','hop-consultations','hop-hospit','hop-pharmacie','hop-facturation','hop-urgences','hop-laboratoire','hop-imagerie','hop-tchat','depenses','tchat'] : ['dashboard'],
    // Microfinance
    agent    : isMfi  ? ['dashboard','mfi-clients','mfi-prets','mfi-remboursements','mfi-epargne','mfi-caisse','depenses','tchat'] : ['dashboard'],
    // Football
    president  : isFoot ? ['dashboard',...footPages,'depenses','salaires-paiement','tchat','admin','settings'] : ['dashboard'],
    // École
    censeur    : isEcole ? ['dashboard',...ecolePagesAll,'depenses','tchat'] : ['dashboard'],
    enseignant : isEcole ? ['dashboard','ecole-eleves','ecole-notes','ecole-emploidutemps','ecole-presences','ecole-examen','tchat'] : ['dashboard'],
    professeur : isEcole ? ['dashboard','ecole-eleves','ecole-notes','ecole-emploidutemps','ecole-presences','ecole-examen','ecole-bibliotheque','tchat'] : ['dashboard'],
    secretaire : isEcole ? ['dashboard','ecole-eleves','ecole-emploidutemps','ecole-paiements','ecole-bibliotheque','tchat'] : ['dashboard'],
    entraineur : isFoot ? ['dashboard','foot-joueurs','foot-matchs','foot-entrainements','foot-competitions','foot-medical','foot-stats','tchat'] : ['dashboard'],
    staff      : isFoot ? ['dashboard','foot-joueurs','foot-matchs','foot-entrainements','foot-competitions','foot-medical','foot-stats','tchat'] : ['dashboard'],
    joueur     : isFoot ? ['dashboard','foot-matchs','foot-entrainements','foot-stats','tchat'] : ['dashboard'],

    gestionnaire: isEgl
      ? ['dashboard',...eglisePages.slice(0,5),'eglise-caisse','eglise-rh','depenses','tchat']
      : ['dashboard','inventory','clients','projects','purchases','sales','caisse','journee','depenses','salaires-paiement','tchat'],

    caissier: isEgl
      ? ['dashboard','eglise-caisse','eglise-cultes','eglise-membres','depenses','tchat']
      : ['dashboard','sales','caisse','journee','depenses','tchat']
  };

  const isFullAdmin = isAdminGlobal || userInfo?.admin === true || (DB.currentUser?.demo && DB.currentUser?.role === 'directeur');

  if(id === 'admin' && DB.currentUser?.demo) {
    toast('⚠️ Admin non disponible en mode démo');

  if(id==='eglise-banques') initBanques();

function initDashboard(role) {

  const isFoot  = type === 'football';

    mfiDB();
    const membres     = DB.mfiClients.length;

    const retards     = DB.mfiPrets.filter(function(p){return p.statut==='En retard';}).length;

      { icon:'👥', value:membres,              label:'Total membres',        change:actifs+' actifs',           dir:'up',   cls:'purple' },

      { icon:'⚠️', value:retards,              label:'Prêts en retard',       change:'PAR30',                    dir:'down', cls:'red'    },
      { icon:'🏧', value:fmtNum(totalEpargne)+' F', label:'Total épargne',    change:'Membres épargnants',       dir:'up',   cls:'orange' },
    ];

  } else if(isFoot) {

    const clients  = DB.clients.length;

    const allStats = [

function renderBarChart() {
  var el = document.getElementById('bar-chart'); if(!el) return;
  // Calculer les ventes réelles par mois depuis DB.ventes
  var ventes = DB.ventes || DB.sales || [];
  var byMonth = {};
  ventes.forEach(function(v) {
    var d = v.date || v.createdAt || '';
    var m = String(d).slice(0,7); // YYYY-MM
    if(!m || m.length < 7) return;
    byMonth[m] = (byMonth[m]||0) + Number(v.total||v.amount||v.montant||0);
  });
  // Prendre les 8 derniers mois
  var months8 = [];
  for(var i=7; i>=0; i--) {
    var d = new Date();
    d.setMonth(d.getMonth()-i);
    var key   = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    var label = d.toLocaleDateString('fr-FR',{month:'short'});
    months8.push({key:key, label:label, val:byMonth[key]||0});
  }
  var maxVal = Math.max.apply(null, months8.map(function(m){return m.val;})) || 1;
  el.innerHTML = months8.map(function(m,i) {
    var h   = Math.max(8, Math.round(m.val/maxVal*100));
    var lbl = m.val > 0 ? (m.val>=1000000?(m.val/1000000).toFixed(1)+'M':(m.val>=1000?(m.val/1000).toFixed(0)+'k':m.val)) : '—';
    var isLast = (i===7);
    return '<div class="bar-item">'
      +'<span class="bar-val" style="font-size:9px">'+lbl+'</span>'
      +'<div class="bar" style="height:'+h+'px;background:'+(isLast?'var(--accent)':'rgba(108,99,255,.3)')+'"></div>'
      +'<span class="bar-label">'+m.label+'</span>'
    +'</div>';
  }).join('');
}

function renderDonut() {
  var el = document.getElementById('donut-chart');
  var leg= document.getElementById('donut-legend');
  if(!el) return;
  // Calculer répartition par catégorie depuis DB.ventes/products
  var ventes = DB.ventes || DB.sales || [];
  var byCat  = {};
  ventes.forEach(function(v) {
    var items = v.items || v.produits || [];
    if(Array.isArray(items)) {
      items.forEach(function(it) {
        var cat = it.cat || it.categorie || 'Autre';
        byCat[cat] = (byCat[cat]||0) + Number(it.total||it.price*it.qty||0);
      });
    } else {
      // Vente sans items détaillés → catégorie générale
      var cat = v.cat || v.categorie || 'Ventes';
      byCat[cat] = (byCat[cat]||0) + Number(v.total||v.amount||0);
    }
  });
  var cats = Object.keys(byCat).filter(function(c){ return byCat[c]>0; });
  // Si aucune vraie donnée, afficher placeholder
  if(!cats.length) {
    el.innerHTML = '<text x="60" y="65" text-anchor="middle" style="font-size:10px;fill:var(--text3)">Aucune vente</text>';
    if(leg) leg.innerHTML = '<div style="font-size:11px;color:var(--text3)">Enregistrez des ventes pour voir la répartition</div>';
    return;
  }
  var colors = ['#6c63ff','#ef4444','#10b981','#f59e0b','#3b82f6','#8b5cf6'];
  var total  = cats.reduce(function(s,c){ return s+byCat[c]; },0);
  var cx=60, cy=60, r=45, r2=30;
  var paths  = '';
  var angle  = -Math.PI/2;
  cats.slice(0,5).forEach(function(cat,i) {
    var pct   = byCat[cat]/total;
    var sweep = pct * 2 * Math.PI;
    var x1=cx+r*Math.cos(angle), y1=cy+r*Math.sin(angle);
    var x2=cx+r*Math.cos(angle+sweep), y2=cy+r*Math.sin(angle+sweep);
    var xi1=cx+r2*Math.cos(angle), yi1=cy+r2*Math.sin(angle);
    var xi2=cx+r2*Math.cos(angle+sweep), yi2=cy+r2*Math.sin(angle+sweep);
    var lg = sweep > Math.PI ? 1 : 0;
    paths += '<path d="M'+x1+' '+y1+' A'+r+' '+r+' 0 '+lg+' 1 '+x2+' '+y2
      +' L'+xi2+' '+yi2+' A'+r2+' '+r2+' 0 '+lg+' 0 '+xi1+' '+yi1+' Z"'
      +' fill="'+colors[i%colors.length]+'" opacity=".9"/>';
    angle += sweep;
  });
  el.innerHTML = paths + '<circle cx="60" cy="60" r="26" fill="var(--surface2)"/>';
  if(leg) leg.innerHTML = cats.slice(0,5).map(function(cat,i) {
    var pct = Math.round(byCat[cat]/total*100);
    return '<div class="legend-item"><div class="legend-dot" style="background:'+colors[i%colors.length]+'"></div>'
      +'<span>'+cat+' <b>'+pct+'%</b></span></div>';
  }).join('');
}

async function saveProduct() {
  const id   = document.getElementById('p-id').value;
  const name = document.getElementById('p-name').value.trim();
  if(!name) { toast('Le nom du produit est obligatoire'); return; }
  const data = {
    ref      : document.getElementById('p-ref').value.trim()   || ('REF-' + String(DB.nextId.product).padStart(3,'0')),
    name,
    cat      : document.getElementById('p-cat').value,
    qty      : +document.getElementById('p-qty').value,
    alert    : +document.getElementById('p-alert').value,
    buyPrice : +document.getElementById('p-buy').value,
    sellPrice: +document.getElementById('p-sell').value,
    desc     : document.getElementById('p-desc').value.trim(),
    icon     : '📦'
  };
  try {
    if(id) {
      await window.fbSave('products', id, data);
      const idx = DB.products.findIndex(p => String(p.id) === String(id));
      if(idx !== -1) DB.products[idx] = { ...DB.products[idx], ...data };
      closeModal('modal-product'); renderInventory(); renderPOS();
      toast('Produit mis à jour ✅');
    } else {
      const newId = await window.fbSave('products', null, data);
      var newProd = { id: newId || DB.nextId.product++, ...data };
      DB.products.push(newProd);
      idbSave('products', DB.products).catch(function(){});
      closeModal('modal-product'); renderInventory(); renderPOS();
      toast('Produit ajouté ✅');
    }
  } catch(e) { toast('Erreur sauvegarde: ' + e.message); }
}

async function deleteProduct(id) {
  const p = DB.products.find(p => String(p.id) === String(id) || p.id === id);
  if(!p) return;
  if(confirm('Supprimer "' + p.name + '" ? Cette action est irréversible.')) {
    try {
      await window.fbDelete('products', id);
      DB.products = DB.products.filter(p => String(p.id) !== String(id) && p.id !== id);
      renderInventory(); renderPOS();
      toast('Produit supprimé');
    } catch(e) { toast('Erreur suppression: ' + e.message); }
  }
}

function editProject(id) {
  const p = DB.projects.find(p => p.id === id);
  if(!p) { toast('Projet introuvable'); return; }
  document.getElementById('pr-id').value       = p.id;
  document.getElementById('pr-name').value     = p.name     || '';
  document.getElementById('pr-budget').value   = p.budget   ?? 0;
  document.getElementById('pr-desc').value     = p.desc     || '';
  document.getElementById('pr-start').value    = p.start    || '';
  document.getElementById('pr-end').value      = p.end      || '';
  document.getElementById('pr-progress').value = p.progress ?? 0;
  document.getElementById('pr-progress-val').textContent = p.progress ?? 0;
  const sel = document.getElementById('pr-status');
  for(let i=0;i<sel.options.length;i++){if(sel.options[i].value===p.status){sel.selectedIndex=i;break;}}
  const csel = document.getElementById('pr-client');
  for(let i=0;i<csel.options.length;i++){if(csel.options[i].value===p.client){csel.selectedIndex=i;break;}}

  document.getElementById('pr-modal-badge').style.color = 'var(--accent4)';

function saveProject() {
  const id   = document.getElementById('pr-id').value;
  const name = document.getElementById('pr-name').value.trim();
  if(!name) { toast('Le nom du projet est obligatoire'); return; }
  const data = {
    name,
    client  : document.getElementById('pr-client').value   || '-',
    budget  : +document.getElementById('pr-budget').value,
    start   : document.getElementById('pr-start').value,
    end     : document.getElementById('pr-end').value,
    status  : document.getElementById('pr-status').value,
    progress: +document.getElementById('pr-progress').value,
    desc    : document.getElementById('pr-desc').value.trim()
  };
  if(id) {
    const idx = DB.projects.findIndex(p => p.id === parseInt(id));
    if(idx !== -1) {
      DB.projects[idx] = { ...DB.projects[idx], ...data };
      closeModal('modal-project');
      renderProjects();
      toast('Projet mis à jour ✅');
    }
  } else {
    DB.projects.push({ id: DB.nextId.project++, ...data });
    closeModal('modal-project');
    renderProjects();
    toast('Projet créé ✅');
  }
}

async function deleteProject(id) {
  const p = DB.projects.find(p => String(p.id) === String(id) || p.id === id);
  if(!p) return;
  if(confirm('Supprimer "' + p.name + '" ? Cette action est irréversible.')) {
    try {
      await window.fbDelete('projects', id);
      DB.projects = DB.projects.filter(p => String(p.id) !== String(id) && p.id !== id);
      renderProjects();
      toast('Projet supprimé');
    } catch(e) { toast('Erreur suppression: ' + e.message); }
  }
}

function editPurchase(id) {
  const p = DB.purchases.find(p => String(p.id) === String(id));

  document.getElementById('pu-supplier').value = p.supplier || '';

async function deletePurchase(id) {
  const p = DB.purchases.find(p => String(p.id) === String(id));
  if(!p) return;
  if(confirm('Supprimer la commande "' + p.ref + '" ?')) {
    try {
      await window.fbDelete('purchases', id);
      DB.purchases = DB.purchases.filter(p => String(p.id) !== String(id));
      renderPurchases();
      toast('Commande supprimée');
    } catch(e) { toast('Erreur: ' + e.message); }
  }
}

async function addPurchase() {
  const modal  = document.getElementById('modal-purchase');
  const editId = modal.dataset.editId || '';
  const data = {
    supplier: document.getElementById('pu-supplier').value,
    items   : document.getElementById('pu-items').value,
    amount  : +document.getElementById('pu-amount').value,
    date    : document.getElementById('pu-date').value || new Date().toISOString().split('T')[0],
    status  : document.getElementById('pu-status').value
  };
  try {
    if(editId) {
      // MODE ÉDITION
      await window.fbSave('purchases', editId, data);
      const idx = DB.purchases.findIndex(p => String(p.id) === String(editId));
      if(idx !== -1) DB.purchases[idx] = { ...DB.purchases[idx], ...data };
      delete modal.dataset.editId;
      modal.querySelector('.modal-title').textContent = '🛒 Nouvelle commande';
      closeModal('modal-purchase'); renderPurchases();
      toast('Commande mise à jour ✅');
    } else {
      // MODE CRÉATION
      const newId = DB.nextId.purchase++;
      const p = { id: newId, ref: 'CMD-' + new Date().getFullYear() + '-' + String(newId).padStart(3,'0'), ...data };
      const fbId = await window.fbSave('purchases', null, p);
      DB.purchases.push({ ...p, id: fbId || newId });
      closeModal('modal-purchase'); renderPurchases();
      toast('Commande créée ✅');
    }
  } catch(e) { toast('Erreur: ' + e.message); }
}

function addToCart(id) {
  const prod = DB.products.find(p=>String(p.id)===String(id));
  if(!prod) { toast('⚠️ Produit introuvable'); return; }
  if(prod.qty<=0) { toast('⚠️ Stock insuffisant'); return; }
  const existing = DB.cart.find(i=>String(i.id)===String(id));
  if(existing) { existing.qty++; }
  else { DB.cart.push({id:prod.id, name:prod.name, price:prod.sellPrice, qty:1}); }
  renderCart();
  toast('✅ ' + prod.name + ' ajouté');
}

function renderCart() {
  if(DB.cart.length===0) {
    document.getElementById('cart-items').innerHTML = '<div style="color:var(--text3);text-align:center;padding:30px 0;font-size:14px;">Panier vide</div>';
    ['cart-subtotal','cart-tax','cart-total'].forEach(id=>document.getElementById(id).textContent='0 F');
    return;
  }
  document.getElementById('cart-items').innerHTML = DB.cart.map((item,i)=>`
    <div class="cart-item">
      <div class="cart-item-name">${item.name}</div>
      <div class="cart-qty">
        <button class="qty-btn" onclick="changeQty(${i},-1)">-</button>
        <span style="font-size:14px;font-weight:600;min-width:20px;text-align:center">${item.qty}</span>
        <button class="qty-btn" onclick="changeQty(${i},1)">+</button>
      </div>
      <div class="cart-item-total">${fmtNum(item.price*item.qty)} F</div>
    </div>
  `).join('');
  const sub = DB.cart.reduce((a,i)=>a+i.price*i.qty,0);
  const tax = Math.round(sub*0.18);
  const total = sub+tax;
  document.getElementById('cart-subtotal').textContent = fmtNum(sub)+' F';
  document.getElementById('cart-tax').textContent = fmtNum(tax)+' F';
  document.getElementById('cart-total').textContent = fmtNum(total)+' F';
}

function changeQty(idx, delta) {
  DB.cart[idx].qty += delta;
  if(DB.cart[idx].qty <= 0) DB.cart.splice(idx,1);
  renderCart();
}

function clearCart() { DB.cart=[]; renderCart(); }

function checkout() {
  if(DB.cart.length===0) { toast("Panier vide"); return; }
  if(!isJourneeOuverte()) { toast("Journee fermee - Contactez le Directeur"); return; }

  const exonere   = document.getElementById('cart-exonere')?.checked || false;
  const motifExo  = document.getElementById('cart-motif-exo')?.value || "";
  const regime    = DB.settings?.regime || "reel";
  const sub       = DB.cart.reduce((a,i)=>a+i.price*i.qty, 0);
  const tax       = exonere ? 0 : Math.round(sub * 0.18);
  const total     = sub + tax;
  const client    = document.getElementById('cart-client').value || "Client passager";
  const method    = document.getElementById('pay-method').value;

  // Numéro facture normalisée séquentiel
  const annee     = new Date().getFullYear();
  const entId     = (DB.currentUser && DB.currentUser.entreprise) ? DB.currentUser.entreprise : "ent";
  // Numéro facture persistant: restaurer depuis localStorage
  var entId2   = DB.currentUser ? (DB.currentUser.entreprise||'ent') : 'ent';
  var lsKey    = 'dpgest_sale_counter_' + entId2;
  var lastNum  = parseInt(localStorage.getItem(lsKey)||'0');
  // Aussi vérifier le max des sales existantes
  var maxFromSales = (DB.sales||[]).reduce(function(mx, s) {
    var n = parseInt((s.ref||'').replace(/\D/g,''))||0;
    return n > mx ? n : mx;
  }, 0);
  var nextNum  = Math.max(lastNum, maxFromSales, DB.nextId.sale||0) + 1;
  DB.nextId.sale = nextNum;
  localStorage.setItem(lsKey, String(nextNum));
  const numFact = "F-" + annee + "-" + String(nextNum).padStart(5, "0");
  const dateISO   = new Date().toISOString().split("T")[0];
  const dateFR    = new Date().toLocaleDateString("fr-FR");
  const items     = DB.cart.map(i=>i.name).join(", ");

  DB.cart.forEach(ci => {
    const p = DB.products.find(pr=>String(pr.id)===String(ci.id));
    if(p) p.qty -= ci.qty;
  });

  const nameParts    = (DB.currentUser.name || "Caissier").split(" ");
  const cashierShort = nameParts[0] + (nameParts[1] ? " " + nameParts[1].charAt(0) + "." : "");

  const sale = {
    id:DB.nextId.sale, ref:numFact, client, items,
    amount:total, method, date:dateISO,
    cashier:cashierShort, status:"Payé",
    exonere, motifExo, sub, tax
  };
  DB.sales.push(sale);

  // Sauvegarder IDB immédiatement (hors ligne safe)
  idbSave('sales', DB.sales).catch(function(e){ console.warn('IDB sales:', e); });

  if(window.fbSave) {
    window.fbSave("sales", null, sale).catch(e => console.warn("Vente non sauvegardée:", e));
  }

  // Notification email pour Le Magnificat
  notifierVente(sale);

  // Aperçu dans modal
  const exoLabel = exonere ? ("Exonéré — " + (motifExo||"TVA non applicable")) : "TVA (18%)";
  document.getElementById("receipt-content").innerHTML =
    '<div style="text-align:center;margin-bottom:12px;font-size:14px;font-weight:700;color:var(--accent)">FACTURE NORMALISEE</div>' +
    '<div style="font-size:11px;color:var(--text3);margin-bottom:8px">N° ' + numFact + ' | ' + dateFR + '</div>' +
    '<div style="font-size:12px;margin-bottom:4px">Client : <strong>' + client + '</strong></div>' +
    '<div style="margin:10px 0;padding:8px 0;border-top:1px dashed var(--border);border-bottom:1px dashed var(--border)">' +
    DB.cart.map(i => '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>' + i.name + ' x' + i.qty + '</span><span>' + fmtNum(i.price*i.qty) + ' F</span></div>').join("") +
    '</div>' +
    '<div style="font-size:12px">Sous-total : ' + fmtNum(sub) + ' F</div>' +
    /* TVA reçu modal supprimée */ '' +
    '<div style="font-size:16px;font-weight:800;margin-top:8px;color:var(--success)">TOTAL : ' + fmtNum(total) + ' FCFA</div>' +
    '<div style="font-size:11px;margin-top:6px;color:var(--text2)">Paiement : ' + method + '</div>';

  lastReceiptData = {
    ref:numFact, date:dateISO, dateFR, client, method,
    cashier: DB.currentUser.name,
    items: DB.cart.map(i => ({name:i.name, qty:i.qty, price:i.price, total:i.price*i.qty})),
    sub, tax, total, exonere, motifExo,
    company : (DB.settings && DB.settings.company)  || "",
    address : (DB.settings && DB.settings.address)  || "Cotonou, Bénin",
    phone   : (DB.settings && DB.settings.phone)    || "",
    nif     : (DB.settings && DB.settings.nif)      || "",
    ifu     : (DB.settings && DB.settings.ifu)      || "",
    rccm    : (DB.settings && DB.settings.rccm)     || "",
    regime  : (DB.settings && DB.settings.regime)   || "reel",
    entNom  : DB.currentUser && DB.currentUser.entrepriseNom ? DB.currentUser.entrepriseNom : ""
  };

  openModal("modal-receipt");
  clearCart();
  renderInventory();
  renderSales();
  renderPOS();
  renderCaisseStats();
  toast("Facture " + numFact + " generee");
}

function renderAnnexes() {
  const grid = document.getElementById('annexes-grid');
  if(!grid) return;
  const total = document.getElementById('ann-total');
  const staff = document.getElementById('ann-staff');
  const caEl  = document.getElementById('ann-ca');
  const prods = document.getElementById('ann-produits');
  if(total) total.textContent = DB.annexes.filter(a=>a.statut==='Active').length;
  if(staff) staff.textContent = DB.employes.length;
  if(caEl)  caEl.textContent  = fmtNum(DB.sales.reduce((a,s)=>a+(s.amount||0),0)) + ' F';
  if(prods) prods.textContent = DB.products.reduce((a,p)=>a+(p.qty||0),0);
  if(!DB.annexes.length) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text3)">
      <div style="font-size:48px;margin-bottom:12px">🏪</div>
      <div style="font-size:16px;font-weight:600;margin-bottom:8px">Aucune annexe enregistrée</div>
      <div style="font-size:13px">Cliquez sur "+ Nouvelle annexe" pour ajouter un point de vente</div>
    </div>`;
    return;
  }
  grid.innerHTML = DB.annexes.map(a => `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;position:relative;transition:all .2s" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="font-size:28px">🏪</div>
        <span class="badge ${a.statut==='Active'?'badge-success':a.statut==='Suspendue'?'badge-danger':'badge-warning'}">${a.statut}</span>
      </div>
      <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:800;margin-bottom:4px">${a.nom}</div>
      <div style="color:var(--text2);font-size:13px;margin-bottom:4px">📍 ${a.ville}${a.quartier?' — '+a.quartier:''}</div>
      <div style="color:var(--text3);font-size:12px;margin-bottom:4px">👤 ${a.responsable||'Non assigné'}</div>
      ${a.tel?'<div style="color:var(--text3);font-size:12px;margin-bottom:12px">📞 '+a.tel+'</div>':''}
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn-sm btn-outline" style="flex:1;color:var(--accent);border-color:var(--accent)" onclick="editAnnexe('${a.id}')">✏ Modifier</button>
        <button class="btn-sm btn-danger" onclick="deleteAnnexe('${a.id}')">🗑</button>

  `).join('');
}

function openNewAnnexe() {
  document.getElementById('ann-id').value = '';
  document.getElementById('ann-nom').value = '';
  document.getElementById('ann-ville').value = '';
  document.getElementById('ann-quartier').value = '';
  document.getElementById('ann-tel').value = '';
  document.getElementById('ann-responsable').value = '';
  document.getElementById('ann-adresse').value = '';
  document.getElementById('ann-desc').value = '';
  document.getElementById('ann-statut').value = 'Active';
  document.getElementById('ann-modal-title').textContent = '🏪 Nouvelle Annexe';
  document.getElementById('ann-modal-badge').textContent = 'NOUVEAU';
  openModal('modal-annexe');
}

function editAnnexe(id) {
  const a = DB.annexes.find(a => String(a.id) === String(id));
  if(!a) return;
  document.getElementById('ann-id').value          = a.id;
  document.getElementById('ann-nom').value         = a.nom || '';
  document.getElementById('ann-ville').value       = a.ville || '';
  document.getElementById('ann-quartier').value    = a.quartier || '';
  document.getElementById('ann-tel').value         = a.tel || '';
  document.getElementById('ann-responsable').value = a.responsable || '';
  document.getElementById('ann-adresse').value     = a.adresse || '';
  document.getElementById('ann-desc').value        = a.desc || '';
  document.getElementById('ann-statut').value      = a.statut || 'Active';
  document.getElementById('ann-modal-title').textContent = '✏️ Modifier : ' + a.nom;
  document.getElementById('ann-modal-badge').textContent = 'MODIFICATION';
  openModal('modal-annexe');
}

async function saveAnnexe() {
  const id  = document.getElementById('ann-id').value;
  const nom = document.getElementById('ann-nom').value.trim();
  if(!nom) { toast('Le nom est obligatoire'); return; }
  const data = {
    nom, ville       : document.getElementById('ann-ville').value.trim(),
    quartier         : document.getElementById('ann-quartier').value.trim(),
    tel              : document.getElementById('ann-tel').value.trim(),
    responsable      : document.getElementById('ann-responsable').value.trim(),
    adresse          : document.getElementById('ann-adresse').value.trim(),
    desc             : document.getElementById('ann-desc').value.trim(),
    statut           : document.getElementById('ann-statut').value,
    entreprise       : DB.currentUser?.entreprise || 'dpgestpro',
    dateCreation     : new Date().toISOString().split('T')[0]
  };
  try {
    if(id) {
      await window.fbSave('annexes', id, data);
      const idx = DB.annexes.findIndex(a => String(a.id) === String(id));
      if(idx !== -1) DB.annexes[idx] = { ...DB.annexes[idx], ...data };
      toast('Annexe mise à jour ✅');
    } else {
      const newId = await window.fbSave('annexes', null, data);
      DB.annexes.push({ id: newId || Date.now(), ...data });
      toast('Annexe créée ✅');
    }
    closeModal('modal-annexe'); renderAnnexes();
  } catch(e) { toast('Erreur: ' + e.message); }
}

async function deleteAnnexe(id) {
  const a = DB.annexes.find(a => String(a.id) === String(id));
  if(!a || !confirm('Supprimer "' + a.nom + '" ?')) return;
  await window.fbDelete('annexes', id).catch(()=>{});
  DB.annexes = DB.annexes.filter(a => String(a.id) !== String(id));
  renderAnnexes(); toast('Annexe supprimée');
}

var currentConvId = null;
var tchatUnsubscribe = null;

function initTchat() {
  const entId  = DB.currentUser?.entreprise || 'dpgestpro';
  const base   = window.location.href.replace('index.html','').replace(/\/+$/, '');
  const lienClient = base + '/tchat.html?ent=' + entId;
  const linkEl = document.getElementById('tchat-link');
  if(linkEl) {
    linkEl.textContent = lienClient;
    linkEl.setAttribute('data-link', lienClient);
  }
  // Rafraîchir l'affichage avec les conversations déjà chargées
  renderConversations(DB.tchatConversations || []);
}

function getTchatLink() {
  const entId = DB.currentUser?.entreprise || 'dpgestpro';
  const base  = window.location.href.replace('index.html','').replace(/\/+$/, '');
  return base + '/tchat.html?ent=' + entId;
}

function copyTchatLink() {
  const link = getTchatLink();
  navigator.clipboard.writeText(link)
    .then(() => toast('🔗 Lien copié !'))
    .catch(() => { prompt('Copiez ce lien :', link); });
}

function partagerWhatsApp() {
  const link    = getTchatLink();
  const entNom  = DB.currentUser?.entrepriseNom || 'notre entreprise';
  const msg     = 'Bonjour ! Contactez ' + entNom + ' via notre tchat en ligne : ' + link;
  const waUrl   = 'https://wa.me/?text=' + encodeURIComponent(msg);
  window.open(waUrl, '_blank');
}

var _convUnsubscribe = null;

async function loadConversations() {
  if(!window.FB) { renderConversations([]); return; }
  const { db, collection, onSnapshot } = window.FB;
  const entId = DB.currentUser?.entreprise || 'dpgestpro';
  // Désabonner ancien listener si existe
  if(_convUnsubscribe) { _convUnsubscribe(); _convUnsubscribe = null; }
  try {
    _convUnsubscribe = onSnapshot(
      collection(db, 'entreprises/' + entId + '/conversations'),
      (snap) => {
        DB.tchatConversations = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        DB.tchatConversations.sort((a,b) => (b.lastMsgTime||0) - (a.lastMsgTime||0));
        // Rafraîchir liste si on est sur la page tchat
        const tchatPage = document.getElementById('page-tchat');
        if(tchatPage && tchatPage.classList.contains('active')) {
          renderConversations(DB.tchatConversations);
        }
        updateTchatBadge();
        console.log('Tchat — conversations reçues:', DB.tchatConversations.length);
      },
      (err) => {
        if(err.code === 'permission-denied') {
          console.warn('Tchat CS TOHOU: permission Firestore insuffisante — vérifiez les règles pour /entreprises/cs_tohou/conversations');
          renderConversations([]);
          // Afficher message dans l'UI
          var convList = document.getElementById('conv-list');
          if(convList) convList.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3)">' +
            '⚠️ Accès conversations limité.<br><small>Vérifiez les règles Firestore pour cs_tohou</small></div>';
        } else {
          console.error('Tchat erreur:', err);
          renderConversations([]);
        }
      }
    );
  } catch(e) {
    console.error('loadConversations erreur:', e);
    renderConversations([]);
  }
}

function renderConversations(convs) {
  const list = document.getElementById('conversations-list');
  const cnt  = document.getElementById('conv-count');
  if(!list) return;
  if(cnt) cnt.textContent = convs.length;
  if(!convs.length) {
    list.innerHTML = '<div style="text-align:center;color:var(--text3);font-size:12px;padding:20px">Aucune conversation<br>Partagez le lien à vos clients</div>';
    return;
  }
  list.innerHTML = convs.map(c => {
    const unread = c.unreadStaff || 0;
    const active = currentConvId === c.id;
    return `<div onclick="openConversation('${c.id}')"
      style="padding:12px;border-radius:10px;cursor:pointer;margin-bottom:4px;background:${active?'rgba(108,99,255,.15)':'transparent'};transition:all .2s"
      onmouseover="if('${c.id}'!==currentConvId)this.style.background='var(--surface2)'"
      onmouseout="if('${c.id}'!==currentConvId)this.style.background='transparent'">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
        <div style="font-weight:600;font-size:13px">👤 ${c.clientName||'Client'}</div>
        ${unread>0?'<span style="background:var(--danger);color:white;border-radius:10px;padding:1px 6px;font-size:10px">'+unread+'</span>':''}
      </div>
      <div style="font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.lastMsg||'...'}</div>
      <div style="font-size:10px;color:var(--text3);margin-top:2px">${c.lastMsgTime?new Date(c.lastMsgTime).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}):''}</div>
    </div>`;
  }).join('');
}

async function openConversation(convId) {
  currentConvId = convId;
  const conv = DB.tchatConversations.find(c => c.id === convId);
  const nameEl   = document.getElementById('tchat-client-name');
  const statusEl = document.getElementById('tchat-client-status');
  if(nameEl)   nameEl.textContent   = conv?.clientName || 'Client';
  if(statusEl) statusEl.textContent = '🟢 En ligne';
  // Marquer comme lu
  if(conv?.unreadStaff > 0 && window.FB) {
    const { db, doc, setDoc } = window.FB;
    const entId = DB.currentUser?.entreprise || 'dpgestpro';
    setDoc(doc(db, 'entreprises/' + entId + '/conversations', convId), { unreadStaff: 0 }, { merge: true }).catch(()=>{});
  }
  // Désabonner ancien listener
  if(tchatUnsubscribe) { tchatUnsubscribe(); tchatUnsubscribe = null; }
  // Écouter les messages en temps réel
  if(!window.FB) return;
  const { db, collection, onSnapshot } = window.FB;
  const entId = DB.currentUser?.entreprise || 'dpgestpro';
  tchatUnsubscribe = onSnapshot(
    collection(db, 'entreprises/' + entId + '/conversations/' + convId + '/messages'),
    (snap) => {
      const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      msgs.sort((a,b) => (a.time||0) - (b.time||0));
      renderMessages(msgs);
    }
  );
  renderConversations(DB.tchatConversations);
}

function renderMessages(msgs) {
  const zone = document.getElementById('messages-zone');
  if(!zone) return;
  if(!msgs.length) { zone.innerHTML = '<div style="text-align:center;color:var(--text3);font-size:13px;margin-top:40px">Aucun message pour l&#39;instant</div>'; return; }
  zone.innerHTML = msgs.map(m => {
    const isStaff = m.sender === 'staff';
    return `<div style="display:flex;justify-content:${isStaff?'flex-end':'flex-start'}">
      <div style="max-width:70%;padding:10px 14px;border-radius:${isStaff?'16px 4px 16px 16px':'4px 16px 16px 16px'};background:${isStaff?'var(--accent)':'var(--surface2)'};color:${isStaff?'white':'var(--text)'};font-size:13px">
        <div style="margin-bottom:2px">${m.text}</div>
        <div style="font-size:10px;opacity:.7;text-align:right">${m.time?new Date(m.time).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}):''} ${isStaff?'· '+(m.staffName||'Personnel'):''}</div>
      </div>
    </div>`;
  }).join('');
  zone.scrollTop = zone.scrollHeight;
}

async function sendTchatMsg() {
  const input = document.getElementById('tchat-msg-input');
  if(!input || !input.value.trim()) return;
  if(!currentConvId) { toast('Sélectionnez une conversation'); return; }
  const text = input.value.trim();
  input.value = '';
  if(!window.FB) { toast('Firebase requis pour le tchat'); return; }
  const { db, collection, addDoc, doc, setDoc, serverTimestamp } = window.FB;
  const entId = DB.currentUser?.entreprise || 'dpgestpro';
  const now   = Date.now();
  try {
    await addDoc(collection(db, 'entreprises/' + entId + '/conversations/' + currentConvId + '/messages'), {
      text, sender: 'staff', staffName: DB.currentUser?.name || 'Personnel',
      time: now, createdAt: serverTimestamp()
    });
    await setDoc(doc(db, 'entreprises/' + entId + '/conversations', currentConvId), {
      lastMsg: text, lastMsgTime: now, unreadClient: 1
    }, { merge: true });
  } catch(e) { toast('Erreur envoi: ' + e.message); }
}

function updateTchatBadge() {
  const total = DB.tchatConversations.reduce((a,c) => a + (c.unreadStaff||0), 0);
  const badge = document.getElementById('tchat-badge');
  if(badge) {
    badge.style.display = total > 0 ? 'inline' : 'none';
    badge.textContent   = total;
  }
}

function admEntrepriseAjouterUser(eid) {
  var ent = ENTREPRISES[eid];
  if(!ent) return;
  var uid2  = prompt("UID Firebase du nouvel utilisateur :");
  if(!uid2 || !uid2.trim()) return;
  var nom   = prompt("Nom complet :");
  if(!nom  || !nom.trim())  return;
  var email = prompt("Email (optionnel) :") || "";
  var role  = prompt("Rôle (directeur / gestionnaire / caissier) :") || "caissier";

  ent.users[uid2.trim()] = { role, name:nom.trim(), email, pin:null };
  renderAdminEntreprises();
  renderAdminUsers();
  toast("✅ " + nom + " ajouté à " + ent.nom);
}

function admSupprimerUser(eid, uid2) {
  var ent = ENTREPRISES[eid];

  var u = ent.users[uid2];
  if(!confirm("Retirer " + u.name + " de " + ent.nom + " ?")) return;
  delete ent.users[uid2];
  renderAdminEntreprises();
  renderAdminUsers();
  toast("✅ Utilisateur retiré");
}

function initDepenses() {
  var dateEl = document.getElementById("dep-date");
  if(dateEl && !dateEl.value) dateEl.value = new Date().toISOString().split("T")[0];
  var moisEl = document.getElementById("dep-filtre-mois");
  if(moisEl && !moisEl.value) moisEl.value = new Date().toISOString().slice(0,7);
  renderDepenses();
  renderCaisseStats();
}

function renderCaisseStats() {
  var today    = new Date().toISOString().split("T")[0];
  var thisMois = today.slice(0,7);

  // CA brut du jour (ventes)
  var caBrut = DB.sales.reduce(function(a,s) {
    return a + (s.date === today ? s.amount : 0);
  }, 0);

  // Dépenses du jour
  var depJour = DB.depenses.reduce(function(a,d) {
    return a + (d.date === today ? d.montant : 0);
  }, 0);

  // Dépenses du mois
  var depMois = DB.depenses.reduce(function(a,d) {
    return a + (d.date && d.date.startsWith(thisMois) ? d.montant : 0);
  }, 0);

  // CA net
  var caNet = caBrut - depJour;

  var e1 = document.getElementById("caisse-ca-brut");
  var e2 = document.getElementById("caisse-dep-jour");
  var e3 = document.getElementById("caisse-ca-net");
  var e4 = document.getElementById("caisse-dep-mois");
  var e5 = document.getElementById("dep-ca-net-bas");

  if(e1) e1.textContent = fmtNum(caBrut) + " F";
  if(e2) e2.textContent = fmtNum(depJour) + " F";
  if(e3) {
    e3.textContent = fmtNum(caNet) + " F";
    e3.style.color = caNet >= 0 ? "var(--success)" : "var(--danger)";
  }
  if(e4) e4.textContent = fmtNum(depMois) + " F";
  if(e5) e5.textContent = fmtNum(caNet) + " F";
}

function toggleAutreCat(sel) {
  var grp = document.getElementById("dep-autre-group");
  if(grp) grp.hidden = sel.value !== "Autre";
}

async function saveDepense() {
  var catEl    = document.getElementById("dep-cat");
  var montEl   = document.getElementById("dep-montant");
  var descEl   = document.getElementById("dep-desc");
  var dateEl   = document.getElementById("dep-date");
  var autreEl  = document.getElementById("dep-autre-label");

  var cat      = catEl ? catEl.value : "";
  if(cat === "Autre" && autreEl && autreEl.value.trim()) cat = autreEl.value.trim();
  var montant  = parseFloat(montEl ? montEl.value : 0) || 0;
  var desc     = descEl ? descEl.value.trim() : "";
  var date     = dateEl ? dateEl.value : new Date().toISOString().split("T")[0];

  if(!cat)         { toast("Choisissez une catégorie"); return; }
  if(montant <= 0) { toast("Montant invalide"); return; }
  if(!date)        { toast("Date obligatoire"); return; }

  var dep = {
    cat     : cat,
    montant : montant,
    desc    : desc,
    date    : date,
    user    : DB.currentUser ? DB.currentUser.name : "Inconnu",
    role    : DB.currentUser ? DB.currentUser.role  : "",
    createdAt: new Date().toISOString()
  };

  // Sauvegarder Firestore
  if(window.fbSave) {
    try {
      var fbId = await window.fbSave("depenses", null, dep);
      if(fbId) dep.id = fbId;
    } catch(e) { console.warn("Dépense non sauvegardée:", e); }
  }
  DB.depenses.push(dep);

  // Réinitialiser le formulaire
  if(montEl)  montEl.value  = "";
  if(descEl)  descEl.value  = "";
  if(autreEl) autreEl.value = "";
  var grp = document.getElementById("dep-autre-group");
  if(grp) grp.hidden = true;
  if(catEl) catEl.value = "Achats / Fournitures";

  renderDepenses();
  renderCaisseStats();
  toast("Depense enregistree !");
}

function initImagerie(){
  toggleEgliseMenu();
  refreshPatientSelects();
  var d=document.getElementById('img-date'); if(d) d.value=new Date().toISOString().split('T')[0];
  var m=document.getElementById('img-medecin'); if(m&&!m.value&&DB.currentUser)m.value=DB.currentUser.name;
  var fm=document.getElementById('img-filtre-mois'); if(fm&&!fm.value)fm.value=new Date().toISOString().slice(0,7);
  // Auto-remplir tarif selon type
  var typeSel=document.getElementById('img-type');
  if(typeSel) typeSel.addEventListener('change',function(){
    var opt=typeSel.options[typeSel.selectedIndex];
    var prix=opt?opt.dataset.prix:0;
    var tarif=document.getElementById('img-tarif');
    if(tarif&&prix)tarif.value=prix;
  });
  renderImagerie();
  refreshImgExamensSelect();
}

function renderImagerie(){
  var tbody=document.getElementById('img-tbody'); if(!tbody) return;
  var fM=document.getElementById('img-filtre-mois')?.value||'';
  var list=(DB.examensImg||[]).filter(function(e){return !fM||e.date&&e.date.startsWith(fM);}).slice().reverse();
  var thisMois=new Date().toISOString().slice(0,7);
  var all=(DB.examensImg||[]).filter(function(e){return e.date&&e.date.startsWith(thisMois);});
  var recettes=all.filter(function(e){return e.statut==='CR Rédigé';}).reduce(function(a,e){return a+(e.tarif||0);},0);
  var e1=document.getElementById('img-total');var e2=document.getElementById('img-attente');
  var e3=document.getElementById('img-rendus');var e4=document.getElementById('img-recettes');
  if(e1)e1.textContent=all.length;
  if(e2)e2.textContent=(DB.examensImg||[]).filter(function(e){return e.statut==='En attente';}).length;
  if(e3)e3.textContent=(DB.examensImg||[]).filter(function(e){return e.statut==='CR Rédigé';}).length;
  if(e4)e4.textContent=fmtNum(recettes)+' F';
  if(!list.length){tbody.innerHTML='<tr><td colspan="9" style="text-align:center;color:var(--text3);padding:20px">Aucun examen pour cette période</td></tr>';return;}
  tbody.innerHTML=list.map(function(e){
    var pt=(DB.patients||[]).find(function(p){return p.id===e.patientId;});
    var sc=e.statut==='CR Rédigé'?'badge-success':'badge-warning';
    var conc=e.conclusion==='Normal'?'✅ Normal':e.conclusion==='Anomalie'?'⚠️ Anomalie':e.conclusion==='Pathologie'?'🔴 Pathologie':'—';
    var csc=e.conclusion==='Normal'?'badge-success':e.conclusion==='Pathologie'?'badge-danger':'badge-warning';
    return '<tr>'+
      '<td style="font-size:12px">'+e.date+'</td>'+
      '<td style="font-weight:700">'+(pt?pt.nom:'—')+'</td>'+
      '<td style="font-size:12px">'+(e.type||'—')+'</td>'+
      '<td style="font-size:11px;color:var(--text2);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(e.region||'—')+'</td>'+
      '<td style="font-size:12px">Dr '+(e.medecin||'—')+'</td>'+
      '<td style="color:var(--accent)">'+fmtNum(e.tarif||0)+' F</td>'+
      '<td><span class="badge '+sc+'">'+(e.statut||'—')+'</span></td>'+
      '<td>'+(e.conclusion?'<span class="badge '+csc+'">'+conc+'</span>':'<span class="badge badge-neutral">—</span>')+'</td>'+
      '<td style="display:flex;gap:4px">'+
        '<button class="btn-sm btn-outline" style="font-size:10px;color:#00b4d8;border-color:#00b4d8" data-id="'+e.id+'" onclick="imprimerCRImg(this.dataset.id)">🖨</button>'+
        '<button class="btn-sm btn-danger" style="font-size:10px" data-id="'+e.id+'" onclick="deleteImg(this.dataset.id)">🗑</button>'+
      '</td></tr>';
  }).join('');
}

function refreshImgExamensSelect(){
  var attente=(DB.examensImg||[]).filter(function(e){return e.statut==='En attente';});
  var sel=document.getElementById('img-cr-examen'); if(!sel) return;

    return '<option value="'+e.id+'">'+(pt?pt.nom:'?')+' — '+e.type+' ('+e.date+')</option>';

}
