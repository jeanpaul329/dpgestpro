<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DpGestPro — Tchat Client</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13; --surface: #1a1a22; --surface2: #22222e;
    --border: rgba(255,255,255,.08); --text: #f0f0f5; --text2: #a0a0b0;
    --text3: #606070; --accent: #6c63ff; --success: #43e97b; --danger: #ff4757;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

  /* ── HEADER ── */
  .header {
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:14px 20px; display:flex; align-items:center; gap:12px;
  }
  .header-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:18px; }
  .header-logo span { color:var(--accent); }
  .header-ent { font-size:12px; color:var(--text3); margin-left:auto; }
  .online-dot { width:8px; height:8px; border-radius:50%; background:var(--success); display:inline-block; margin-right:6px; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── ACCUEIL ── */
  #screen-accueil {
    flex:1; display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .accueil-card {
    background:var(--surface); border:1px solid var(--border); border-radius:20px;
    padding:40px; width:100%; max-width:420px; text-align:center;
  }
  .accueil-icon { font-size:56px; margin-bottom:16px; }
  .accueil-titre { font-family:'Syne',sans-serif; font-size:24px; font-weight:800; margin-bottom:8px; }
  .accueil-sub { color:var(--text2); font-size:14px; margin-bottom:28px; line-height:1.6; }
  .form-group { margin-bottom:16px; text-align:left; }
  .form-group label { display:block; font-size:12px; font-weight:600; color:var(--text2); margin-bottom:6px; text-transform:uppercase; letter-spacing:.5px; }
  .form-group input { width:100%; padding:12px 16px; background:var(--surface2); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:14px; font-family:'DM Sans',sans-serif; outline:none; transition:border-color .2s; }
  .form-group input:focus { border-color:var(--accent); }
  .btn-start { width:100%; padding:14px; background:var(--accent); color:white; border:none; border-radius:12px; font-family:'Syne',sans-serif; font-weight:700; font-size:15px; cursor:pointer; transition:opacity .2s; }
  .btn-start:hover { opacity:.85; }
  .btn-start:disabled { opacity:.5; cursor:not-allowed; }

  /* ── TCHAT ── */
  #screen-tchat { flex:1; display:none; flex-direction:column; max-width:700px; width:100%; margin:0 auto; }

  .chat-header {
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:14px 20px; display:flex; align-items:center; gap:10px;
  }
  .chat-avatar { width:38px; height:38px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-weight:700; font-size:16px; }
  .chat-info-name { font-weight:700; font-size:15px; }
  .chat-info-status { font-size:12px; color:var(--success); }

  .messages-zone {
    flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:10px;
    min-height:0;
  }

  .msg-bubble { display:flex; }
  .msg-bubble.client { justify-content:flex-end; }
  .msg-bubble.staff  { justify-content:flex-start; }

  .bubble {
    max-width:72%; padding:10px 14px; border-radius:16px; font-size:14px; line-height:1.5;
  }
  .msg-bubble.client .bubble { background:var(--accent); color:white; border-radius:16px 4px 16px 16px; }
  .msg-bubble.staff  .bubble { background:var(--surface2); color:var(--text); border-radius:4px 16px 16px 16px; }
  .bubble-time { font-size:10px; opacity:.6; margin-top:4px; text-align:right; }
  .bubble-sender { font-size:11px; color:var(--accent); font-weight:600; margin-bottom:3px; }

  .typing-indicator { display:none; align-items:center; gap:4px; padding:10px 14px; background:var(--surface2); border-radius:4px 16px 16px 16px; width:fit-content; }
  .typing-dot { width:6px; height:6px; border-radius:50%; background:var(--text3); animation:typing .8s infinite; }
  .typing-dot:nth-child(2) { animation-delay:.15s; }
  .typing-dot:nth-child(3) { animation-delay:.3s; }
  @keyframes typing { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }

  .chat-input-zone {
    background:var(--surface); border-top:1px solid var(--border);
    padding:12px 16px; display:flex; gap:10px; align-items:flex-end;
  }
  .chat-input {
    flex:1; padding:10px 14px; background:var(--surface2); border:1px solid var(--border);
    border-radius:12px; color:var(--text); font-size:14px; font-family:'DM Sans',sans-serif;
    outline:none; resize:none; max-height:120px; transition:border-color .2s;
  }
  .chat-input:focus { border-color:var(--accent); }
  .btn-send {
    padding:10px 18px; background:var(--accent); color:white; border:none;
    border-radius:12px; cursor:pointer; font-size:18px; transition:opacity .2s; flex-shrink:0;
  }
  .btn-send:hover { opacity:.85; }
  .btn-send:disabled { opacity:.4; cursor:not-allowed; }

  /* ── EMPTY STATE ── */
  .empty-state { text-align:center; color:var(--text3); font-size:13px; margin:auto; padding:40px 20px; }
  .empty-state div:first-child { font-size:40px; margin-bottom:12px; }

  /* ── TOAST ── */
  #toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:white; padding:10px 20px; border-radius:10px; font-size:13px; display:none; z-index:999; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">DpGest<span>Pro</span></div>
  <div id="header-ent-name" class="header-ent"></div>
  <div style="font-size:12px;color:var(--success)"><span class="online-dot"></span>En ligne</div>
</div>

<!-- ÉCRAN ACCUEIL -->
<div id="screen-accueil">
  <div class="accueil-card">
    <div class="accueil-icon">💬</div>
    <div class="accueil-titre">Contactez-nous</div>
    <div class="accueil-sub" id="accueil-sub">Notre équipe est disponible pour répondre à toutes vos questions.</div>

    <div class="form-group">
      <label>Votre nom complet</label>
      <input type="text" id="input-nom" placeholder="Ex: Jean Dupont" maxlength="50">
    </div>
    <div class="form-group">
      <label>Votre numéro (optionnel)</label>
      <input type="tel" id="input-tel" placeholder="+229 XX XX XX XX">
    </div>
    <div class="form-group">
      <label>Votre message</label>
      <input type="text" id="input-msg-init" placeholder="Comment pouvons-nous vous aider ?">
    </div>
    <button class="btn-start" id="btn-start" id="btn-start" onclick="demarrerConversation()">
      💬 Démarrer la conversation
    </button>
    <div id="accueil-error" style="display:none;margin-top:12px;color:var(--danger);font-size:13px"></div>
  </div>
</div>

<!-- ÉCRAN TCHAT -->
<div id="screen-tchat">
  <div class="chat-header">
    <div class="chat-avatar" id="chat-avatar">S</div>
    <div>
      <div class="chat-info-name" id="chat-info-name">Service Client</div>
      <div class="chat-info-status">🟢 En ligne — répond habituellement rapidement</div>
    </div>
  </div>

  <div class="messages-zone" id="messages-zone">
    <div class="empty-state">
      <div>👋</div>
      <div>Chargement de la conversation...</div>
    </div>
  </div>

  <div id="typing-row" style="padding:0 20px 8px;display:none">
    <div class="typing-indicator" id="typing-indicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <span style="font-size:11px;color:var(--text3);margin-left:4px">Le personnel répond...</span>
    </div>
  </div>

  <div class="chat-input-zone">
    <textarea class="chat-input" id="chat-input" placeholder="Écrivez votre message..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();envoyerMessage()}"
      oninput="autoResize(this)"></textarea>
    <button class="btn-send" id="btn-send" onclick="envoyerMessage()">➤</button>
  </div>
</div>

<div id="toast"></div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp }           from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, getDoc, serverTimestamp, query, orderBy }
  from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey:            "AIzaSyDCqoYZLBK0ipbotTejMCAvYGxrkomGIGk",
  authDomain:        "dpgestpro.firebaseapp.com",
  projectId:         "dpgestpro",
  storageBucket:     "dpgestpro.firebasestorage.app",
  messagingSenderId: "795000345158",
  appId:             "1:795000345152:web:b33a6f77ce9e98bff87047"
};

const fbApp = initializeApp(firebaseConfig, 'tchat-client');
const db    = getFirestore(fbApp);

// ── Variables globales ──
let entId    = 'dpgestpro';
let convId   = null;
let clientNom= '';
let unsubMsg = null;

// ── Lire paramètre ?ent= dans l'URL ──
const params = new URLSearchParams(window.location.search);
entId = params.get('ent') || params.get('tchat') || 'dpgestpro';

// Charger nom entreprise
// ── Types d'entreprises connus (pour branding sans Firebase) ──
const ENT_META = {
  'cs_tohou':    { nom:'CS TOHOU',    type:'hopital',  couleur:'#00b4d8', icon:'🏥', tagline:'Suivi médical sécurisé — Posez vos questions à notre équipe médicale.' },
  'dpgestpro':   { nom:'DpGestPro',   type:'commerce', couleur:'#6c63ff', icon:'🏢', tagline:'Service client — Notre équipe est disponible pour vous aider.' },
  'ong2md':      { nom:'ONG 2MD',     type:'ong',      couleur:'#43e97b', icon:'🌿', tagline:'Contactez notre équipe.' },
  'mvcp_couffo': { nom:'MVCP COUFFO', type:'eglise',   couleur:'#f5a623', icon:'⛪', tagline:'Contactez notre équipe.' }
};

async function chargerEntreprise() {
  const meta = ENT_META[entId] || {};
  let nomEnt = meta.nom || entId;
  const couleur = meta.couleur || '#6c63ff';
  const icon    = meta.icon    || '💬';
  const isHop   = meta.type === 'hopital';

  // Appliquer couleur accent
  document.documentElement.style.setProperty('--accent', couleur);

  // Tenter Firebase
  try {
    const snap = await getDoc(doc(db, 'entreprises/' + entId + '/settings', 'company'));
    if(snap.exists()) nomEnt = snap.data().company || nomEnt;
  } catch(e) {}

  // Titre page
  document.title = nomEnt + ' — ' + (isHop ? 'Suivi Patient' : 'Tchat Client');

  // Header
  const hEnt = document.getElementById('header-ent-name');
  if(hEnt) hEnt.textContent = (isHop ? '🏥 ' : '') + nomEnt;

  // Icône accueil
  const accIcon = document.getElementById('accueil-icon');
  if(accIcon) accIcon.textContent = icon;

  // Titre accueil
  const accTitre = document.getElementById('accueil-titre');
  if(accTitre) accTitre.textContent = isHop ? '🏥 Suivi Patient — ' + nomEnt : nomEnt;

  // Sous-titre
  const accSub = document.getElementById('accueil-sub');
  if(accSub) accSub.textContent = meta.tagline || (nomEnt + ' — Notre équipe est disponible.');

  // Labels du formulaire (hôpital = médical)
  if(isHop) {
    const lblNom = document.querySelector('label[for="input-nom"], .form-group label:first-of-type');
    const lblMsg = document.getElementById('label-msg-init');
    const inpMsg = document.getElementById('input-msg-init');
    const btnStart = document.getElementById('btn-start');
    if(lblMsg) lblMsg.textContent = 'Votre question / Motif';
    if(inpMsg) inpMsg.placeholder = 'Ex: Résultats analyses, suite consultation, prise de RDV...';
    if(btnStart) btnStart.textContent = '🏥 Démarrer le suivi';
    // Champ numéro patient
    const dossierGroup = document.getElementById('group-dossier');
    if(dossierGroup) dossierGroup.style.display = 'block';
  }

  // Avatar chat
  const avatar = document.getElementById('chat-avatar');
  if(avatar) avatar.textContent = isHop ? '🏥' : nomEnt.charAt(0).toUpperCase();

  // Nom dans le chat
  const chatName = document.getElementById('chat-info-name');
  if(chatName) chatName.textContent = isHop ? '🩺 Équipe médicale — ' + nomEnt : 'Service Client — ' + nomEnt;
}
chargerEntreprise();

// ── Démarrer une conversation ──
window.demarrerConversation = async function() {
  const nom    = document.getElementById('input-nom').value.trim();
  const tel    = document.getElementById('input-tel').value.trim();
  const msgInit= document.getElementById('input-msg-init').value.trim();
  const errEl  = document.getElementById('accueil-error');
  const btn    = document.getElementById('btn-start');

  if(!nom)     { errEl.style.display='block'; errEl.textContent='Veuillez entrer votre nom'; return; }
  if(!msgInit) { errEl.style.display='block'; errEl.textContent='Veuillez entrer un message'; return; }
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = '⏳ Connexion...';

  try {
    const now = Date.now();
    clientNom = nom;

    // Créer la conversation
    const convRef = await addDoc(collection(db, 'entreprises/' + entId + '/conversations'), {
      clientName   : nom,
      clientTel    : tel,
      lastMsg      : msgInit,
      lastMsgTime  : now,
      unreadStaff  : 1,
      unreadClient : 0,
      createdAt    : serverTimestamp()
    });
    convId = convRef.id;

    // Envoyer le premier message
    await addDoc(collection(db, 'entreprises/' + entId + '/conversations/' + convId + '/messages'), {
      text    : msgInit,
      sender  : 'client',
      clientName: nom,
      time    : now,
      createdAt: serverTimestamp()
    });

    // Sauvegarder convId en localStorage pour reprendre
    localStorage.setItem('dpgest_conv_' + entId, convId);
    localStorage.setItem('dpgest_nom_'  + entId, nom);

    afficherTchat();
    ecouterMessages();
    toast('✅ Conversation démarrée !');

  } catch(e) {
    btn.disabled = false;
    btn.textContent = '💬 Démarrer la conversation';
    errEl.style.display = 'block';
    errEl.textContent = 'Erreur : ' + e.message;
  }
};

// ── Afficher l'écran tchat ──
function afficherTchat() {
  document.getElementById('screen-accueil').style.display = 'none';
  document.getElementById('screen-tchat').style.display   = 'flex';
}

// ── Écouter messages en temps réel ──
function ecouterMessages() {
  if(unsubMsg) unsubMsg();
  const zone = document.getElementById('messages-zone');
  zone.innerHTML = '';
  unsubMsg = onSnapshot(
    collection(db, 'entreprises/' + entId + '/conversations/' + convId + '/messages'),
    (snap) => {
      const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      msgs.sort((a,b) => (a.time||0) - (b.time||0));
      renderMessages(msgs);
      // Marquer comme lu côté client
      setDoc(doc(db, 'entreprises/' + entId + '/conversations', convId),
        { unreadClient: 0 }, { merge: true }).catch(()=>{});
    }
  );
}

// ── Afficher les messages ──
function renderMessages(msgs) {
  const zone = document.getElementById('messages-zone');
  if(!msgs.length) {
    zone.innerHTML = '<div class="empty-state"><div>💬</div><div>En attente de réponse...</div></div>';
    return;
  }
  zone.innerHTML = msgs.map(m => {
    const isClient = m.sender === 'client';
    const heure = m.time ? new Date(m.time).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : '';
    return `<div class="msg-bubble ${isClient?'client':'staff'}">
      <div class="bubble">
        ${!isClient ? '<div class="bubble-sender">' + (m.staffName||'Personnel') + '</div>' : ''}
        ${m.text}
        <div class="bubble-time">${heure}</div>
      </div>
    </div>`;
  }).join('');
  zone.scrollTop = zone.scrollHeight;

  // Afficher indicateur si dernier message est du client
  const last = msgs[msgs.length - 1];
  const typingRow = document.getElementById('typing-row');
  if(typingRow) typingRow.style.display = (last?.sender === 'client') ? 'block' : 'none';
}

// ── Envoyer un message ──
window.envoyerMessage = async function() {
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  if(!text || !convId) return;
  input.value = '';
  autoResize(input);
  document.getElementById('btn-send').disabled = true;

  const now = Date.now();
  try {
    await addDoc(collection(db, 'entreprises/' + entId + '/conversations/' + convId + '/messages'), {
      text, sender: 'client', clientName: clientNom, time: now, createdAt: serverTimestamp()
    });
    await setDoc(doc(db, 'entreprises/' + entId + '/conversations', convId), {
      lastMsg: text, lastMsgTime: now, unreadStaff: 1
    }, { merge: true });
  } catch(e) { toast('Erreur : ' + e.message); }
  document.getElementById('btn-send').disabled = false;
};

// ── Auto-resize textarea ──
window.autoResize = function(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
};

// ── Toast ──
window.toast = function(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
};

// ── Reprendre conversation existante ──
const savedConv = localStorage.getItem('dpgest_conv_' + entId);
const savedNom  = localStorage.getItem('dpgest_nom_'  + entId);
if(savedConv && savedNom) {
  convId    = savedConv;
  clientNom = savedNom;
  document.getElementById('input-nom').value = savedNom;
  afficherTchat();
  ecouterMessages();
}
</script>
</body>
</html>
